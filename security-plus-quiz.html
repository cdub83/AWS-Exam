 exp:"Ransomware encrypts victim files or locks systems and demands a ransom (usually cryptocurrency) for the decryption key. Modern ransomware also exfiltrates data and threatens to publish it (double extortion).",
 we:"Spyware secretly monitors user activity. Adware displays unwanted ads. Rootkit hides malware from detection. Ransomware = encryption + extortion.",
 refs:[{text:"Ransomware – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/ransomware-sy0-701/"},{text:"CISA: Ransomware Guide",url:"https://www.cisa.gov/ransomware"}]},

{id:73, domain:2,
 q:"An attacker uses a valid employee's credentials obtained from a data breach on another site to log into a corporate portal. What attack technique is this?",
 opts:["Brute force","Password spraying","Credential stuffing","Dictionary attack"],
 correct:[2],
 exp:"Credential stuffing uses actual username/password pairs leaked from previous data breaches, exploiting password reuse across sites. Tools automate testing thousands of stolen credentials against the target application.",
 we:"Brute force = tries all combinations. Password spraying = tries one common password across many accounts. Dictionary = tries wordlist. Credential stuffing = uses REAL leaked credentials from other breaches.",
 refs:[{text:"Password Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"MITRE ATT&CK: Credential Stuffing",url:"https://attack.mitre.org/techniques/T1110/004/"}]},

{id:74, domain:2,
 q:"Which type of injection attack allows an attacker to execute operating system commands through a vulnerable web application?",
 opts:["SQL injection","LDAP injection","Command injection","XML injection"],
 correct:[2],
 exp:"Command injection occurs when user input is passed unsanitized to a system shell. An attacker can execute arbitrary OS commands with the web server's privileges. Example: appending '; rm -rf /' to an input field that's used in a shell command.",
 we:"SQL injection targets databases. LDAP injection targets directory services. XML injection targets XML parsers. Command injection = OS shell execution through the application.",
 refs:[{text:"Injection Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/injection-attacks-sy0-701/"},{text:"OWASP: Command Injection",url:"https://owasp.org/www-community/attacks/Command_Injection"}]},

{id:75, domain:2,
 q:"A penetration tester uses a tool to scan for open ports and services on a target network. Which phase of the penetration testing process does this represent?",
 opts:["Exploitation","Reporting","Reconnaissance/scanning","Post-exploitation"],
 correct:[2],
 exp:"Port scanning and service enumeration are part of the reconnaissance and scanning phase. Tools like Nmap discover open ports, running services, and OS versions before exploitation begins.",
 we:"Exploitation = actually attacking the discovered vulnerabilities. Reporting = documenting findings. Post-exploitation = actions taken after gaining access (lateral movement, persistence). Scanning = discovery phase.",
 refs:[{text:"Penetration Testing – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"},{text:"NIST SP 800-115: Security Testing Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-115/final"}]},

// Domain 3 — Security Architecture
{id:76, domain:3,
 q:"Which protocol provides secure remote access to network devices using encrypted terminal sessions, replacing Telnet?",
 opts:["FTP","SSH","SFTP","HTTPS"],
 correct:[1],
 exp:"SSH (Secure Shell) provides encrypted command-line access to remote systems, replacing the plaintext Telnet protocol. It uses asymmetric keys for authentication and symmetric keys for session encryption.",
 we:"FTP = file transfer (unencrypted). SFTP = SSH-based file transfer (not terminal sessions). HTTPS = encrypted web traffic. SSH = encrypted remote terminal/command access.",
 refs:[{text:"Secure Protocols – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-protocols-sy0-701/"},{text:"NIST Glossary: Secure Shell",url:"https://csrc.nist.gov/glossary/term/secure_shell"}]},

{id:77, domain:3,
 q:"A company wants to verify that software downloads have not been tampered with. Which mechanism should they publish alongside the download?",
 opts:["Digital signature","Symmetric encryption key","SSL certificate","Access control list"],
 correct:[0],
 exp:"A digital signature (or cryptographic hash) published alongside a download allows users to verify integrity. Users compute the hash of the downloaded file and compare it to the published value. A mismatch indicates tampering.",
 we:"Symmetric keys would need to be shared securely. SSL certificates secure the transport, not file integrity. ACLs control access. Digital signature/hash = integrity verification for downloads.",
 refs:[{text:"Digital Signatures – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-signatures-sy0-701/"},{text:"NIST Glossary: Digital Signature",url:"https://csrc.nist.gov/glossary/term/digital_signature"}]},

{id:78, domain:3,
 q:"Which wireless security protocol replaced WPA2 and provides stronger encryption with Simultaneous Authentication of Equals (SAE)?",
 opts:["WEP","WPA","WPA2","WPA3"],
 correct:[3],
 exp:"WPA3 replaces WPA2 with stronger protections including Simultaneous Authentication of Equals (SAE), which replaces the Pre-Shared Key handshake and provides forward secrecy. It's resistant to offline dictionary attacks.",
 we:"WEP = broken (RC4, easily cracked). WPA = improved WEP but still weak (TKIP). WPA2 = AES-based, still widely used. WPA3 = current standard with SAE and forward secrecy.",
 refs:[{text:"Wireless Security – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/wireless-security-sy0-701/"},{text:"Wi-Fi Alliance: WPA3 Overview",url:"https://www.wi-fi.org/discover-wi-fi/security"}]},

{id:79, domain:3,
 q:"An organization is moving workloads to the cloud. The cloud provider manages the physical hardware, hypervisor, and network, while the customer manages the OS and applications. Which cloud model is this?",
 opts:["SaaS","PaaS","IaaS","On-premises"],
 correct:[2],
 exp:"In IaaS (Infrastructure as a Service), the cloud provider manages the physical infrastructure (hardware, virtualization, networking). The customer is responsible for the OS, middleware, runtime, and applications. This is the shared responsibility model for IaaS.",
 we:"SaaS = provider manages everything including the application. PaaS = provider manages infrastructure and runtime; customer manages only applications/data. IaaS = customer manages OS and up. On-premises = customer manages everything.",
 refs:[{text:"Cloud Shared Responsibility – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"NIST SP 800-145: Cloud Computing Definition",url:"https://csrc.nist.gov/publications/detail/sp/800-145/final"}]},

{id:80, domain:3,
 q:"Which concept ensures that data remains accessible and systems remain operational even during failures or attacks?",
 opts:["Confidentiality","Integrity","Availability","Non-repudiation"],
 correct:[2],
 exp:"Availability (the 'A' in the CIA triad) ensures that systems, services, and data are accessible when needed. Threats to availability include DDoS attacks, ransomware, hardware failures, and natural disasters.",
 we:"Confidentiality = data hidden from unauthorized users. Integrity = data hasn't been altered. Non-repudiation = actions can't be denied. Availability = systems accessible when needed.",
 refs:[{text:"CIA Triad – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/the-cia-triad-sy0-701/"},{text:"NIST Glossary: Availability",url:"https://csrc.nist.gov/glossary/term/availability"}]},

{id:81, domain:3,
 q:"A security architect implements a system where each microservice in an application only communicates with the services it explicitly needs. Which principle does this implement?",
 opts:["Defense in depth","Least privilege","Separation of duties","Zero trust"],
 correct:[1],
 exp:"Applying least privilege to network architecture means each service only has access to the services it needs. This limits blast radius — if one microservice is compromised, it can't freely communicate with all other services.",
 we:"Defense in depth = multiple layered controls. Separation of duties = splitting tasks across people. Zero trust = never trust, always verify. Least privilege = minimum necessary access — applied here at the network/service level.",
 refs:[{text:"Least Privilege – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/least-privilege-sy0-701/"},{text:"NIST SP 800-207: Zero Trust & Least Privilege",url:"https://csrc.nist.gov/publications/detail/sp/800-207/final"}]},

{id:82, domain:3,
 q:"Which backup strategy backs up only the data that has changed since the last FULL backup, requiring the full backup and only the most recent differential backup to restore?",
 opts:["Full backup","Incremental backup","Differential backup","Snapshot backup"],
 correct:[2],
 exp:"A differential backup captures all changes since the last full backup. Restoration requires the full backup plus the latest differential — simpler than incremental but differential backups grow larger over time.",
 we:"Full = everything. Incremental = only changes since last backup of ANY type (faster backup, slower restore — needs full + all incrementals). Differential = changes since last FULL (slower backup than incremental, faster restore). Snapshot = point-in-time copy.",
 refs:[{text:"Backup Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/backups-sy0-701/"},{text:"NIST SP 800-34: Backup Strategies",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

// Domain 4 — Security Operations
{id:83, domain:4,
 q:"Which framework describes adversary tactics and techniques and is widely used by SOC teams to understand and detect attacker behavior?",
 opts:["NIST CSF","MITRE ATT&CK","OWASP Top 10","CIS Controls"],
 correct:[1],
 exp:"MITRE ATT&CK (Adversarial Tactics, Techniques, and Common Knowledge) is a knowledge base of real-world adversary behaviors organized by tactics (what they're trying to achieve) and techniques (how they do it). SOC teams use it to detect, hunt, and respond to threats.",
 we:"NIST CSF = five-function cybersecurity framework. OWASP Top 10 = web application vulnerabilities. CIS Controls = prioritized security best practices. MITRE ATT&CK = adversary tactics and techniques.",
 refs:[{text:"Threat Intelligence – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"MITRE ATT&CK Framework",url:"https://attack.mitre.org/"}]},

{id:84, domain:4,
 q:"A SOC analyst notices unusual outbound traffic to a foreign IP occurring every 60 seconds from an internal host. What is the MOST likely explanation?",
 opts:["A software update is checking for new versions","The host is beaconing to a command-and-control server","The firewall is sending heartbeat packets","A legitimate scheduled task is running"],
 correct:[1],
 exp:"Regular, timed outbound connections to an external IP are a classic indicator of C2 (command-and-control) beaconing. Malware on the compromised host 'phones home' at regular intervals to receive instructions or exfiltrate data.",
 we:"Software updates are typically user-initiated or irregular. Firewall heartbeats go to internal management systems. Scheduled tasks usually run internal processes. Regular outbound beaconing to unknown external IPs = C2 malware.",
 refs:[{text:"Network Traffic Analysis – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-traffic-analysis-sy0-701/"},{text:"MITRE ATT&CK: C2 Beaconing",url:"https://attack.mitre.org/tactics/TA0011/"}]},

{id:85, domain:4,
 q:"During incident response, an analyst discovers that an attacker has created a new admin account on a compromised server. Which incident response phase addresses removing this account?",
 opts:["Identification","Containment","Eradication","Recovery"],
 correct:[2],
 exp:"Eradication involves removing all artifacts of the attack — malware, backdoors, unauthorized accounts, and persistence mechanisms. After eradication, recovery restores the system to normal operation.",
 we:"Identification = detecting the incident. Containment = stopping the spread. Eradication = removing the threat artifacts (backdoor accounts, malware). Recovery = restoring normal operations.",
 refs:[{text:"Incident Response – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"NIST SP 800-61: Eradication Phase",url:"https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"}]},

{id:86, domain:4,
 q:"Which mobile device management (MDM) capability allows an organization to remotely delete all data from a lost or stolen device?",
 opts:["Remote lock","Remote wipe","Containerization","Geofencing"],
 correct:[1],
 exp:"Remote wipe sends a command to a mobile device to delete all data, returning it to factory settings. This prevents data theft if a device is lost or stolen. MDM solutions like Microsoft Intune and Jamf provide this capability.",
 we:"Remote lock = locks the screen with a PIN. Containerization = separates corporate from personal data. Geofencing = restricts device use by location. Remote wipe = delete all data remotely.",
 refs:[{text:"Mobile Device Management – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/mobile-device-management-sy0-701/"},{text:"NIST SP 800-124: Mobile Device Security",url:"https://csrc.nist.gov/publications/detail/sp/800-124/rev-2/final"}]},

{id:87, domain:4,
 q:"A security engineer wants to implement a system that automatically blocks an IP address after 5 failed login attempts. Which technology category provides this?",
 opts:["SIEM","IPS","WAF","DLP"],
 correct:[1],
 exp:"An Intrusion Prevention System (IPS) or an account lockout policy can automatically block IPs after repeated failed attempts. IPS rules can detect brute-force patterns and take automated blocking actions.",
 we:"SIEM = aggregates/correlates logs but doesn't directly block. WAF = blocks web application attacks. DLP = prevents data exfiltration. IPS = actively blocks detected threats.",
 refs:[{text:"IDS and IPS – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/intrusion-detection-and-prevention-sy0-701/"},{text:"NIST Glossary: Intrusion Prevention System",url:"https://csrc.nist.gov/glossary/term/intrusion_prevention_system"}]},

{id:88, domain:4,
 q:"Which type of malware analysis executes the malware in a controlled, isolated environment to observe its behavior without risking the production network?",
 opts:["Static analysis","Dynamic analysis","Code review","Signature analysis"],
 correct:[1],
 exp:"Dynamic analysis (also called behavioral analysis) executes malware in a sandbox environment to observe what it does — files created, registry changes, network connections, processes spawned. Tools like Cuckoo Sandbox automate this.",
 we:"Static analysis = examining the file without executing it (disassembly, strings). Code review = reading source code. Signature analysis = matching known patterns. Dynamic analysis = run it and watch what happens.",
 refs:[{text:"Malware Analysis – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-analysis-sy0-701/"},{text:"CISA: Malware Analysis Tools",url:"https://www.cisa.gov/resources-tools/services/malware-analysis"}]},

{id:89, domain:4,
 q:"An organization uses a honeynet to detect attackers. What is a honeynet?",
 opts:["A network of security scanners","A decoy network of systems designed to lure and detect attackers","An encrypted VPN network","A network segmentation technique"],
 correct:[1],
 exp:"A honeynet is a network of honeypots — decoy systems intentionally made to look valuable and vulnerable. Any traffic to or from the honeynet is suspicious by definition, since legitimate users have no reason to access these systems.",
 we:"Security scanners are active tools. VPN creates encrypted tunnels. Network segmentation limits lateral movement. Honeynet = decoy infrastructure to detect and study attackers.",
 refs:[{text:"Honeypots & Honeynets – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/honeypots-and-honeynets-sy0-701/"},{text:"NIST Glossary: Honeypot",url:"https://csrc.nist.gov/glossary/term/honeypot"}]},

{id:90, domain:4,
 q:"Which process involves proactively searching through networks and systems for indicators of compromise that have evaded existing security tools?",
 opts:["Vulnerability scanning","Penetration testing","Threat hunting","Incident response"],
 correct:[2],
 exp:"Threat hunting is a proactive, human-led activity where analysts search for hidden threats that automated tools may have missed. Hunters use threat intelligence, behavioral analytics, and hypotheses to find attackers already in the environment.",
 we:"Vulnerability scanning = finding weaknesses. Pen testing = simulating attacks. Incident response = reacting to known incidents. Threat hunting = proactively searching for undetected threats.",
 refs:[{text:"Threat Hunting – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-hunting-sy0-701/"},{text:"MITRE ATT&CK: Threat Hunting",url:"https://attack.mitre.org/resources/faq/"}]},

// Domain 5 — Security Program Management
{id:91, domain:5,
 q:"A company performs a risk assessment and determines the potential financial loss from a single ransomware incident is $500,000. What is this value called?",
 opts:["Annual Loss Expectancy (ALE)","Single Loss Expectancy (SLE)","Exposure Factor (EF)","Annual Rate of Occurrence (ARO)"],
 correct:[1],
 exp:"Single Loss Expectancy (SLE) is the expected financial loss from a single occurrence of a risk event. SLE = Asset Value × Exposure Factor. ALE = SLE × ARO (how many times per year the event is expected to occur).",
 we:"ALE = annual expected loss (SLE × ARO). EF = percentage of asset value lost in one incident. ARO = frequency of occurrence per year. SLE = loss from ONE incident.",
 refs:[{text:"Risk Calculations – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST SP 800-30: Quantitative Risk Assessment",url:"https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"}]},

{id:92, domain:5,
 q:"Which security document defines what is and is not acceptable use of company IT resources by employees?",
 opts:["Data classification policy","Acceptable Use Policy (AUP)","Incident response plan","Service Level Agreement (SLA)"],
 correct:[1],
 exp:"An Acceptable Use Policy (AUP) defines the rules for how employees may use company IT resources including computers, internet access, email, and software. Violations can result in disciplinary action.",
 we:"Data classification policy = how to label and handle data. IRP = how to respond to incidents. SLA = service availability commitments. AUP = what employees can and cannot do with IT resources.",
 refs:[{text:"Security Policies – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-policies-sy0-701/"},{text:"SANS: Acceptable Use Policy Template",url:"https://www.sans.org/information-security-policy/"}]},

{id:93, domain:5,
 q:"An organization requires all new employees to complete security awareness training within 30 days of hire. What type of control is this?",
 opts:["Technical control","Physical control","Administrative control","Compensating control"],
 correct:[2],
 exp:"Administrative controls (also called managerial controls) are policies, procedures, and training programs. Security awareness training is an administrative control that addresses the human element of security.",
 we:"Technical controls = software/hardware (firewalls, encryption, MFA). Physical controls = locks, cameras, guards. Compensating controls = alternative controls when primary isn't feasible. Administrative = policies, training, procedures.",
 refs:[{text:"Security Control Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"NIST SP 800-53: Control Categories",url:"https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"}]},

{id:94, domain:5,
 q:"Which term describes the process of identifying, cataloguing, and managing an organization's IT assets including hardware, software, and data?",
 opts:["Change management","Asset management","Configuration management","Patch management"],
 correct:[1],
 exp:"Asset management involves maintaining an inventory of all IT assets and understanding their value, location, ownership, and security posture. You cannot protect what you don't know you have.",
 we:"Change management = controlling changes to systems. Configuration management = maintaining desired system states. Patch management = applying software updates. Asset management = knowing what you own.",
 refs:[{text:"Asset Management – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/asset-management-sy0-701/"},{text:"CIS Control 1: Inventory of Enterprise Assets",url:"https://www.cisecurity.org/controls/inventory-and-control-of-enterprise-assets"}]},

{id:95, domain:5,
 q:"A financial institution is required to encrypt customer financial data under penalty of law. Which type of requirement is this?",
 opts:["Best practice","Guideline","Regulatory compliance requirement","Voluntary standard"],
 correct:[2],
 exp:"Regulatory compliance requirements are legally mandated controls. Financial institutions are subject to regulations like Gramm-Leach-Bliley Act (GLBA) and SOX which mandate specific security controls with legal penalties for non-compliance.",
 we:"Best practices = recommended but not required. Guidelines = optional suggestions. Voluntary standards = organizations choose to adopt (like ISO 27001). Regulatory = legally mandated with penalties.",

{id:96, domain:5,
 q:"Which type of audit examines an organization's security controls and practices and is conducted by an independent third party?",
 opts:["Internal audit","Penetration test","External audit","Vulnerability assessment"],
 correct:[2],
 exp:"An external audit is conducted by an independent third party, providing an unbiased assessment of security controls and compliance. It carries more credibility than an internal audit for demonstrating compliance to regulators and customers.",
 we:"Internal audit = conducted by the organization's own staff. Pen test = simulates attacks. Vulnerability assessment = identifies weaknesses. External audit = independent third-party assessment.",
 refs:[{text:"Audits & Assessments – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-assessments-sy0-701/"},{text:"ISACA: Auditing Standards",url:"https://www.isaca.org/resources/isaca-journal/issues"}]},

{id:97, domain:5,
 q:"What does the term 'data sovereignty' refer to in cloud computing?",
 opts:["Encrypting data before storing it in the cloud","The concept that data is subject to the laws of the country where it is stored","The cloud provider owning the customer's data","Using multiple cloud providers for redundancy"],
 correct:[1],
 exp:"Data sovereignty means that data stored in a particular country is subject to that country's laws and regulations. Organizations must consider where cloud providers physically store data to ensure compliance with local regulations like GDPR.",
 we:"Encrypting data = data security, not sovereignty. Cloud providers don't own customer data (contractually). Multi-cloud = redundancy strategy. Data sovereignty = legal jurisdiction over data based on where it's stored.",
 refs:[{text:"Data Privacy in the Cloud – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"GDPR: Data Location Requirements",url:"https://gdpr.eu/data-transfer-outside-eu/"}]},

{id:98, domain:2,
 q:"An attacker calls the help desk pretending to be a new employee and convinces them to reset a password and provide temporary credentials. What type of attack is this?",
 opts:["Phishing","Pretexting","Tailgating","Baiting"],
 correct:[1],
 exp:"Pretexting involves creating a fabricated scenario (pretext) to manipulate someone into providing information or access. Impersonating a new employee to trick the help desk is a classic pretexting social engineering attack.",
 we:"Phishing = deceptive email. Tailgating = physical unauthorized entry. Baiting = luring with physical media or downloads. Pretexting = fabricated identity/scenario to manipulate.",
 refs:[{text:"Social Engineering – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/social-engineering-sy0-701/"},{text:"MITRE ATT&CK: Pretexting",url:"https://attack.mitre.org/techniques/T1598/"}]},

{id:99, domain:3,
 q:"Which network device operates at Layer 3 and makes forwarding decisions based on IP addresses to route traffic between different networks?",
 opts:["Hub","Switch","Router","Repeater"],
 correct:[2],
 exp:"Routers operate at OSI Layer 3 (Network) and forward packets based on destination IP addresses using routing tables. They connect different networks (e.g., LAN to internet) and make intelligent path decisions.",
 we:"Hub = Layer 1, broadcasts to all ports. Switch = Layer 2, forwards based on MAC addresses. Repeater = Layer 1, regenerates signals. Router = Layer 3, routes based on IP.",
 refs:[{text:"Network Devices – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-devices-sy0-701/"},{text:"CompTIA: OSI Model & Networking Basics",url:"https://www.comptia.org/blog/what-is-the-osi-model"}]},

{id:100, domain:4,
 q:"A company implements a solution that decrypts, inspects, then re-encrypts HTTPS traffic to detect malware in encrypted sessions. What is this called?",
 opts:["Port mirroring","SSL/TLS inspection (SSL decryption)","Deep packet inspection of plaintext","Certificate pinning"],
 correct:[1],
 exp:"SSL/TLS inspection (also called SSL interception or SSL decryption) uses a proxy that terminates the SSL session, inspects the plaintext content for threats, then re-encrypts and forwards it. It requires installing a trusted root CA on client devices.",
 we:"Port mirroring = copies traffic to a monitoring device without decryption. DPI of plaintext = inspection after decryption, not the process itself. Certificate pinning = clients only accept specific certs, making SSL inspection harder. SSL inspection = the decrypt-inspect-re-encrypt process.",
 refs:[{text:"SSL Inspection – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/ssl-inspection-sy0-701/"},{text:"NIST Glossary: TLS Inspection",url:"https://csrc.nist.gov/glossary/term/tls_inspection"}]},

{id:101, domain:1,
 q:"Which term describes the practice of verifying a user's claimed identity before granting access?",
 opts:["Authorization","Authentication","Accounting","Auditing"],
 correct:[1],
 exp:"Authentication verifies WHO you are — confirming the identity of a user, device, or system before granting access. Authorization determines WHAT you can do after authentication. Accounting tracks what you did.",
 we:"Authorization = what access is permitted after identity is confirmed. Accounting (auditing) = tracking and logging activity. Authentication = proving identity.",
 refs:[{text:"AAA Framework – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/authentication-authorization-and-accounting-sy0-701/"},{text:"NIST Glossary: Authentication",url:"https://csrc.nist.gov/glossary/term/authentication"}]},

{id:102, domain:2,
 q:"Which type of cross-site scripting attack stores the malicious script on the server (e.g., in a database) so it executes for every user who visits the affected page?",
 opts:["Reflected XSS","Stored XSS","DOM-based XSS","Blind XSS"],
 correct:[1],
 exp:"Stored (persistent) XSS saves the malicious script in the application's database. Every user who visits the infected page receives and executes the script. This is more dangerous than reflected XSS, which only affects users who click a malicious link.",
 we:"Reflected XSS = script in URL, only affects users clicking the malicious link. DOM-based XSS = manipulates the DOM without server involvement. Blind XSS = script fires in admin panels not visible to attacker. Stored XSS = persisted in database, affects all visitors.",
 refs:[{text:"OWASP: Cross-Site Scripting Types",url:"https://owasp.org/www-community/attacks/xss/"},{text:"OWASP XSS Prevention Cheat Sheet",url:"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html"}]},

{id:103, domain:3,
 q:"An organization deploys sensors throughout their network to detect abnormal traffic patterns and automatically alert the security team. This is an example of:",
 opts:["Preventive control","Detective control","Corrective control","Deterrent control"],
 correct:[1],
 exp:"Detecting abnormal traffic and alerting the security team is a detective control — it identifies that something suspicious is occurring. IDS systems, SIEM alerts, and anomaly detection are detective controls.",
 we:"Preventive = stops attacks before they happen. Corrective = fixes issues after detection. Deterrent = discourages attacks. Detective = identifies attacks that are occurring or have occurred.",
 refs:[{text:"Security Control Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"NIST SP 800-53: Detective Controls",url:"https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"}]},

{id:104, domain:4,
 q:"Which OWASP Top 10 vulnerability occurs when an application includes components such as libraries or frameworks with known vulnerabilities?",
 opts:["Injection","Broken Access Control","Vulnerable and Outdated Components","Security Misconfiguration"],
 correct:[2],
 exp:"'Vulnerable and Outdated Components' (formerly A9, now A06 in OWASP Top 10 2021) occurs when applications use libraries, frameworks, or other components with known vulnerabilities. Log4Shell (Log4j vulnerability) is a prominent example.",
 we:"Injection = SQL/command/XSS injection. Broken Access Control = unauthorized access. Security Misconfiguration = defaults, error messages, unnecessary features. Vulnerable components = using outdated/unpatched libraries.",
 refs:[{text:"OWASP Top 10 (2021)",url:"https://owasp.org/Top10/"},{text:"Application Vulnerabilities – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-vulnerabilities-sy0-701/"}]},

{id:105, domain:5,
 q:"An organization's security team must notify affected customers within 72 hours of discovering a data breach. Which regulation mandates this requirement?",
 opts:["PCI DSS","HIPAA","GDPR","SOX"],
 correct:[2],
 exp:"GDPR (General Data Protection Regulation) requires organizations to notify supervisory authorities within 72 hours of becoming aware of a personal data breach, and to notify affected individuals without undue delay when the breach poses a high risk to their rights.",

// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const DOMAIN_NAMES = {
  1: "General Security Concepts",
  2: "Threats, Vulnerabilities & Mitigations",
  3: "Security Architecture",
  4: "Security Operations",
  5: "Security Program Management & Oversight"
};
const DOMAIN_COLORS = { 1:'#a855f7', 2:'#ef4444', 3:'#3b82f6', 4:'#22c55e', 5:'#f59e0b' };
const DOMAIN_CLASSES = { 1:'d1b', 2:'d2b', 3:'d3b', 4:'d4b', 5:'d5b' };
const PASS_SCORE = 75;
const EXAM_MINUTES = 90;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let state = {
  screen: 'start',       // start | exam | results
  mode: 'timed',         // timed | practice
  filterDomain: 0,       // 0 = all
  questions: [],
  answers: {},           // id → [selectedIndices]
  submitted: {},         // id → bool
  current: 0,
  timerSec: EXAM_MINUTES * 60,
  timerInterval: null,
  reviewFilter: 'all'
};

function filteredQuestions() {
  return state.filterDomain === 0
    ? QUESTIONS
    : QUESTIONS.filter(q => q.domain === state.filterDomain);
}

function startExam() {
  clearInterval(state.timerInterval);
  const qs = [...filteredQuestions()];
  for (let i = qs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [qs[i], qs[j]] = [qs[j], qs[i]];
  }
  state.questions = qs;
  state.answers = {};
  state.submitted = {};
  state.current = 0;
  state.timerSec = EXAM_MINUTES * 60;
  state.screen = 'exam';
  render();
  if (state.mode === 'timed') startTimer();
}

function startTimer() {
  state.timerInterval = setInterval(() => {
    state.timerSec--;
    updateTimer();
    if (state.timerSec <= 0) { clearInterval(state.timerInterval); submitAll(); }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById('timer');
  if (!el) return;
  const m = Math.floor(state.timerSec / 60), s = state.timerSec % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = state.timerSec < 300 ? 'danger' : state.timerSec < 600 ? 'warning' : '';
}

function toggleAnswer(qid, idx, isMulti) {
  const q = state.questions.find(x => x.id === qid);
  if (state.submitted[qid]) return;
  if (!state.answers[qid]) state.answers[qid] = [];
  const sel = state.answers[qid];
  if (isMulti) {
    const pos = sel.indexOf(idx);
    if (pos === -1) sel.push(idx); else sel.splice(pos, 1);
  } else {
    state.answers[qid] = [idx];
    if (state.mode === 'practice') submitAnswer(qid);
  }
  render();
}

function submitAnswer(qid) {
  if (!state.answers[qid] || state.answers[qid].length === 0) return;
  state.submitted[qid] = true;
  render();
}

function submitAll() {
  clearInterval(state.timerInterval);
  state.screen = 'results';
  render();
}

function isCorrect(qid) {
  const q = state.questions.find(x => x.id === qid);
  const ans = state.answers[qid] || [];
  if (ans.length !== q.correct.length) return false;
  return q.correct.every(c => ans.includes(c)) && ans.every(a => q.correct.includes(a));
}

function calcScore() {
  let correct = 0;
  state.questions.forEach(q => { if (isCorrect(q.id)) correct++; });
  return { correct, total: state.questions.length, pct: Math.round(correct / state.questions.length * 100) };
}

function calcDomainScores() {
  const domains = {};
  state.questions.forEach(q => {
    if (!domains[q.domain]) domains[q.domain] = { correct: 0, total: 0 };
    domains[q.domain].total++;
    if (isCorrect(q.id)) domains[q.domain].correct++;
  });
  return domains;
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start') app.innerHTML = renderStart();
  else if (state.screen === 'exam') app.innerHTML = renderExam();
  else app.innerHTML = renderResults();
  attachEvents();
  if (state.screen === 'exam' && state.mode === 'timed') updateTimer();
}

function renderStart() {
  const domainBtns = [0,1,2,3,4,5].map(d => {
    const active = state.filterDomain === d ? 'active' : '';
    const cls = d === 0 ? 'all' : `d${d}`;
    const label = d === 0 ? 'All Domains' : `Domain ${d}`;
    return `<button class="domain-btn ${cls} ${active}" data-domain="${d}">${label}</button>`;
  }).join('');
  const count = filteredQuestions().length;
  return `
    <div class="screen">
      <div class="sec-logo">🔒</div>
      <h1>CompTIA Security+</h1>
      <p>SY0-701 Practice Exam — ${count} Questions</p>
      <div class="info-grid">
        <div class="info-box"><div class="val">${count}</div><div class="lbl">Questions</div></div>
        <div class="info-box"><div class="val">${EXAM_MINUTES}m</div><div class="lbl">Time Limit</div></div>
        <div class="info-box"><div class="val">${PASS_SCORE}%</div><div class="lbl">Passing Score</div></div>
        <div class="info-box"><div class="val">5</div><div class="lbl">Domains</div></div>
      </div>
      <div class="mode-grid">
        <div class="mode-card ${state.mode==='timed'?'active':''}" data-mode="timed">
          <h3>⏱ Timed Mode</h3>
          <p>${EXAM_MINUTES}-minute countdown. Simulates real exam conditions.</p>
        </div>
        <div class="mode-card ${state.mode==='practice'?'active':''}" data-mode="practice">
          <h3>📖 Practice Mode</h3>
          <p>Instant feedback and explanations after each answer. No time limit.</p>
        </div>
      </div>
      <div style="margin-bottom:8px;font-size:13px;color:var(--muted);">Filter by domain:</div>
      <div class="domain-filter">${domainBtns}</div>
      <br>
      <button class="btn btn-primary" id="startBtn" style="font-size:16px;padding:14px 36px;">Start Exam</button>
    </div>`;
}

function renderExam() {
  const q = state.questions[state.current];
  const sel = state.answers[q.id] || [];
  const submitted = state.submitted[q.id];
  const isMulti = q.multi;
  const pct = ((state.current) / state.questions.length * 100).toFixed(1);

  const opts = q.opts.map((o, i) => {
    let cls = 'option';
    if (submitted) {
      cls += ' disabled';
      if (q.correct.includes(i)) cls += ' correct';
      else if (sel.includes(i)) cls += ' incorrect';
    } else if (sel.includes(i)) cls += ' selected';
    const letter = String.fromCharCode(65 + i);
    return `<div class="${cls}" data-qid="${q.id}" data-idx="${i}">
      <div class="option-letter">${letter}</div>
      <div class="option-text">${o}</div>
    </div>`;
  }).join('');

  let exp = '';
  if (submitted) {
    const correct = isCorrect(q.id);
    const wrongSelected = sel.filter(i => !q.correct.includes(i));
    exp = `<div class="exp-block">
      <div class="exp-section ${correct ? 'exp-correct' : 'exp-wrong'}">
        <div class="exp-header">${correct ? '✓ Correct' : '✗ Incorrect'}</div>
        <div>${q.exp}</div>
      </div>`;
    if (q.we && !correct) {
      exp += `<div class="exp-section exp-wrong">
        <div class="exp-header">Why the other options are wrong</div>
        <div>${q.we}</div>
      </div>`;
    }
    if (q.refs && !correct) {
      const links = q.refs.map(r => `<li><a href="${r.url}" target="_blank" rel="noopener">📖 ${r.text}</a></li>`).join('');
      exp += `<div class="exp-section exp-refs">
        <div class="exp-header">📚 Read More</div>
        <ul>${links}</ul>
      </div>`;
    }
    exp += `</div>`;
  }

  const answered = Object.keys(state.answers).filter(id => state.answers[id].length > 0).length;

  return `
    <div class="exam-header">
      <div class="exam-title">🔒 CompTIA Security+ SY0-701</div>
      <div class="exam-meta">
        <div class="stat"><div class="stat-val">${state.current + 1}/${state.questions.length}</div><div class="stat-lbl">Question</div></div>
        <div class="stat"><div class="stat-val">${answered}</div><div class="stat-lbl">Answered</div></div>
        ${state.mode === 'timed' ? `<div class="stat"><div id="timer" class="stat-val">--:--</div><div class="stat-lbl">Remaining</div></div>` : ''}
        <button class="btn btn-danger" id="submitAllBtn" style="font-size:12px;padding:8px 16px;">Submit Exam</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <div class="question-num">Question ${state.current + 1} of ${state.questions.length}</div>
      <span class="domain-badge ${DOMAIN_CLASSES[q.domain]}">Domain ${q.domain}: ${DOMAIN_NAMES[q.domain]}</span>
      <div class="question-text">${q.q}</div>
      ${isMulti ? '<div class="multi-hint">Select ALL that apply</div>' : ''}
      <div class="options">${opts}</div>
      ${exp}
    </div>
    <div class="nav-row">
      <button class="btn btn-secondary" id="prevBtn" ${state.current === 0 ? 'disabled' : ''}>← Previous</button>
      <div style="display:flex;gap:8px;">
        ${submitted || state.mode !== 'timed' ? '' : `<button class="btn btn-secondary" id="skipBtn">Skip</button>`}
        ${!submitted && isMulti && (state.answers[q.id]||[]).length > 0 ? `<button class="btn btn-primary" id="submitBtn">Check Answer</button>` : ''}
      </div>
      <button class="btn btn-secondary" id="nextBtn" ${state.current === state.questions.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>`;
}

function renderResults() {
  const { correct, total, pct } = calcScore();
  const passed = pct >= PASS_SCORE;
  const circumference = 2 * Math.PI * 54;
  const dashOffset = circumference * (1 - pct / 100);
  const ringColor = passed ? '#2ecc71' : '#e74c3c';
  const domainScores = calcDomainScores();

  const domainBars = Object.entries(domainScores).map(([d, s]) => {
    const dpct = Math.round(s.correct / s.total * 100);
    return `<div class="domain-row">
      <div class="domain-label">
        <span>Domain ${d}: ${DOMAIN_NAMES[d]}</span>
        <span>${s.correct}/${s.total} (${dpct}%)</span>
      </div>
      <div class="domain-bar"><div class="domain-fill" style="width:${dpct}%;background:${DOMAIN_COLORS[d]}"></div></div>
    </div>`;
  }).join('');

  const filterBtns = ['all','correct','incorrect','skipped'].map(f =>
    `<button class="btn btn-secondary review-filter ${state.reviewFilter===f?'active':''}" data-filter="${f}" style="${state.reviewFilter===f?'border-color:var(--accent);':''}">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`
  ).join('');

  const reviewItems = state.questions.filter(q => {
    const f = state.reviewFilter;
    const answered = state.submitted[q.id];
    const correct = isCorrect(q.id);
    const skipped = !answered;
    if (f === 'all') return true;
    if (f === 'correct') return correct;
    if (f === 'incorrect') return answered && !correct;
    if (f === 'skipped') return skipped;
    return true;
  }).map(q => {
    const answered = state.submitted[q.id];
    const correct = isCorrect(q.id);
    const skipped = !answered;
    const iconCls = skipped ? 'r-skipped' : correct ? 'r-correct' : 'r-incorrect';
    const icon = skipped ? '?' : correct ? '✓' : '✗';
    return `<div class="review-item">
      <div class="review-q" data-goto="${state.questions.indexOf(q)}">
        <div class="review-icon ${iconCls}">${icon}</div>
        <div><strong>Q${state.questions.indexOf(q)+1}.</strong> ${q.q.substring(0,100)}${q.q.length>100?'…':''}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="screen" style="margin-bottom:24px;">
      <h1>${passed ? '🎉 Passed!' : '📝 Not Passed'}</h1>
      <p>CompTIA Security+ SY0-701 Practice Results</p>
      <div class="score-ring">
        <svg viewBox="0 0 120 120" width="160" height="160">
          <circle class="ring-bg" cx="60" cy="60" r="54"/>
          <circle class="ring-val" cx="60" cy="60" r="54"
            stroke="${ringColor}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${dashOffset}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" style="color:${ringColor}">${pct}%</div>
          <div class="ring-pass" style="color:${ringColor}">${passed ? 'PASS' : 'FAIL'}</div>
        </div>
      </div>
      <div class="info-grid">
        <div class="info-box"><div class="val" style="color:var(--green)">${correct}</div><div class="lbl">Correct</div></div>
        <div class="info-box"><div class="val" style="color:var(--red)">${total - correct}</div><div class="lbl">Incorrect</div></div>
        <div class="info-box"><div class="val">${total}</div><div class="lbl">Total</div></div>
        <div class="info-box"><div class="val" style="color:${passed?'var(--green)':'var(--red)'}">${PASS_SCORE}%</div><div class="lbl">Passing Score</div></div>
      </div>
      <div class="domain-scores">${domainBars}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" id="retryBtn">Retake Exam</button>
        <button class="btn btn-secondary" id="backStartBtn">Back to Start</button>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;">
      <h2 style="margin-bottom:16px;font-size:18px;">Question Review</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">${filterBtns}</div>
      ${reviewItems}
    </div>`;
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
function attachEvents() {
  document.querySelectorAll('[data-mode]').forEach(el => {
    el.addEventListener('click', () => { state.mode = el.dataset.mode; render(); });
  });
  document.querySelectorAll('[data-domain]').forEach(el => {
    el.addEventListener('click', () => { state.filterDomain = parseInt(el.dataset.domain); render(); });
  });
  document.getElementById('startBtn')?.addEventListener('click', startExam);
  document.getElementById('submitAllBtn')?.addEventListener('click', () => {
    if (confirm('Submit the exam? Unanswered questions will be marked as skipped.')) submitAll();
  });
  document.getElementById('submitBtn')?.addEventListener('click', () => {
    const q = state.questions[state.current];
    submitAnswer(q.id);
  });
  document.getElementById('prevBtn')?.addEventListener('click', () => { state.current = Math.max(0, state.current - 1); render(); });
  document.getElementById('nextBtn')?.addEventListener('click', () => { state.current = Math.min(state.questions.length - 1, state.current + 1); render(); });
  document.getElementById('skipBtn')?.addEventListener('click', () => { state.current = Math.min(state.questions.length - 1, state.current + 1); render(); });
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const qid = parseInt(el.dataset.qid);
      const idx = parseInt(el.dataset.idx);
      const q = state.questions.find(x => x.id === qid);
      toggleAnswer(qid, idx, q.multi);
    });
  });
  document.getElementById('retryBtn')?.addEventListener('click', startExam);
  document.getElementById('backStartBtn')?.addEventListener('click', () => {
    clearInterval(state.timerInterval);
    state.screen = 'start';
    render();
  });
  document.querySelectorAll('.review-filter').forEach(el => {
    el.addEventListener('click', () => { state.reviewFilter = el.dataset.filter; render(); });
  });
  document.querySelectorAll('[data-goto]').forEach(el => {
    el.addEventListener('click', () => {
      state.current = parseInt(el.dataset.goto);
      state.screen = 'exam';
      render();
    });
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
render();
</script>
</body>
</html>
