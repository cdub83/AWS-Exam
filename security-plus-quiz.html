<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ (SY0-701) Practice Exam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #252836; --border: #2e3248;
    --accent: #e74c3c; --text: #e8eaf0; --muted: #8b92a8;
    --green: #2ecc71; --red: #e74c3c; --yellow: #f39c12;
    --d1: #a855f7; --d2: #ef4444; --d3: #3b82f6; --d4: #22c55e; --d5: #f59e0b;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  #app { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

  .exam-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
  }
  .exam-title { font-size: 14px; font-weight: 600; color: var(--accent); }
  .exam-meta { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  #timer { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #timer.warning { color: var(--yellow); }
  #timer.danger  { color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s ease; }

  .domain-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px;
  }
  .d1b { background: #2d1a44; color: var(--d1); }
  .d2b { background: #2a1414; color: var(--d2); }
  .d3b { background: #1a2744; color: var(--d3); }
  .d4b { background: #142814; color: var(--d4); }
  .d5b { background: #2f2510; color: var(--d5); }

  .question-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; margin-bottom: 16px;
  }
  .question-num { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .question-text { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .multi-hint { font-size: 12px; color: var(--accent); margin-top: 6px; font-style: italic; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .option {
    display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
  }
  .option:hover:not(.disabled) { border-color: var(--accent); }
  .option.selected  { border-color: var(--accent); background: #2a1212; }
  .option.correct   { border-color: var(--green); background: #122212; }
  .option.incorrect { border-color: var(--red);   background: #221212; }
  .option.disabled  { cursor: default; }
  .option-letter {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--border); display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--muted); transition: background .15s, color .15s;
  }
  .option.selected  .option-letter { background: var(--accent); color: #fff; }
  .option.correct   .option-letter { background: var(--green); color: #000; }
  .option.incorrect .option-letter { background: var(--red);   color: #fff; }
  .option-text { font-size: 14px; padding-top: 2px; }

  .exp-block { margin-top: 16px; border-radius: 8px; overflow: hidden; font-size: 14px; }
  .exp-section { padding: 14px 16px; }
  .exp-section + .exp-section { border-top: 1px solid rgba(255,255,255,.06); }
  .exp-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; margin-bottom: 6px; }
  .exp-correct  { background: #0e2218; }
  .exp-correct  .exp-header { color: var(--green); }
  .exp-wrong    { background: #220e0e; }
  .exp-wrong    .exp-header { color: var(--red); }
  .exp-neutral  { background: var(--surface2); }
  .exp-neutral  .exp-header { color: var(--accent); }
  .exp-wrong-opts { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .exp-wrong-opt  { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; color: #ccc; }
  .exp-wrong-letter { flex-shrink:0; font-weight:700; color: var(--red); min-width:16px; }
  .exp-refs     { background: #111827; }
  .exp-refs     .exp-header { color: #60a5fa; }
  .exp-refs ul  { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .exp-refs a   { color: #60a5fa; text-decoration: none; font-size: 13px; padding: 3px 10px; background: #1a2744; border-radius: 20px; display: inline-block; transition: background .15s; }
  .exp-refs a:hover { background: #243560; }

  .btn { padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: #fff; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }

  .screen { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px 32px; text-align: center; }
  .screen h1 { font-size: 24px; margin-bottom: 8px; }
  .screen p  { color: var(--muted); margin-bottom: 20px; }
  .sec-logo { font-size: 48px; margin-bottom: 16px; }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin: 24px 0; }
  .info-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .info-box .val { font-size: 28px; font-weight: 700; color: var(--accent); }
  .info-box .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .score-ring { position: relative; width: 160px; height: 160px; margin: 0 auto 24px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg  { fill: none; stroke: var(--border); stroke-width: 12; }
  .score-ring .ring-val { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .ring-pct  { font-size: 32px; font-weight: 800; }
  .ring-pass { font-size: 13px; font-weight: 600; margin-top: 2px; }

  .domain-scores { margin: 24px 0; text-align: left; }
  .domain-row { margin-bottom: 10px; }
  .domain-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .domain-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .domain-fill { height: 100%; border-radius: 4px; }

  .review-item { margin-bottom: 12px; }
  .review-q { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; }
  .review-q:hover { border-color: var(--accent); }
  .review-icon { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
  .r-correct   { background: var(--green); color: #000; }
  .r-incorrect { background: var(--red);   color: #fff; }
  .r-skipped   { background: var(--muted); color: #000; }

  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
  .mode-card { background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; text-align: left; transition: border-color .15s; }
  .mode-card:hover, .mode-card.active { border-color: var(--accent); }
  .mode-card h3 { font-size: 15px; margin-bottom: 4px; }
  .mode-card p  { font-size: 12px; color: var(--muted); }

  .domain-filter { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0 8px; justify-content: center; }
  .domain-btn { padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; background: var(--surface2); color: var(--muted); transition: all .15s; }
  .domain-btn.active { color: #fff; }
  .domain-btn.all.active { background: var(--accent); border-color: var(--accent); }
  .domain-btn.d1.active  { background: var(--d1); border-color: var(--d1); }
  .domain-btn.d2.active  { background: var(--d2); border-color: var(--d2); }
  .domain-btn.d3.active  { background: var(--d3); border-color: var(--d3); color: #fff; }
  .domain-btn.d4.active  { background: var(--d4); border-color: var(--d4); color: #000; }
  .domain-btn.d5.active  { background: var(--d5); border-color: var(--d5); color: #000; }

  @media(max-width:600px){ .mode-grid{grid-template-columns:1fr;} .exam-header{flex-direction:column;align-items:flex-start;} .question-card{padding:18px;} }
</style>
</head>
<body>
<nav style="background:#1a1d27;border-bottom:1px solid #2e3248;padding:10px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">

  <a href="security-plus-quiz.html" style="padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;background:#e74c3c;color:#fff;">🔒 Security+</a>

<div id="app"></div>

<script>
// ─────────────────────────────────────────────
//  QUESTION BANK  –  CompTIA Security+ SY0-701
//  Domain 1: General Security Concepts (12%)
//  Domain 2: Threats, Vulnerabilities & Mitigations (22%)
//  Domain 3: Security Architecture (18%)
//  Domain 4: Security Operations (28%)
//  Domain 5: Security Program Management & Oversight (20%)
// ─────────────────────────────────────────────
const QUESTIONS = [

// ══════════════════════════════════════════
//  DOMAIN 1 — General Security Concepts
// ══════════════════════════════════════════
{id:1, domain:1,
 q:"Which security control type is designed to deter an attacker before an incident occurs?",
 opts:["Detective","Corrective","Preventive","Deterrent"],
 correct:[3],
 exp:"Deterrent controls discourage attackers from attempting an attack (e.g., warning signs, visible cameras). Preventive controls block the attack. Detective controls identify that an attack occurred. Corrective controls recover after an attack.",
 we:"Preventive controls (firewalls, access controls) actually stop the attack — deterrents only discourage the attempt. Detective controls (IDS, log monitoring) find attacks that already happened. Corrective controls (backups, patches) restore systems after compromise.",
 refs:[{text:"Security Controls – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"NIST SP 800-53 Control Families",url:"https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"}]},

{id:2, domain:1,
 q:"A company requires employees to use a PIN and a fingerprint to access a secure facility. Which authentication concept does this represent?",
 opts:["Single-factor authentication","Multi-factor authentication (MFA)","Role-based access control","Federated identity"],
 correct:[1],
 exp:"MFA requires two or more factors from different categories: something you know (PIN), something you have (token/card), or something you are (biometric). A PIN + fingerprint combines 'something you know' and 'something you are.'",
 we:"Single-factor uses only one category. RBAC is about authorization, not authentication. Federation links identities across organizations.",
 refs:[{text:"Multi-Factor Authentication – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/multifactor-authentication-sy0-701/"},{text:"NIST SP 800-63B: Authentication",url:"https://pages.nist.gov/800-63-3/sp800-63b.html"}]},

{id:3, domain:1,
 q:"Which cryptographic concept ensures that a sender cannot later deny sending a message?",
 opts:["Confidentiality","Integrity","Non-repudiation","Availability"],
 correct:[2],
 exp:"Non-repudiation, typically implemented with digital signatures, binds an action to an identity in a verifiable way that the sender cannot deny. Confidentiality protects data from unauthorized access. Integrity ensures data hasn't been altered.",
 we:"Confidentiality = encryption (hiding data). Integrity = hashing (detecting modification). Availability = uptime. Non-repudiation = digital signatures (binding action to identity).",
 refs:[{text:"Cryptography Concepts – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cryptography-concepts-sy0-701/"},{text:"NIST Glossary: Non-repudiation",url:"https://csrc.nist.gov/glossary/term/non_repudiation"}]},

{id:4, domain:1,
 q:"Which algorithm is an asymmetric encryption algorithm commonly used for key exchange?",
 opts:["AES-256","SHA-256","RSA","MD5"],
 correct:[2],
 exp:"RSA (Rivest–Shamir–Adleman) is an asymmetric algorithm using public/private key pairs, widely used for key exchange and digital signatures. AES is symmetric. SHA-256 and MD5 are hashing algorithms, not encryption.",
 we:"AES is symmetric (same key encrypts/decrypts). SHA-256 and MD5 are hashes — they produce a digest but aren't used to exchange keys or encrypt data.",
 refs:[{text:"Asymmetric Encryption – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/asymmetric-encryption-sy0-701/"},{text:"NIST Glossary: Asymmetric Key",url:"https://csrc.nist.gov/glossary/term/asymmetric_key"}]},

{id:5, domain:1,
 q:"A security analyst wants to implement the principle of least privilege. Which of the following BEST describes this principle?",
 opts:["Users receive all permissions and access is revoked as needed","Users receive only the minimum access necessary to perform their job","All users share a single privileged account","Administrators approve all user access requests within 24 hours"],
 correct:[1],
 exp:"Least privilege means granting users, processes, and systems only the minimum permissions needed to perform their tasks. This limits blast radius if credentials are compromised.",
 we:"Granting all permissions then revoking is the opposite approach (whitelisting vs. blacklisting). Shared privileged accounts violate accountability. Approval SLAs are a process control, not least privilege.",
 refs:[{text:"Least Privilege – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/least-privilege-sy0-701/"},{text:"NIST Glossary: Least Privilege",url:"https://csrc.nist.gov/glossary/term/least_privilege"}]},

{id:6, domain:1,
 q:"Which hashing algorithm produces a 256-bit digest and is recommended for integrity verification?",
 opts:["MD5","SHA-1","SHA-256","DES"],
 correct:[2],
 exp:"SHA-256 (part of the SHA-2 family) produces a 256-bit hash and is cryptographically secure for integrity verification. MD5 and SHA-1 are deprecated due to collision vulnerabilities. DES is a block cipher, not a hash function.",
 we:"MD5 (128-bit) and SHA-1 (160-bit) both have known collision attacks. DES is symmetric encryption, not hashing.",
 refs:[{text:"Hashing Algorithms – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/hashing-sy0-701/"},{text:"NIST Hash Functions",url:"https://csrc.nist.gov/projects/hash-functions"}]},

{id:7, domain:1,
 q:"Which PKI component is responsible for issuing and signing digital certificates?",
 opts:["Registration Authority (RA)","Certificate Authority (CA)","Certificate Revocation List (CRL)","Online Certificate Status Protocol (OCSP)"],
 correct:[1],
 exp:"A Certificate Authority (CA) issues, signs, and manages digital certificates. The RA handles identity verification before certificate issuance. CRL and OCSP are mechanisms to check whether a certificate has been revoked.",
 we:"RA verifies identity but delegates certificate issuance to the CA. CRL is a list of revoked certs. OCSP is a real-time revocation check protocol.",
 refs:[{text:"Public Key Infrastructure – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/public-key-infrastructure-sy0-701/"},{text:"NIST Glossary: Certificate Authority",url:"https://csrc.nist.gov/glossary/term/certification_authority"}]},

// ══════════════════════════════════════════
//  DOMAIN 2 — Threats, Vulnerabilities & Mitigations
// ══════════════════════════════════════════
{id:8, domain:2,
 q:"An attacker sends an email appearing to be from the CEO asking an employee to wire funds immediately. What type of attack is this?",
 opts:["Phishing","Spear phishing","Whaling","Vishing"],
 correct:[2],
 exp:"Whaling is a targeted phishing attack aimed at high-level executives or that impersonates them. This example impersonates the CEO (a 'whale'). Spear phishing targets specific individuals. Vishing uses voice calls.",
 we:"Generic phishing targets many people with the same message. Spear phishing is targeted but not necessarily CEO-impersonation. Vishing = voice phishing (phone calls).",
 refs:[{text:"Phishing & Social Engineering – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/phishing-sy0-701/"},{text:"CISA Phishing Guidance",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/phishing"}]},

{id:9, domain:2,
 q:"A vulnerability scanner reports a finding with a CVSS base score of 9.8. How should this be prioritized?",
 opts:["Low priority — schedule remediation in the next quarterly cycle","Medium priority — remediate within 90 days","Critical — remediate immediately","Informational — no action required"],
 correct:[2],
 exp:"CVSS scores range from 0–10. A score of 9.8 is Critical (9.0–10.0). Critical vulnerabilities should be patched or mitigated immediately as they represent severe risk with likely exploitability.",
 we:"CVSS ranges: 0.1–3.9 Low, 4.0–6.9 Medium, 7.0–8.9 High, 9.0–10.0 Critical. 9.8 is Critical — not medium or low priority.",
 refs:[{text:"Vulnerability Scanning – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-scanning-sy0-701/"},{text:"NIST NVD CVSS Scores",url:"https://nvd.nist.gov/vuln-metrics/cvss"}]},

{id:10, domain:2,
 q:"Which type of malware disguises itself as legitimate software but performs malicious actions when executed?",
 opts:["Worm","Rootkit","Trojan horse","Ransomware"],
 correct:[2],
 exp:"A Trojan horse appears to be legitimate software but contains hidden malicious code. Unlike worms, Trojans don't self-replicate. Rootkits hide malware presence. Ransomware encrypts files and demands payment.",
 we:"Worms self-replicate across networks without user interaction. Rootkits modify OS to hide their presence. Ransomware specifically encrypts data for extortion.",
 refs:[{text:"Malware Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"CISA Malware Resources",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/malware"}]},

{id:11, domain:2,
 q:"An attacker intercepts communication between two parties and relays messages while secretly reading or modifying them. This is called a:",
 opts:["Denial of Service attack","Man-in-the-Middle (MitM) attack","SQL injection attack","Replay attack"],
 correct:[1],
 exp:"A Man-in-the-Middle (MitM) attack occurs when an attacker secretly intercepts and potentially alters communications between two parties who believe they are communicating directly with each other.",
 we:"DoS attacks disrupt availability. SQL injection targets databases. Replay attacks resend captured valid data — distinct from actively intercepting live communication.",
 refs:[{text:"On-Path (MitM) Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/on-path-attacks-sy0-701/"},{text:"OWASP: Man-in-the-Middle Attack",url:"https://owasp.org/www-community/attacks/Manipulator-in-the-middle_attack"}]},

{id:12, domain:2,
 q:"A web application allows users to enter their name in a form field. An attacker enters a malicious script tag and the script executes in other users' browsers. What vulnerability is this?",
 opts:["SQL Injection","Cross-Site Scripting (XSS)","Command Injection","Directory Traversal"],
 correct:[1],
 exp:"Cross-Site Scripting (XSS) occurs when malicious scripts are injected into web pages and executed in victims' browsers. This is stored or reflected XSS depending on whether it's persisted in the database.",
 we:"SQL injection targets databases via SQL queries. Command injection executes OS commands. Directory traversal navigates outside the web root. XSS = script injection into pages viewed by other users.",
 refs:[{text:"OWASP: Cross-Site Scripting (XSS)",url:"https://owasp.org/www-community/attacks/xss/"},{text:"Injection Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/injection-attacks-sy0-701/"}]},

{id:13, domain:2,
 q:"Which attack technique captures password hashes and uses them to authenticate without knowing the actual plaintext password?",
 opts:["Brute force","Rainbow table attack","Pass-the-hash","Credential stuffing"],
 correct:[2],
 exp:"Pass-the-hash attacks use captured NTLM or other password hashes directly for authentication without cracking them. This works because some protocols accept the hash as proof of identity.",
 we:"Brute force tries all password combinations. Rainbow tables precompute hash-to-password mappings. Credential stuffing uses leaked username/password pairs from other breaches.",
 refs:[{text:"MITRE ATT&CK: Pass the Hash",url:"https://attack.mitre.org/techniques/T1550/002/"},{text:"Password Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"}]},

{id:14, domain:2,
 q:"An organization discovers that an attacker had undetected access to their systems for 8 months. What term describes the time between initial compromise and detection?",
 opts:["Recovery Time Objective (RTO)","Dwell time","Mean Time to Repair (MTTR)","Attack vector"],
 correct:[1],
 exp:"Dwell time (also called time-to-detect or breach detection gap) is the duration an attacker remains in a system undetected after initial compromise. Long dwell time indicates weak detection capabilities.",
 we:"RTO is the maximum acceptable time to restore a system. MTTR is average repair time. Attack vector is the path used to gain access (network, physical, etc.).",
 refs:[{text:"Threat Intelligence – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"IBM Cost of a Data Breach Report",url:"https://www.ibm.com/reports/data-breach"}]},

{id:15, domain:2,
 q:"A company's website becomes unreachable because thousands of compromised computers are flooding it with requests. What type of attack is this?",
 opts:["Phishing","Distributed Denial of Service (DDoS)","SQL Injection","Cross-Site Request Forgery (CSRF)"],
 correct:[1],
 exp:"A DDoS attack uses many distributed systems (often a botnet) to overwhelm a target's resources, making it unavailable to legitimate users. The distributed nature makes it harder to mitigate than a single-source DoS.",
 we:"Phishing targets individuals via deceptive messages. SQL injection targets databases. CSRF tricks users' browsers into making unauthorized requests to trusted sites.",
 refs:[{text:"Denial of Service Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/denial-of-service-sy0-701/"},{text:"CISA: Understanding DDoS Attacks",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/ddos-attacks"}]},

{id:16, domain:2,
 q:"Which vulnerability arises when a program writes more data to a buffer than it was allocated, potentially allowing an attacker to overwrite memory and execute arbitrary code?",
 opts:["SQL injection","Buffer overflow","Cross-site scripting","Integer overflow"],
 correct:[1],
 exp:"A buffer overflow occurs when input data exceeds the buffer's allocated memory size, overwriting adjacent memory. Attackers can exploit this to overwrite the return address and execute shellcode.",
 we:"SQL injection targets query strings. XSS injects scripts into web pages. Integer overflow wraps around numeric limits — related but different from buffer overflows.",
 refs:[{text:"OWASP: Buffer Overflow",url:"https://owasp.org/www-community/vulnerabilities/Buffer_Overflow"},{text:"Application Vulnerabilities – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-vulnerabilities-sy0-701/"}]},

{id:17, domain:2,
 q:"An attacker creates a fake wireless access point with the same SSID as a legitimate corporate network to capture credentials. What is this attack called?",
 opts:["Deauthentication attack","Evil twin attack","Bluejacking","War driving"],
 correct:[1],
 exp:"An evil twin attack creates a rogue AP mimicking a legitimate network. When users connect thinking it's the real network, the attacker can intercept traffic, capture credentials, or perform MitM attacks.",
 we:"Deauthentication attacks force clients to disconnect from APs. Bluejacking sends unsolicited Bluetooth messages. War driving involves scanning for wireless networks from a vehicle.",
 refs:[{text:"Wireless Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/wireless-attacks-sy0-701/"},{text:"CISA: Evil Twin Attacks",url:"https://www.cisa.gov/tips/st05-002"}]},

// ══════════════════════════════════════════
//  DOMAIN 3 — Security Architecture
// ══════════════════════════════════════════
{id:18, domain:3,
 q:"Which network security concept involves dividing a network into smaller segments to contain the spread of threats and enforce security policies between segments?",
 opts:["Network Address Translation (NAT)","Network segmentation","Load balancing","Quality of Service (QoS)"],
 correct:[1],
 exp:"Network segmentation divides a network into zones (e.g., DMZ, internal, management) to limit lateral movement of threats, apply granular access controls, and reduce blast radius of a breach.",
 we:"NAT translates IP addresses for internet access. Load balancing distributes traffic across servers. QoS prioritizes certain traffic types. None of these inherently contain threats like segmentation does.",
 refs:[{text:"Network Segmentation – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-segmentation-sy0-701/"},{text:"NIST Zero Trust: Segmentation",url:"https://csrc.nist.gov/publications/detail/sp/800-207/final"}]},

{id:19, domain:3,
 q:"A company wants to ensure that if one data center fails, operations continue without interruption. Which architecture provides this?",
 opts:["Cold site","Warm site","High availability (active-active)","Data archiving"],
 correct:[2],
 exp:"High availability with active-active architecture runs duplicate systems simultaneously in multiple locations. If one fails, traffic seamlessly shifts to the other with no interruption. Cold and warm sites have delays before becoming operational.",
 we:"Cold site = empty facility, takes days/weeks to activate. Warm site = partially equipped, hours to days. Active-active = continuous failover with no downtime.",
 refs:[{text:"High Availability – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/high-availability-sy0-701/"},{text:"Disaster Recovery Sites – CompTIA",url:"https://www.comptia.org/blog/disaster-recovery-plan"}]},

{id:20, domain:3,
 q:"Which security architecture model operates on the principle of 'never trust, always verify' and requires continuous authentication regardless of network location?",
 opts:["Defense in depth","Zero trust architecture","DMZ model","Perimeter-based security"],
 correct:[1],
 exp:"Zero trust architecture eliminates implicit trust based on network location. Every access request is verified regardless of whether it comes from inside or outside the network perimeter, using identity, device health, and context.",
 we:"Defense in depth uses multiple layered controls but still trusts the internal network. DMZ and perimeter models trust users once they're inside the perimeter — the opposite of zero trust.",
 refs:[{text:"Zero Trust Architecture – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/zero-trust-sy0-701/"},{text:"NIST SP 800-207: Zero Trust Architecture",url:"https://csrc.nist.gov/publications/detail/sp/800-207/final"}]},

{id:21, domain:3,
 q:"An organization needs to store sensitive data in the cloud but wants to ensure the cloud provider cannot access the plaintext data. Which approach achieves this?",
 opts:["Store data in a private cloud","Use client-side encryption before uploading","Enable cloud provider's server-side encryption","Use HTTPS for data transmission"],
 correct:[1],
 exp:"Client-side encryption means the data is encrypted before it leaves the organization's control. The cloud provider receives only ciphertext and never has access to the encryption keys or plaintext.",
 we:"Private cloud doesn't prevent provider access. Server-side encryption means the provider holds the keys. HTTPS protects data in transit, not at rest in the provider's storage.",
 refs:[{text:"Cloud Security – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"NIST Cloud Computing Security",url:"https://csrc.nist.gov/publications/detail/sp/800-144/final"}]},

{id:22, domain:3,
 q:"Which type of firewall can inspect packet contents at the application layer and make decisions based on the application protocol (e.g., HTTP, DNS)?",
 opts:["Packet filter firewall","Stateful inspection firewall","Next-generation firewall (NGFW)","Circuit-level gateway"],
 correct:[2],
 exp:"Next-generation firewalls (NGFW) perform deep packet inspection at the application layer (Layer 7), can identify specific applications regardless of port, and integrate IPS, SSL inspection, and user identity awareness.",
 we:"Packet filters only check headers (Layer 3/4). Stateful firewalls track connection state but not application content. Circuit-level gateways monitor TCP handshakes (Layer 5) but not application data.",
 refs:[{text:"Firewalls – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/firewalls-sy0-701/"},{text:"NIST Glossary: Next-Generation Firewall",url:"https://csrc.nist.gov/glossary/term/next_generation_firewall"}]},

{id:23, domain:3,
 q:"A company hosts web servers that must be accessible from the internet while protecting internal systems. In which network zone should the web servers be placed?",
 opts:["Internal LAN","DMZ (Demilitarized Zone)","Management VLAN","Air-gapped network"],
 correct:[1],
 exp:"A DMZ is a network zone between the internet and the internal network. Public-facing servers (web, email, DNS) are placed here so that if compromised, attackers cannot directly access the internal LAN.",
 we:"Internal LAN should be shielded from direct internet exposure. Management VLAN is for network device administration. Air-gapped networks have no internet connection at all.",
 refs:[{text:"DMZ Architecture – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-segmentation-sy0-701/"},{text:"NIST Glossary: DMZ",url:"https://csrc.nist.gov/glossary/term/demilitarized_zone"}]},

{id:24, domain:3,
 q:"Which cloud deployment model is dedicated to a single organization and can be hosted on-premises or by a third-party provider?",
 opts:["Public cloud","Community cloud","Private cloud","Hybrid cloud"],
 correct:[2],
 exp:"A private cloud is exclusive to one organization, offering dedicated resources and greater control over security and compliance. It can be on-premises or hosted externally but resources are not shared with other organizations.",
 we:"Public cloud = shared multi-tenant environment (AWS, Azure, GCP). Community cloud = shared by organizations with common requirements. Hybrid = combination of private and public.",
 refs:[{text:"Cloud Deployment Models – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-deployment-models-sy0-701/"},{text:"NIST Cloud Computing Definition",url:"https://csrc.nist.gov/publications/detail/sp/800-145/final"}]},

{id:25, domain:3,
 q:"Which RAID level provides fault tolerance by mirroring data across two drives, with no performance penalty on reads?",
 opts:["RAID 0","RAID 1","RAID 5","RAID 6"],
 correct:[1],
 exp:"RAID 1 mirrors identical data on two drives. It provides fault tolerance (one drive can fail) and improved read performance since either drive can service requests. RAID 0 stripes with no redundancy. RAID 5/6 use parity.",
 we:"RAID 0 offers performance but zero fault tolerance. RAID 5 uses parity (can survive 1 drive failure). RAID 6 uses double parity (can survive 2 failures). RAID 1 is pure mirroring.",
 refs:[{text:"Redundancy & Fault Tolerance – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/redundancy-sy0-701/"},{text:"RAID Levels Explained – CompTIA",url:"https://www.comptia.org/blog/raid-explained"}]},

// ══════════════════════════════════════════
//  DOMAIN 4 — Security Operations
// ══════════════════════════════════════════
{id:26, domain:4,
 q:"A security analyst receives an alert about suspicious outbound traffic from an internal host to an unknown IP on port 443. What should be the FIRST step?",
 opts:["Immediately block the IP at the firewall","Identify and analyze the traffic to determine if it is malicious","Reimage the affected host","Notify law enforcement"],
 correct:[1],
 exp:"The first step in incident response is identification/analysis — gather information to determine whether the event is truly malicious. Blocking prematurely could destroy evidence or disrupt legitimate traffic. Reimaging destroys forensic data.",
 we:"Containment (firewall block) comes AFTER confirming the incident. Reimaging is a later step in eradication. Law enforcement notification is reserved for confirmed significant incidents.",
 refs:[{text:"Incident Response – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"NIST SP 800-61: Computer Security Incident Handling",url:"https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"}]},

{id:27, domain:4,
 q:"Which tool monitors network traffic in real time and generates alerts based on predefined signatures or anomalous behavior?",
 opts:["SIEM","IDS/IPS","Vulnerability scanner","DLP system"],
 correct:[1],
 exp:"An Intrusion Detection System (IDS) monitors traffic and alerts on suspicious patterns. An Intrusion Prevention System (IPS) can also block detected threats. Both use signature-based and/or anomaly-based detection.",
 we:"SIEM aggregates and correlates logs from multiple sources — it doesn't directly inspect network traffic. Vulnerability scanners find weaknesses, not real-time threats. DLP prevents data exfiltration.",
 refs:[{text:"IDS vs IPS – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/intrusion-detection-and-prevention-sy0-701/"},{text:"NIST Glossary: Intrusion Detection System",url:"https://csrc.nist.gov/glossary/term/intrusion_detection_system"}]},

{id:28, domain:4,
 q:"A forensic analyst is examining a hard drive. To ensure evidence integrity, which action must be performed BEFORE analysis?",
 opts:["Boot the drive normally to access files","Create a forensic image (bit-for-bit copy) and verify with a hash","Defragment the drive to improve analysis speed","Run antivirus software to remove any malware"],
 correct:[1],
 exp:"A forensic image preserves the original evidence. Hashing before and after imaging (e.g., MD5/SHA-256) verifies the copy is identical to the original. Analysis is always performed on the copy, preserving chain of custody.",
 we:"Booting the drive modifies timestamps and potentially other data. Defragmentation destroys forensic evidence. Running AV changes files on the original drive, tainting the evidence.",
 refs:[{text:"Digital Forensics – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-forensics-sy0-701/"},{text:"NIST SP 800-86: Guide to Integrating Forensic Techniques",url:"https://csrc.nist.gov/publications/detail/sp/800-86/final"}]},

{id:29, domain:4,
 q:"Which log source would BEST help determine which user account logged into a Windows system at a specific time?",
 opts:["Application event log","Windows Security event log","System event log","DNS server log"],
 correct:[1],
 exp:"The Windows Security event log records authentication events, including successful and failed logons (Event IDs 4624, 4625), privilege use, and account management changes. It is the primary source for user authentication forensics.",
 we:"Application logs record app-specific events. System logs record OS/hardware events. DNS logs show name resolution queries but not user logons.",
 refs:[{text:"Log Files – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/log-files-sy0-701/"},{text:"Microsoft: Windows Security Audit Events",url:"https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/audit-logon"}]},

{id:30, domain:4,
 q:"An organization wants to continuously monitor all sensitive data leaving the network via email, USB, and web uploads. Which technology addresses this?",
 opts:["IDS/IPS","Data Loss Prevention (DLP)","Web Application Firewall (WAF)","Security Information and Event Management (SIEM)"],
 correct:[1],
 exp:"DLP systems monitor, detect, and block unauthorized transmission of sensitive data across multiple channels (email, web, removable media). They inspect content and apply policies based on data classification.",
 we:"IDS/IPS focuses on threat detection, not data content inspection. WAF protects web applications from attacks. SIEM aggregates logs for correlation — doesn't block data exfiltration directly.",
 refs:[{text:"Data Loss Prevention – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-loss-prevention-sy0-701/"},{text:"NIST Glossary: Data Loss Prevention",url:"https://csrc.nist.gov/glossary/term/data_loss_prevention"}]},

{id:31, domain:4,
 q:"Which vulnerability management process step involves applying patches and configuration changes to eliminate identified vulnerabilities?",
 opts:["Discovery","Prioritization","Remediation","Reporting"],
 correct:[2],
 exp:"The vulnerability management lifecycle: Discovery (scanning) → Assessment (CVSS scoring) → Prioritization (risk ranking) → Remediation (patching, configuration changes) → Reporting (documenting results). Remediation is the active fix step.",
 we:"Discovery finds vulnerabilities. Prioritization ranks them. Reporting documents the process. Remediation is the actual fix.",
 refs:[{text:"Vulnerability Management – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-management-sy0-701/"},{text:"NIST SP 800-40: Patch Management Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-40/rev-4/final"}]},

{id:32, domain:4,
 q:"A security engineer is hardening a new Linux server. Which of the following is MOST important as a first step?",
 opts:["Install a host-based firewall","Remove or disable unnecessary services and accounts","Enable full-disk encryption","Configure intrusion detection"],
 correct:[1],
 exp:"Reducing the attack surface by removing unnecessary services, packages, and accounts is the foundational hardening step. Every running service is a potential attack vector. Other controls protect the surface that remains.",
 we:"A firewall, encryption, and IDS are all important, but they protect a surface. If that surface contains unnecessary services/accounts, each one is a potential compromise point. Reduce surface first.",
 refs:[{text:"System Hardening – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/hardening-sy0-701/"},{text:"CIS Benchmarks for Hardening",url:"https://www.cisecurity.org/cis-benchmarks/"}]},

{id:33, domain:4,
 q:"During a penetration test, an attacker exploits a system and then uses it to attack other internal systems. What technique is being used?",
 opts:["Privilege escalation","Lateral movement","Exfiltration","Persistence"],
 correct:[1],
 exp:"Lateral movement refers to techniques used by attackers to progressively move through a network after initial compromise, seeking additional systems, data, or elevated credentials. It's the 'spread' phase of an attack.",
 we:"Privilege escalation gains higher permissions on the same system. Exfiltration is data theft. Persistence maintains access after reboots. Lateral movement = moving to other systems.",
 refs:[{text:"MITRE ATT&CK: Lateral Movement",url:"https://attack.mitre.org/tactics/TA0008/"},{text:"Penetration Testing – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"}]},

{id:34, domain:4,
 q:"Which incident response phase involves restoring affected systems to normal operations after a security incident?",
 opts:["Identification","Containment","Recovery","Lessons learned"],
 correct:[2],
 exp:"The NIST incident response phases: Preparation → Identification → Containment → Eradication → Recovery → Lessons Learned. Recovery restores systems to normal, verified operation after threats are eliminated.",
 we:"Identification = detecting/confirming the incident. Containment = limiting spread. Eradication = removing the threat. Recovery = restoring operations. Lessons learned = post-incident review.",
 refs:[{text:"Incident Response Phases – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"NIST SP 800-61: IR Life Cycle",url:"https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"}]},

{id:35, domain:4,
 q:"A company wants to test its security controls by simulating real-world attacks using threat intelligence, without prior knowledge of the defenses. Which assessment type is this?",
 opts:["White-box penetration test","Gray-box penetration test","Red team exercise","Vulnerability scan"],
 correct:[2],
 exp:"A red team exercise simulates real-world adversaries using threat intelligence and attack techniques against the full organization, including people, processes, and technology. The defenders (blue team) are typically unaware, testing actual detection/response capability.",
 we:"White-box = full knowledge of target systems. Gray-box = partial knowledge. Vulnerability scan is automated and passive. Red team = adversarial simulation, no prior knowledge.",
 refs:[{text:"Penetration Testing – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"},{text:"NIST SP 800-115: Technical Guide to Security Testing",url:"https://csrc.nist.gov/publications/detail/sp/800-115/final"}]},

{id:36, domain:4,
 q:"Which security monitoring tool aggregates logs from multiple sources, correlates events, and provides centralized alerting and reporting?",
 opts:["IDS","WAF","SIEM","DLP"],
 correct:[2],
 exp:"A SIEM (Security Information and Event Management) collects and aggregates logs from firewalls, servers, endpoints, and applications, correlates events to detect patterns, and generates alerts for the SOC team.",
 we:"IDS monitors network traffic for intrusions. WAF protects web apps. DLP prevents data leakage. SIEM is the aggregation/correlation platform.",
 refs:[{text:"SIEM – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/siem-sy0-701/"},{text:"NIST Glossary: SIEM",url:"https://csrc.nist.gov/glossary/term/security_information_and_event_management"}]},

{id:37, domain:4,
 q:"An analyst discovers malware on a host that is actively communicating with a command-and-control server. What is the CORRECT immediate containment action?",
 opts:["Power off the system immediately","Isolate the host from the network while keeping it powered on","Delete the malware files manually","Restore from backup immediately"],
 correct:[1],
 exp:"Network isolation (disconnecting from the network while powered on) stops C2 communication and prevents lateral movement while preserving volatile memory evidence (RAM, running processes) for forensic analysis. Powering off loses volatile data.",
 we:"Immediate power-off loses volatile memory (RAM) which may contain decryption keys or IOCs. Deleting files isn't containment and may miss persistence mechanisms. Restore comes during the recovery phase, not containment.",
 refs:[{text:"Incident Response Containment – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"CISA: Malware Incident Prevention & Handling",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/malware"}]},

// ══════════════════════════════════════════
//  DOMAIN 5 — Security Program Management & Oversight
// ══════════════════════════════════════════
{id:38, domain:5,
 q:"Which risk response strategy involves purchasing insurance to transfer financial risk to a third party?",
 opts:["Risk avoidance","Risk mitigation","Risk transference","Risk acceptance"],
 correct:[2],
 exp:"Risk transference shifts the financial impact of a risk to a third party, typically through insurance or contractual agreements. It doesn't eliminate the risk but reduces its financial impact on the organization.",
 we:"Risk avoidance = stopping the risky activity entirely. Risk mitigation = implementing controls to reduce likelihood/impact. Risk acceptance = acknowledging the risk and choosing to live with it.",
 refs:[{text:"Risk Management – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST SP 800-30: Risk Assessment Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"}]},

{id:39, domain:5,
 q:"A company stores customer credit card data and must comply with security requirements for payment processing. Which standard applies?",
 opts:["HIPAA","PCI DSS","GDPR","SOX"],
 correct:[1],
 exp:"PCI DSS (Payment Card Industry Data Security Standard) applies to any organization that stores, processes, or transmits cardholder data. It mandates encryption, access controls, monitoring, and regular assessments.",
 we:"HIPAA governs healthcare data. GDPR governs EU personal data privacy. SOX (Sarbanes-Oxley) governs financial reporting for public companies. PCI DSS = payment card data.",
 refs:[{text:"Regulations & Compliance – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"PCI DSS Official Documentation",url:"https://www.pcisecuritystandards.org/document_library/"}]},

{id:40, domain:5,
 q:"Which document describes an organization's security expectations, rules, and procedures that all employees must follow?",
 opts:["Security policy","Risk register","Business continuity plan","Vulnerability assessment report"],
 correct:[0],
 exp:"A security policy is a formal document that defines the organization's security objectives, acceptable use rules, responsibilities, and consequences for violations. It is the foundation of a security program.",
 we:"Risk register tracks identified risks. BCP plans for continuing operations during disruptions. Vulnerability assessment reports document security weaknesses. Policy = the governance document.",
 refs:[{text:"Security Policies – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-policies-sy0-701/"},{text:"NIST SP 800-12: Information Security Policy",url:"https://csrc.nist.gov/publications/detail/sp/800-12/rev-1/final"}]},

{id:41, domain:5,
 q:"An organization processes personal data of EU citizens. Which regulation requires explicit consent for data processing and grants individuals the right to be forgotten?",
 opts:["PCI DSS","HIPAA","GDPR","NIST CSF"],
 correct:[2],
 exp:"The General Data Protection Regulation (GDPR) governs processing of EU citizens' personal data, requiring lawful basis (often consent), data minimization, breach notification, and rights including erasure ('right to be forgotten').",
 we:"PCI DSS = payment card data. HIPAA = US healthcare data. NIST CSF is a voluntary cybersecurity framework, not a regulation. GDPR = EU personal data.",
 refs:[{text:"Data Privacy Regulations – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"GDPR Official Text",url:"https://gdpr.eu/what-is-gdpr/"}]},

{id:42, domain:5,
 q:"Which metric represents the average time between failures of a system and is used to measure reliability?",
 opts:["RTO (Recovery Time Objective)","RPO (Recovery Point Objective)","MTBF (Mean Time Between Failures)","MTTR (Mean Time to Repair)"],
 correct:[2],
 exp:"MTBF measures the average time a system operates before failing — a reliability metric. Higher MTBF = more reliable. MTTR measures repair time. RTO and RPO are disaster recovery objectives.",
 we:"RTO = max acceptable downtime before recovery. RPO = max acceptable data loss (time). MTTR = average time to fix a failure. MTBF = average time BETWEEN failures (reliability).",
 refs:[{text:"Availability Concepts – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/availability-sy0-701/"},{text:"NIST Glossary: Mean Time Between Failures",url:"https://csrc.nist.gov/glossary/term/mean_time_between_failures"}]},

{id:43, domain:5,
 q:"A security manager wants to ensure that no single employee can complete a critical transaction without involvement from another employee. Which control achieves this?",
 opts:["Least privilege","Separation of duties","Job rotation","Mandatory vacation"],
 correct:[1],
 exp:"Separation of duties (SoD) requires that critical tasks be split between two or more people. This prevents fraud, errors, and insider threats because no single person has end-to-end control of sensitive processes.",
 we:"Least privilege limits permissions. Job rotation moves employees between roles. Mandatory vacation forces others to cover work, exposing fraud. SoD = splitting critical tasks across people.",
 refs:[{text:"Personnel Security – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/personnel-security-sy0-701/"},{text:"NIST Glossary: Separation of Duties",url:"https://csrc.nist.gov/glossary/term/separation_of_duty"}]},

{id:44, domain:5,
 q:"An organization conducts an annual tabletop exercise where staff discuss their response to a simulated ransomware attack. What is the PRIMARY purpose of this exercise?",
 opts:["To identify vulnerabilities in production systems","To test the effectiveness of incident response plans without disrupting operations","To fulfill penetration testing requirements","To train employees on phishing awareness"],
 correct:[1],
 exp:"Tabletop exercises are discussion-based simulations where participants walk through a scenario to identify gaps in plans, communications, and decision-making — without actually executing any real actions. They validate IR plans safely.",
 we:"Vulnerability identification requires scanning tools. Pen tests actively exploit systems. Phishing training uses simulated phishing campaigns. Tabletop exercises = plan validation through discussion.",
 refs:[{text:"Tabletop Exercises – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/tabletop-exercises-sy0-701/"},{text:"CISA: Tabletop Exercise Packages",url:"https://www.cisa.gov/resources-tools/services/tabletop-exercise-packages"}]},

{id:45, domain:5,
 q:"Which framework provides a voluntary, risk-based approach to managing cybersecurity risk using five core functions: Identify, Protect, Detect, Respond, and Recover?",
 opts:["ISO 27001","PCI DSS","NIST Cybersecurity Framework (CSF)","CIS Controls"],
 correct:[2],
 exp:"The NIST Cybersecurity Framework (CSF) organizes cybersecurity activities into five core functions: Identify, Protect, Detect, Respond, and Recover. It's voluntary and adaptable to any organization size or sector.",
 we:"ISO 27001 is a certification standard for information security management. PCI DSS is a payment card compliance mandate. CIS Controls are prescriptive security best practices. NIST CSF = the five-function framework.",
 refs:[{text:"Frameworks & Regulations – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-frameworks-sy0-701/"},{text:"NIST Cybersecurity Framework (CSF)",url:"https://www.nist.gov/cyberframework"}]},

// Additional questions across all domains
{id:46, domain:1,
 q:"Which type of access control model assigns permissions based on a user's role within the organization?",
 opts:["Discretionary Access Control (DAC)","Mandatory Access Control (MAC)","Role-Based Access Control (RBAC)","Attribute-Based Access Control (ABAC)"],
 correct:[2],
 exp:"RBAC assigns permissions to roles (e.g., 'Finance Manager', 'IT Admin'), and users are assigned to roles. This simplifies administration — changing a role's permissions instantly affects all users in that role.",
 we:"DAC = owner controls access. MAC = system enforces classification labels. RBAC = role determines access. ABAC = fine-grained policies using attributes (user, resource, environment).",
 refs:[{text:"Access Control Models – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/access-control-models-sy0-701/"},{text:"NIST Glossary: Role-Based Access Control",url:"https://csrc.nist.gov/glossary/term/role_based_access_control"}]},

{id:47, domain:2,
 q:"An attacker repeatedly tries combinations of usernames and passwords from a list of commonly used credentials. What type of attack is this?",
 opts:["Brute force attack","Dictionary attack","Credential stuffing","Password spraying"],
 correct:[1],
 exp:"A dictionary attack uses a predefined list of common passwords or words to try against an account. It's more targeted than brute force (which tries all combinations) but less targeted than credential stuffing (which uses actual leaked credentials).",
 we:"Brute force = tries all possible combinations. Dictionary = tries a wordlist. Credential stuffing = uses actual breached username/password pairs from other sites. Password spraying = tries one common password across many accounts.",
 refs:[{text:"Password Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"MITRE ATT&CK: Brute Force",url:"https://attack.mitre.org/techniques/T1110/"}]},

{id:48, domain:2,
 q:"A company's DNS server is manipulated so that queries for legitimate websites return malicious IP addresses. What type of attack is this?",
 opts:["DNS hijacking / DNS poisoning","ARP spoofing","BGP hijacking","SSL stripping"],
 correct:[0],
 exp:"DNS poisoning (cache poisoning) or DNS hijacking corrupts DNS resolver caches so domain names resolve to attacker-controlled IP addresses, redirecting users to malicious sites while they believe they're visiting legitimate ones.",
 we:"ARP spoofing maps IP addresses to attacker's MAC on the local network. BGP hijacking redirects internet routing. SSL stripping downgrades HTTPS to HTTP.",
 refs:[{text:"DNS Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/dns-attacks-sy0-701/"},{text:"CISA: DNS Infrastructure Hijacking",url:"https://www.cisa.gov/news-events/alerts/2019/01/24/dns-infrastructure-tampering"}]},

{id:49, domain:3,
 q:"Which technology creates an encrypted tunnel over the internet to securely connect remote users to a corporate network?",
 opts:["VPN (Virtual Private Network)","VLAN","NAT","DMZ"],
 correct:[0],
 exp:"A VPN creates an encrypted tunnel between a remote user/site and the corporate network over the public internet. Common protocols include IPsec, SSL/TLS, and OpenVPN. It ensures confidentiality and integrity of remote access traffic.",
 we:"VLAN = network segmentation at Layer 2. NAT = translates private IPs to public IPs. DMZ = network zone for public-facing servers. VPN = encrypted remote access tunnel.",
 refs:[{text:"VPN Technologies – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vpns-sy0-701/"},{text:"NIST Glossary: Virtual Private Network",url:"https://csrc.nist.gov/glossary/term/virtual_private_network"}]},

{id:50, domain:3,
 q:"An organization implements redundant internet connections from two different ISPs. Which concept does this exemplify?",
 opts:["Load balancing","High availability / Redundancy","Fault tolerance","Scalability"],
 correct:[1],
 exp:"Using multiple ISPs provides redundancy — if one ISP fails, traffic routes through the other. This improves availability. Fault tolerance means the system continues operating despite failures. In practice, this setup achieves both redundancy and fault tolerance.",
 we:"Load balancing distributes traffic for performance. Scalability handles growth. Redundancy/high availability = eliminating single points of failure. Both B and C apply here, but redundancy is the design concept.",
 refs:[{text:"Redundancy & High Availability – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/redundancy-sy0-701/"},{text:"NIST Glossary: High Availability",url:"https://csrc.nist.gov/glossary/term/high_availability"}]},

{id:51, domain:4,
 q:"Which phase of the Cyber Kill Chain involves the attacker researching the target to identify vulnerabilities and attack vectors?",
 opts:["Weaponization","Delivery","Reconnaissance","Exploitation"],
 correct:[2],
 exp:"Reconnaissance is the first phase of the Cyber Kill Chain (Lockheed Martin model). Attackers gather information about the target (OSINT, network scanning, social engineering) to identify vulnerabilities before crafting an attack.",
 we:"Weaponization = creating the exploit/malware. Delivery = transmitting the weapon to the target. Exploitation = triggering the vulnerability. Reconnaissance = information gathering (first phase).",
 refs:[{text:"Threat Intelligence – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"Lockheed Martin Cyber Kill Chain",url:"https://www.lockheedmartin.com/en-us/capabilities/cyber/cyber-kill-chain.html"}]},

{id:52, domain:4,
 q:"A threat intelligence analyst receives a feed containing IP addresses, domain names, and file hashes associated with a threat actor. What are these called?",
 opts:["Attack vectors","Indicators of Compromise (IOCs)","CVEs","TTPs (Tactics, Techniques, and Procedures)"],
 correct:[1],
 exp:"Indicators of Compromise (IOCs) are forensic artifacts (IP addresses, domains, hashes, URLs) that indicate a system may have been breached or is being targeted. They enable automated detection in SIEM/IDS systems.",
 we:"Attack vectors are the methods used to gain access. CVEs are publicly disclosed vulnerability identifiers. TTPs describe how threat actors operate at a higher abstraction level. IOCs = specific observable artifacts.",
 refs:[{text:"Indicators of Compromise – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"MITRE ATT&CK: Tactics & Techniques",url:"https://attack.mitre.org/"}]},

{id:53, domain:5,
 q:"What is the PRIMARY difference between a Business Continuity Plan (BCP) and a Disaster Recovery Plan (DRP)?",
 opts:["BCP focuses on IT systems; DRP focuses on business processes","BCP focuses on maintaining business operations during a disruption; DRP focuses on restoring IT systems after a disaster","BCP is for natural disasters only; DRP is for cyberattacks","There is no difference; they are the same document"],
 correct:[1],
 exp:"A BCP (Business Continuity Plan) addresses how the organization continues operating during a disruption (people, processes, facilities). A DRP (Disaster Recovery Plan) specifically addresses restoring IT infrastructure and data after a disaster. DRP is often a subset of BCP.",
 we:"BCP is broader than IT — it covers all business functions. DRP is IT-focused recovery. Both cover various disaster types, not just specific ones.",
 refs:[{text:"Business Continuity – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/business-continuity-sy0-701/"},{text:"NIST SP 800-34: Contingency Planning Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

{id:54, domain:2,
 q:"An attacker sends a link in an email to a specific department's employees, directing them to a fake login page that mirrors the company's internal portal. This is BEST described as:",
 opts:["Phishing","Spear phishing","Vishing","Smishing"],
 correct:[1],
 exp:"Spear phishing is a targeted phishing attack directed at a specific group, individual, or organization. Unlike generic phishing, it uses personalized details to appear more convincing. Targeting a specific department is a hallmark of spear phishing.",
 we:"Generic phishing = mass untargeted emails. Vishing = voice/phone phishing. Smishing = SMS phishing. Spear phishing = targeted, personalized email attack.",
 refs:[{text:"Phishing Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/phishing-sy0-701/"},{text:"CISA: Phishing Guidance",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/phishing"}]},

{id:55, domain:4,
 q:"Which concept ensures that multiple independent approvals are required before a critical action can be executed, such as deploying to production?",
 opts:["Least privilege","Separation of duties","Multi-person integrity (MPI)","Need-to-know"],
 correct:[2],
 exp:"Multi-person integrity (MPI), also called two-person integrity or dual control, requires two or more authorized people to be present/approve a critical action. It prevents a single insider from acting unilaterally on sensitive operations.",
 we:"Least privilege limits permissions. Separation of duties splits tasks across roles. Need-to-know limits access to relevant information. MPI = multiple approvers required for a single critical action.",
 refs:[{text:"Personnel Security Controls – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/personnel-security-sy0-701/"},{text:"NIST Glossary: Two-Person Integrity",url:"https://csrc.nist.gov/glossary/term/two_person_integrity"}]},

{id:56, domain:3,
 q:"Which cloud service model provides virtualized computing resources (VMs, storage, networking) without managing the underlying hardware?",
 opts:["SaaS (Software as a Service)","PaaS (Platform as a Service)","IaaS (Infrastructure as a Service)","FaaS (Function as a Service)"],
 correct:[2],
 exp:"IaaS provides virtualized hardware resources. The customer manages OS, middleware, and applications. Examples: AWS EC2, Azure VMs, Google Compute Engine. The cloud provider manages physical hardware, virtualization, networking infrastructure.",
 we:"SaaS = fully managed applications (e.g., Gmail, Salesforce). PaaS = managed platform for app development (e.g., Azure App Service). IaaS = VMs and infrastructure. FaaS = serverless function execution.",
 refs:[{text:"Cloud Service Models – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-deployment-models-sy0-701/"},{text:"NIST Cloud Computing (SP 800-145)",url:"https://csrc.nist.gov/publications/detail/sp/800-145/final"}]},

{id:57, domain:1,
 q:"A digital certificate has expired but the server continues to use it. What is the PRIMARY security concern?",
 opts:["Performance degradation","The certificate may no longer be trusted by clients, and revocation cannot be verified","The encryption algorithm changes after expiry","Data is no longer encrypted after certificate expiry"],
 correct:[1],
 exp:"Expired certificates are no longer trusted by browsers/clients, causing connection errors. More importantly, the CA cannot vouch for the certificate's current validity — the entity's identity can no longer be verified, defeating the purpose of PKI.",
 we:"Expiry doesn't affect encryption algorithm or stop encryption. Performance is unrelated. The core issue is trust — clients will refuse the connection or warn users.",
 refs:[{text:"PKI & Certificates – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/public-key-infrastructure-sy0-701/"},{text:"NIST Glossary: Certificate Expiration",url:"https://csrc.nist.gov/glossary/term/certificate_expiration"}]},

{id:58, domain:5,
 q:"An organization wants to assess security risks from a third-party vendor who has access to their network. Which process addresses this?",
 opts:["Penetration testing the vendor","Third-party risk management / vendor assessment","Red team exercise","Vulnerability scanning"],
 correct:[1],
 exp:"Third-party risk management involves assessing vendors, partners, and suppliers who have access to your data or systems. This includes security questionnaires, audits, contract requirements (SLAs, right-to-audit clauses), and ongoing monitoring.",
 we:"Pen testing the vendor may exceed your authorization. Red team exercises assess your own defenses. Vulnerability scanning targets your own systems. Third-party risk management = formal vendor security assessment process.",
 refs:[{text:"Third-Party Risk – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/third-party-risk-sy0-701/"},{text:"NIST SP 800-161: Supply Chain Risk Management",url:"https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"}]},

{id:59, domain:2,
 q:"Which type of social engineering attack involves leaving infected USB drives in a parking lot hoping an employee will plug one in?",
 opts:["Tailgating","Baiting","Pretexting","Quid pro quo"],
 correct:[1],
 exp:"Baiting uses physical media (USB drives, CDs) left in locations where targets will find and use them out of curiosity or greed. When plugged in, the malware executes automatically or when the user opens files.",
 we:"Tailgating = following someone through a secure door. Pretexting = creating a fabricated scenario to manipulate the target. Quid pro quo = offering something (e.g., tech support) in exchange for information. Baiting = physical lure (USB, download).",
 refs:[{text:"Social Engineering – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/social-engineering-sy0-701/"},{text:"CISA: Social Engineering & Phishing",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/social-engineering"}]},

{id:60, domain:4,
 q:"Which security assessment technique involves testing systems from the perspective of an attacker without any prior knowledge of the target's internal architecture?",
 opts:["White-box testing","Gray-box testing","Black-box testing","Code review"],
 correct:[2],
 exp:"Black-box testing simulates an external attacker with no knowledge of the internal system. The tester only knows publicly available information, testing what a real attacker could discover. White-box provides full knowledge; gray-box provides partial knowledge.",
 we:"White-box = full knowledge (source code, architecture diagrams). Gray-box = partial knowledge (some internal details). Black-box = zero knowledge (simulates external attacker). Code review = static analysis of source code."},

// ══════════════════════════════════════════
//  ADDITIONAL QUESTIONS — All Domains
// ══════════════════════════════════════════

// Domain 1 — General Security Concepts
{id:61, domain:1,
 q:"Which type of cipher encrypts data one bit or byte at a time, commonly used in streaming media?",
 opts:["Block cipher","Stream cipher","Asymmetric cipher","Hash cipher"],
 correct:[1],
 exp:"Stream ciphers encrypt data one bit or byte at a time using a keystream, making them ideal for real-time streaming where data arrives continuously. RC4 is a classic example. Block ciphers encrypt fixed-size chunks (e.g., AES with 128-bit blocks).",
 we:"Block ciphers (AES, DES) process fixed-size blocks. Asymmetric ciphers use key pairs. 'Hash cipher' is not a real category — hashes are one-way functions, not ciphers.",
 refs:[{text:"Symmetric Encryption – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/symmetric-encryption-sy0-701/"},{text:"NIST Glossary: Stream Cipher",url:"https://csrc.nist.gov/glossary/term/stream_cipher"}]},

{id:62, domain:1,
 q:"A user receives a one-time code via SMS to complete login after entering their password. Which authentication factor category does the SMS code represent?",
 opts:["Something you know","Something you have","Something you are","Somewhere you are"],
 correct:[1],
 exp:"An SMS code sent to a registered phone represents 'something you have' — possession of the phone. The password is 'something you know.' Together they form MFA.",
 we:"Something you know = password/PIN. Something you are = biometrics. Somewhere you are = geolocation/IP-based controls. SMS OTP = something you have (the phone).",
 refs:[{text:"Authentication Factors – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/multifactor-authentication-sy0-701/"},{text:"NIST SP 800-63B: Authentication Types",url:"https://pages.nist.gov/800-63-3/sp800-63b.html"}]},

{id:63, domain:1,
 q:"Which protocol provides secure key exchange using asymmetric cryptography so that two parties can establish a shared secret over an untrusted channel?",
 opts:["AES","Diffie-Hellman","SHA-256","HMAC"],
 correct:[1],
 exp:"Diffie-Hellman (DH) key exchange allows two parties to derive a shared secret over an insecure channel without transmitting the secret itself. The shared secret is then used for symmetric encryption. ECDH is the elliptic-curve variant.",
 we:"AES is symmetric encryption. SHA-256 is a hash function. HMAC provides message authentication. Diffie-Hellman = key exchange protocol.",
 refs:[{text:"Key Exchange – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/key-exchange-sy0-701/"},{text:"NIST Glossary: Diffie-Hellman",url:"https://csrc.nist.gov/glossary/term/diffie_hellman_key_agreement"}]},

{id:64, domain:1,
 q:"What is the purpose of salting a password before hashing it?",
 opts:["To speed up the hashing process","To prevent rainbow table attacks by adding unique random data","To encrypt the password with a secret key","To make the hash reversible"],
 correct:[1],
 exp:"A salt is a random value added to a password before hashing. This ensures that even identical passwords produce different hashes, making precomputed rainbow table attacks ineffective.",
 we:"Salting typically slows hashing slightly, not speeds it up. It doesn't encrypt the password. Hashes are one-way — salting doesn't make them reversible.",
 refs:[{text:"Password Storage – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"OWASP: Password Storage Cheat Sheet",url:"https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"}]},

{id:65, domain:1,
 q:"Which access control model is commonly used in government/military environments and assigns labels such as Top Secret, Secret, and Confidential to data?",
 opts:["RBAC","DAC","MAC","ABAC"],
 correct:[2],
 exp:"Mandatory Access Control (MAC) uses security labels and clearance levels enforced by the system. Users cannot change access rights. It's used in high-security environments where the OS enforces classification levels like Top Secret or Confidential.",
 we:"RBAC = role-based. DAC = owner-controlled (common in standard OSes). ABAC = attribute-based (fine-grained policies). MAC = system-enforced classification labels.",
 refs:[{text:"Access Control Models – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/access-control-models-sy0-701/"},{text:"NIST Glossary: Mandatory Access Control",url:"https://csrc.nist.gov/glossary/term/mandatory_access_control"}]},

{id:66, domain:1,
 q:"Which type of certificate is issued to validate that an organization legally exists and controls a domain, displaying a green padlock and organization name in older browsers?",
 opts:["Domain Validation (DV)","Organization Validation (OV)","Extended Validation (EV)","Wildcard certificate"],
 correct:[2],
 exp:"Extended Validation (EV) certificates require rigorous verification of the organization's legal identity. They historically displayed the organization name in the browser bar (green padlock). DV only verifies domain control. OV verifies organization existence but with less scrutiny.",
 we:"DV = only proves domain ownership (fastest/cheapest). OV = verifies organization but doesn't get the prominent UI treatment. Wildcard = covers subdomains with *. EV = highest assurance level.",
 refs:[{text:"Digital Certificates – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-certificates-sy0-701/"},{text:"CA/Browser Forum: Certificate Types",url:"https://cabforum.org/"}]},

{id:67, domain:1,
 q:"An application stores encryption keys in a dedicated, tamper-resistant hardware device. What is this device called?",
 opts:["TPM (Trusted Platform Module)","HSM (Hardware Security Module)","Smart card","USB token"],
 correct:[1],
 exp:"A Hardware Security Module (HSM) is a dedicated hardware device for generating, storing, and managing cryptographic keys. It's tamper-resistant and used for high-value key management in enterprise and PKI environments.",
 we:"TPM is embedded in a motherboard for device-specific key storage (boot integrity, disk encryption). Smart cards store personal credentials. USB tokens are portable authentication devices. HSM = dedicated enterprise key management hardware.",
 refs:[{text:"Hardware Security – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/hardware-security-sy0-701/"},{text:"NIST Glossary: Hardware Security Module",url:"https://csrc.nist.gov/glossary/term/hardware_security_module"}]},

// Domain 2 — Threats, Vulnerabilities & Mitigations
{id:68, domain:2,
 q:"An attacker sends millions of packets to a server's open TCP ports with the SYN flag set but never completes the handshake. What attack is this?",
 opts:["Ping of Death","SYN flood","Smurf attack","UDP flood"],
 correct:[1],
 exp:"A SYN flood exploits the TCP three-way handshake. The attacker sends many SYN packets without completing the handshake, exhausting the server's connection table (half-open connections) and preventing legitimate connections.",
 we:"Ping of Death sends oversized ICMP packets. Smurf attack uses ICMP broadcasts with spoofed source IP. UDP flood sends large volumes of UDP packets. SYN flood = incomplete TCP handshakes.",
 refs:[{text:"Network Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-attacks-sy0-701/"},{text:"OWASP: Denial of Service Attacks",url:"https://owasp.org/www-community/attacks/Denial_of_Service"}]},

{id:69, domain:2,
 q:"A threat actor gains access to a software vendor's build system and inserts malicious code into a legitimate software update. This is an example of:",
 opts:["Zero-day exploit","Supply chain attack","Watering hole attack","Insider threat"],
 correct:[1],
 exp:"A supply chain attack compromises software or hardware during the development or distribution process. The SolarWinds attack is a famous example — attackers inserted malware into a legitimate vendor's software update that was then distributed to thousands of customers.",
 we:"Zero-day = exploiting an unknown vulnerability. Watering hole = compromising websites the target visits. Insider threat = malicious employee. Supply chain = compromising the vendor/software pipeline itself.",
 refs:[{text:"Supply Chain Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/supply-chain-attacks-sy0-701/"},{text:"CISA: Software Supply Chain Security",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/supply-chain-attacks"}]},

{id:70, domain:2,
 q:"Which type of vulnerability exists in software that the vendor is unaware of and for which no patch is available?",
 opts:["CVE","Zero-day vulnerability","Known vulnerability","Logic flaw"],
 correct:[1],
 exp:"A zero-day vulnerability is unknown to the software vendor, meaning no patch exists. Attackers who discover them can exploit them with no defense available until the vendor is notified and releases a fix.",
 we:"CVE = a publicly disclosed, catalogued vulnerability (patch usually available). Known vulnerability = vendor is aware and patch may exist. Logic flaw = design error but not necessarily unknown. Zero-day = unknown to vendor.",
 refs:[{text:"Vulnerability Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-types-sy0-701/"},{text:"NIST NVD: Zero-Day Resources",url:"https://nvd.nist.gov/"}]},

{id:71, domain:2,
 q:"An attacker compromises a popular website frequented by employees of a target company, embedding malware that infects visitors. What is this attack called?",
 opts:["Spear phishing","Supply chain attack","Watering hole attack","Drive-by download"],
 correct:[2],
 exp:"A watering hole attack targets a website that the intended victims frequently visit. Rather than attacking the target directly, the attacker compromises a trusted third-party site and waits for targets to visit and become infected.",
 we:"Spear phishing uses targeted email. Supply chain compromises the software vendor. Drive-by download is the technical mechanism (malware download on visit), but watering hole is the attack strategy. Watering hole = compromise the watering hole the prey visits.",
 refs:[{text:"Watering Hole Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/watering-hole-attacks-sy0-701/"},{text:"MITRE ATT&CK: Watering Hole",url:"https://attack.mitre.org/techniques/T1189/"}]},

{id:72, domain:2,
 q:"Malware that encrypts a victim's files and demands payment for the decryption key is classified as:",
 opts:["Spyware","Adware","Ransomware","Rootkit"],
 correct:[2],
