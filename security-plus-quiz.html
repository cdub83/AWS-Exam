 exp:"STIX (Structured Threat Information eXpression) is a JSON-based language for describing threat intelligence — including threat actors, TTPs (from MITRE ATT&CK), IoCs, campaigns, and courses of action. TAXII (Trusted Automated eXchange of Indicator Information) is the HTTP-based transport protocol for sharing STIX content between organisations. Together they enable automated, machine-readable threat intel sharing between ISACs, government agencies (CISA), and commercial platforms.",
 we:"CVE and CVSS are vulnerability management standards — not threat intelligence sharing formats. Syslog and SNMP are log and network management protocols. OpenIOC and MISP are real tools but are not the standardised pair referenced in SY0-701.",
 refs:[{text:"Threat Intelligence – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:102, domain:4,
 q:"A company deploys sensors across their network specifically to detect and log any connection attempts — since these systems have no legitimate purpose, any traffic to them represents suspicious activity. The team uses the data to study attacker TTPs. What is this technology called?",
 opts:["IDS — monitors production traffic for attack signatures","SIEM — collects and correlates logs from production systems","Honeynet — a network of decoy systems with no legitimate use, where any interaction is definitionally suspicious and provides attacker intelligence","DLP — monitors data flows to prevent sensitive data exfiltration"],
 correct:[2],
 exp:"A honeynet is a network of honeypot systems — decoy servers, services, and sometimes entire network segments — designed to attract and study attackers. Since no legitimate users access these systems, any interaction is suspicious. Honeynets provide high-fidelity threat intelligence about attacker methods and tools. They can also slow attackers by consuming their time on non-valuable decoys.",
 we:"IDS monitors production traffic — it generates alerts on legitimate network segments. SIEM aggregates production system logs. DLP monitors data exfiltration. A honeynet is a dedicated decoy environment separate from production.",
 refs:[{text:"Honeynets – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/honeypots-and-honeynets-sy0-701/"},{text:"NIST Glossary: Honeynet",url:"https://csrc.nist.gov/glossary/term/honeynet"}]},

{id:103, domain:4,
 q:"A hospital implements a solution that evaluates every device attempting to connect to the clinical network. Devices must have current antivirus signatures, an approved OS version, and a valid domain certificate. Non-compliant devices are placed in a quarantine VLAN with access only to a remediation server. What technology provides this?",
 opts:["Network ACLs — filter traffic by source/destination IP and port","NAC (Network Access Control) — evaluates device posture at connection time and enforces policy-based network access or quarantine","IPS — blocks known attack signatures on network traffic","SIEM — aggregates logs from connected devices for security monitoring"],
 correct:[1],
 exp:"NAC (Network Access Control) checks device health posture — patch level, AV status, domain membership, certificate validity — before granting network access. Implemented via 802.1X with RADIUS, or agent-based solutions. Non-compliant devices are quarantined to a remediation VLAN. This enforces that only healthy, authorised devices access sensitive network segments.",
 we:"Network ACLs filter based on IP/port — they have no knowledge of device health or patch status. IPS blocks attack traffic but doesn't gate initial network admission based on device posture. SIEM monitors logs but doesn't enforce access control at connection time.",
 refs:[{text:"NAC – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-access-control-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:104, domain:4,
 q:"A SOC analyst is reviewing Windows Security event logs and notices repeated Event ID 4625 (Failed Logon) attempts for the same account from different source IPs across a 6-hour window. No single IP exceeded the lockout threshold. What attack is MOST likely in progress?",
 opts:["Pass-the-hash — using captured NTLM hashes to authenticate without a password","Password spraying — testing a small number of common passwords across many accounts from distributed IPs to avoid per-IP lockout","Credential stuffing — testing known breached username/password pairs","Kerberoasting — requesting and cracking service ticket encryption offline"],
 correct:[1],
 exp:"Password spraying from multiple IPs distributes login attempts to stay below per-source lockout thresholds. Event ID 4625 with the same target account from many source IPs over an extended window is the forensic signature. Detection requires correlating failed logins across sources — not just per-IP. Mitigations include MFA, smart lockout policies, and geographic anomaly detection.",
 we:"Pass-the-hash uses captured hashes — failed logins wouldn't occur (pass-the-hash succeeds or isn't attempted). Credential stuffing uses complete breached username/password pairs — it would target many different user accounts, not the same one. Kerberoasting generates TGS requests, not authentication failures.",
 refs:[{text:"Password Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"Microsoft: Security Event ID 4625",url:"https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625"}]},

{id:105, domain:4,
 q:"An organisation enables DNS filtering on their network. Requests to domains categorised as malware command-and-control infrastructure are answered with a sinkhole IP instead of the real IP. What security benefit does this provide?",
 opts:["It encrypts DNS traffic to prevent DNS spoofing attacks","It prevents DNS cache poisoning by validating DNS records with DNSSEC","It prevents compromised hosts from establishing connections to C2 infrastructure by resolving C2 domains to a dead-end sinkhole IP","It blocks all outbound DNS traffic to force use of the corporate DNS server"],
 correct:[2],
 exp:"A DNS sinkhole redirects DNS lookups for known-malicious domains to a controlled 'sinkhole' IP address rather than the actual C2 server. When malware attempts to call home, the DNS response points it to the sinkhole — a non-responsive dead end. This breaks C2 communication. The sinkhole also generates logs identifying which internal hosts are infected — high-value security intelligence.",
 we:"DNS filtering doesn't encrypt DNS traffic — DNS over HTTPS (DoH) or DNS over TLS (DoT) does that. DNSSEC validates DNS record signatures to prevent spoofing — it doesn't block malicious domains. Blocking all outbound DNS is too disruptive; sinkholing targets only known-malicious domains.",
 refs:[{text:"DNS Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/dns-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:106, domain:4,
 q:"A security team discovers a spreadsheet named 'CEO_SalaryData_CONFIDENTIAL.xlsx' stored in a publicly accessible SharePoint folder. The file contains no real data — it is a decoy placed by the security team. When it is opened, an alert fires with the user's identity. What type of deception artefact is this?",
 opts:["Honeypot — a decoy server or service designed to attract attackers","Honeynet — a network of decoy systems to study attacker TTPs","Honeytoken — a fake, valueless data artefact that triggers an alert when accessed, indicating suspicious or unauthorised activity","Canary deployment — a partial rollout of a new software version to a subset of users"],
 correct:[2],
 exp:"A honeytoken is a specific deceptive data artefact — a fake file, credential, API key, database record, or email address — that has no legitimate business use. Any access is definitionally unauthorised and triggers a high-fidelity alert with minimal false positives. Honeytokens are highly effective for detecting insider threats and lateral movement.",
 we:"A honeypot is a full system (server, VM). A honeynet is a network of honeypots. A canary deployment is a software release strategy — not a security deception technique. A single fake data file = honeytoken.",
 refs:[{text:"Deception Technologies – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/honeypots-and-honeynets-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:107, domain:4,
 q:"A user reports that their computer is performing slowly. A security analyst examines running processes and finds an unknown process consuming high CPU. The process has no corresponding file on disk and only exists in memory. What type of malware BEST describes this?",
 opts:["Rootkit — modifies the OS to hide its presence from system tools","Ransomware — encrypts files and leaves a ransom note","Fileless malware — executes entirely in memory, typically by abusing legitimate system processes, leaving no file on disk","Worm — self-replicates by writing copies to disk and spreading across the network"],
 correct:[2],
 exp:"Fileless malware executes entirely in memory — it doesn't write a malicious executable to disk. It typically abuses legitimate system tools (PowerShell, WMI, regsvr32) to execute malicious code injected directly into memory or loaded from the network. Because there's no file to scan, traditional signature-based AV often misses it. EDR with memory scanning and behavioural analysis detects fileless attacks. Volatility Framework is used for memory forensics.",
 we:"Rootkits modify the OS kernel to hide — they typically have files on disk. Ransomware writes encrypted copies of files and leaves ransom notes on disk. Worms replicate by writing copies to disk. Fileless malware = executes in memory with no disk artefact.",
 refs:[{text:"Malware – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"MITRE ATT&CK: Fileless Execution",url:"https://attack.mitre.org/techniques/T1059/001/"}]},

{id:108, domain:4,
 q:"An analyst is investigating a phishing incident. The suspicious email contains an embedded URL that redirects through several intermediary domains before landing on a credential harvesting page. Which email security technology analyses URL behaviour and follows redirects to determine the final destination before delivering the email?",
 opts:["SPF (Sender Policy Framework) — validates that email is sent from an authorised mail server for the sending domain","DKIM (DomainKeys Identified Mail) — uses a digital signature to verify the email has not been tampered with in transit","URL sandboxing / time-of-click URL rewriting — rewrites URLs so they are analysed (and the chain followed) at click time rather than at delivery","DMARC — provides a policy for handling SPF/DKIM failures"],
 correct:[2],
 exp:"URL sandboxing (used by Microsoft Defender for Office 365 Safe Links, Proofpoint URL Defense) rewrites email URLs at delivery time. When a user clicks, the security system follows the redirect chain to the final destination, detonates the page in a sandbox, and blocks if malicious — catching redirector chains and delayed-activation phishing links (URLs benign at scan time, weaponised later).",
 we:"SPF validates sending server IP — it doesn't analyse URL content. DKIM validates email integrity via cryptographic signature — it doesn't follow links. DMARC enforces SPF/DKIM policy alignment — it doesn't analyse URLs. URL sandboxing is the specific technology for following redirect chains.",
 refs:[{text:"Email Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/email-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:109, domain:4,
 q:"Before a penetration test begins, the security team and the pen testing firm document the scope (which systems may be tested), testing methods permitted, timeframes, emergency contacts, and rules for handling discovered vulnerabilities. What document governs this?",
 opts:["Non-disclosure agreement (NDA) — ensures confidential findings are not disclosed to third parties","Statement of Work (SOW) — defines the deliverables and timeline for the engagement","Rules of Engagement (RoE) — defines the boundaries, permissions, and procedures for the penetration test","Master Service Agreement (MSA) — the overarching commercial contract between the two organisations"],
 correct:[2],
 exp:"Rules of Engagement (RoE) define what a pen tester is authorised to do: which IP ranges/systems are in scope, which attack techniques are permitted, testing windows, emergency stop conditions, escalation contacts, and how discovered vulnerabilities are handled. Without RoE, pen testers could inadvertently cause outages or operate without legal authorisation. RoE provides legal protection for both parties.",
 we:"NDA protects confidentiality of findings — it doesn't govern test scope or methods. SOW covers deliverables and timelines — it's commercial, not operational. MSA is the commercial framework agreement. RoE is the specific operational document defining test boundaries and authorisation.",
 refs:[{text:"Penetration Testing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:110, domain:4,
 q:"A cloud security team wants to continuously monitor their AWS environment for misconfigured S3 buckets with public access, overly permissive IAM policies, unencrypted RDS instances, and security group rules open to 0.0.0.0/0. Which tool category is purpose-built for this?",
 opts:["Vulnerability scanner — scans EC2 instances for missing OS patches and application CVEs","WAF — blocks malicious HTTP requests to cloud-hosted applications","CSPM (Cloud Security Posture Management) — continuously assesses cloud resource configurations against security benchmarks and compliance frameworks","SIEM — aggregates and correlates cloud service logs for threat detection"],
 correct:[2],
 exp:"CSPM (Cloud Security Posture Management) tools continuously audit cloud resource configurations — IAM policies, network security groups, storage bucket permissions, encryption settings, logging configuration — against security benchmarks (CIS, NIST, PCI DSS). They detect configuration drift, alert on misconfigurations, and provide compliance dashboards. Tools include AWS Security Hub, Microsoft Defender for Cloud, Prisma Cloud, and Wiz.",
 we:"Vulnerability scanners find CVEs in running OS/applications — not cloud API configuration misconfigurations. WAF protects web applications from attacks. SIEM collects and correlates logs — it doesn't assess configuration state of cloud resources.",
 refs:[{text:"Cloud Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:111, domain:4,
 q:"A security tool installed on endpoints continuously profiles normal user behaviour — typical login times, access patterns, data volume, and application usage. When a user suddenly downloads 10 GB of data to a USB drive outside normal hours, an alert fires even though no signature matched. Which technology is this?",
 opts:["Signature-based IDS — matches network traffic against known attack patterns","Antivirus — scans files against a database of malicious code signatures","UEBA (User and Entity Behavior Analytics) — baselines normal behaviour and alerts on statistically anomalous deviations","DLP — monitors and blocks data transfers based on content classification policies"],
 correct:[2],
 exp:"UEBA (User and Entity Behavior Analytics) uses machine learning and statistical modelling to baseline normal user and device behaviour. Deviations from the baseline — regardless of whether a signature matches — trigger alerts. UEBA is highly effective for detecting insider threats, compromised credentials, and lateral movement that evade signature-based tools. It generates context-rich alerts (who, what, when, and how unusual).",
 we:"Signature-based IDS matches known attack patterns — it can't detect novel behaviour with no known signature. Antivirus scans files for malicious code — it doesn't profile user behavioural patterns. DLP monitors data content against classification rules — it can block based on content but doesn't profile behaviour over time.",
 refs:[{text:"UEBA – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-loss-prevention-and-soar-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.7",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:112, domain:4,
 q:"A security policy requires that all administrator access to production servers use time-limited, just-in-time credentials that are automatically provisioned when a request is approved and revoked when the session ends. Which solution category addresses this requirement?",
 opts:["Directory services (LDAP/AD) — store and manage user account information and group membership","PAM (Privileged Access Management) — controls, monitors, and audits privileged account access, often with just-in-time credential vaulting and session recording","Single sign-on (SSO) — allows users to authenticate once and access multiple applications","MFA — requires two or more authentication factors for all logins"],
 correct:[1],
 exp:"PAM (Privileged Access Management) solutions (CyberArk, BeyondTrust, HashiCorp Vault) manage privileged credentials: vaulting static passwords, providing just-in-time (JIT) temporary credentials, recording privileged sessions, and enforcing least-privilege access policies. JIT eliminates standing privileged access — credentials are provisioned on-demand and automatically revoked, reducing the window of exposure if credentials are compromised.",
 we:"LDAP/AD stores account information but doesn't provide JIT provisioning or session recording. SSO simplifies authentication across applications — it doesn't manage privileged access workflows. MFA adds a second factor — it doesn't provide JIT credential provisioning or session recording.",
 refs:[{text:"Privileged Access Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/privileged-access-management-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.6",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:113, domain:4,
 q:"A Windows security event log shows a series of Event ID 4688 entries (Process Created) where powershell.exe was spawned by winword.exe, which then downloaded an executable from an external URL and executed it. What attack technique does this represent?",
 opts:["Pass-the-hash — using a captured NTLM hash for authentication","Living-off-the-land (LOtL) / macro malware — abusing legitimate OS tools (PowerShell) launched from a weaponised document macro to execute malicious code","Fileless malware — executing malware solely from memory with no file on disk","Kerberoasting — requesting service tickets for cracking offline"],
 correct:[1],
 exp:"Living-off-the-land attacks use legitimate, built-in OS tools (PowerShell, WMI, certutil, mshta) to execute malicious code — making detection harder since these are normal system processes. Launching PowerShell from Word (winword.exe → powershell.exe) is a classic weaponised Office macro pattern. The process parent-child relationship in Event ID 4688 is the forensic indicator. Blocking Office macros and monitoring PowerShell spawned from Office are key mitigations.",
 we:"Pass-the-hash uses NTLM hashes — process creation events wouldn't show this pattern. Pure fileless malware executes in memory without downloading files. Kerberoasting queries Kerberos TGS — it wouldn't appear as Office spawning PowerShell.",
 refs:[{text:"Malware Analysis – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-analysis-sy0-701/"},{text:"MITRE ATT&CK: Living off the Land",url:"https://attack.mitre.org/tactics/TA0005/"}]},

{id:114, domain:4,
 q:"A malware sample is submitted to an automated analysis system that executes it in an isolated VM, monitors all system calls, file writes, registry changes, and network connections, then produces a behaviour report without any analyst touching the malware directly. What analysis method is this?",
 opts:["Static analysis — examining malware code or binary without executing it","Dynamic analysis / sandboxing — executing malware in an isolated environment to observe its behaviour","Manual reverse engineering — disassembling and analysing malware code with IDA Pro or Ghidra","YARA rule matching — scanning files with pattern-based rules to identify malware families"],
 correct:[1],
 exp:"Dynamic analysis (sandboxing) executes the malware in an instrumented, isolated environment (sandbox) — e.g., Cuckoo Sandbox, Any.run, Joe Sandbox, VirusTotal dynamic analysis. It captures all behaviour: process creation, file drops, registry changes, network connections, API calls. This reveals capabilities that may be obfuscated from static analysis. The risk of reverse-engineering is eliminated since the analyst doesn't touch the live malware.",
 we:"Static analysis examines the file without executing it (strings, disassembly) — it misses behaviour obfuscated by packers. Manual reverse engineering is human-led code analysis — time-consuming. YARA rules match file patterns — they identify known malware families but don't reveal new behaviour. Dynamic analysis = execute in sandbox, observe.",
 refs:[{text:"Malware Analysis – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-analysis-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:115, domain:4,
 q:"A company wants to prevent employees from installing unapproved applications on corporate laptops. Only applications on an approved list may execute. All other executables are blocked by policy. Which endpoint control implements this?",
 opts:["Antivirus — scans applications against a database of known malicious signatures","Application blacklisting — blocking specific known-bad applications","Application whitelisting / allowlisting — only explicitly approved applications are permitted to execute; everything else is blocked by default","Host-based IPS — blocks known exploit patterns targeting installed applications"],
 correct:[2],
 exp:"Application whitelisting (allowlisting) is a default-deny approach: only explicitly approved applications may execute. Unlike blacklisting (blocking known-bad software), whitelisting blocks everything not on the approved list — including unknown malware, shadow IT, and living-off-the-land abuse of unapproved tools. It provides strong protection but requires significant maintenance to manage the whitelist. Windows AppLocker and Software Restriction Policies implement whitelisting.",
 we:"Antivirus only blocks known malicious signatures — new malware evades it. Blacklisting blocks specific known-bad apps — unknown malware not on the list runs freely. Host-based IPS blocks exploit patterns — not application execution policy. Whitelisting = default-deny for all executables.",
 refs:[{text:"Endpoint Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/endpoint-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:116, domain:4,
 q:"An organisation uses a third-party API to send payment processing requests. A developer hard-codes the production API key in the application's source code, which is stored in a public GitHub repository. A threat actor finds the key and makes fraudulent charges. What security control would MOST directly have prevented this?",
 opts:["Encrypting the API key with AES-256 before embedding it in the source code","Using a secrets manager (e.g., HashiCorp Vault, AWS Secrets Manager) to store and retrieve API keys dynamically at runtime rather than embedding them in code","Adding the API key to the .gitignore file to prevent it from being committed","Rotating the API key after the breach"],
 correct:[1],
 exp:"Secrets managers store credentials and API keys securely, providing access to applications at runtime via authenticated API calls — the secret never exists in source code. The application is authorised to retrieve the secret via IAM/service account credentials. This eliminates hardcoded secrets, enables automatic rotation, provides audit logs of secret access, and scopes secret access to authorised services.",
 we:"Encrypting the key in source code is still exposing the key — the decryption key or algorithm would also be needed and likely also exposed. .gitignore prevents future commits but doesn't remove already-committed secrets from git history. Rotating after the breach closes the door after the horse has bolted — prevention requires not putting secrets in code at all.",
 refs:[{text:"Secure Coding – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-coding-techniques-sy0-701/"},{text:"OWASP: Secrets Management Cheat Sheet",url:"https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"}]},

{id:117, domain:4,
 q:"A company retires an SSD that previously stored unencrypted HR data. They run a standard delete command on all files and reallocate the drive to another department. What is the PRIMARY security risk?",
 opts:["The drive may fail prematurely due to the delete operations","Data may be recoverable using forensic tools even after deletion, exposing sensitive HR data","The new department may not have enough storage capacity","The drive may contain firmware vulnerabilities"],
 correct:[1],
 exp:"Standard file deletion only removes directory entries — the data remains on the drive until overwritten and can be recovered with forensic tools. For SSDs, even secure erase tools behave differently due to wear levelling. Proper media sanitisation includes: cryptographic erasure (if the drive was encrypted — destroy the key), manufacturer-provided secure erase (ATA Secure Erase), or physical destruction. NIST SP 800-88 provides media sanitisation guidelines.",
 we:"Delete operations don't cause drive failure. Storage capacity is unrelated to data sanitisation. Firmware vulnerabilities are a separate security concern — the primary risk of simple file deletion is data recovery.",
 refs:[{text:"Data Destruction – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-destruction-sy0-701/"},{text:"NIST SP 800-88: Media Sanitisation Guidelines",url:"https://csrc.nist.gov/publications/detail/sp/800-88/rev-1/final"}]},

{id:118, domain:4,
 q:"An organisation wants to verify their incident response plan works before an actual incident. They conduct a realistic simulation where the incident response team is notified of a simulated ransomware outbreak and must execute their actual IR procedures — contacting vendors, isolating systems, and activating the DR plan — but using actual systems in a controlled manner. Which test type is this?",
 opts:["Tabletop exercise — a discussion-based walkthrough of scenarios without taking actual technical actions","Walk-through — the IR team reviews the plan documentation without simulating the actual response","Functional exercise / simulation — the IR team executes actual response procedures in a realistic but controlled simulation","Full-scale exercise — an exercise involving external agencies and full real-world disruption"],
 correct:[2],
 exp:"A functional exercise (simulation) has participants execute actual IR procedures — activating notification trees, making technical decisions, isolating systems — in a realistic scenario. Unlike tabletop exercises (which are discussion-only), functional exercises test the actual execution of the plan. They are more revealing than tabletops but less disruptive than a full-interruption test.",
 we:"Tabletop exercises are discussion-based — no actual technical actions are taken. Walk-throughs review the plan on paper. Full-scale exercises involve real external parties and may cause actual disruption. Functional exercises execute real procedures in a controlled setting.",
 refs:[{text:"Incident Response Testing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/tabletop-exercises-sy0-701/"},{text:"CISA: Exercise Program Guide",url:"https://www.cisa.gov/topics/preparedness/exercises"}]},

{id:119, domain:4,
 q:"An attacker gains access to a system running as a normal user and then exploits a local kernel vulnerability to gain SYSTEM/root access on that same machine. What technique does this represent?",
 opts:["Lateral movement — using a compromised system to access other systems","Persistence — maintaining access to the compromised system after reboots","Privilege escalation — gaining higher levels of access on the same compromised system","Exfiltration — copying sensitive data out of the compromised network"],
 correct:[2],
 exp:"Privilege escalation exploits vulnerabilities or misconfigurations to gain higher access rights on a system already accessed. Vertical privilege escalation moves from low-privilege user to administrator/root. Horizontal privilege escalation moves between same-privilege accounts. Common techniques: kernel exploits, SUID binaries, sudo misconfigurations, DLL hijacking, UAC bypass (Windows).",
 we:"Lateral movement accesses different systems within the network. Persistence maintains access through reboots. Exfiltration copies data outside the network. Privilege escalation = gaining higher permissions on the same system.",
 refs:[{text:"MITRE ATT&CK: Privilege Escalation",url:"https://attack.mitre.org/tactics/TA0004/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:120, domain:4,
 q:"A security team receives notification that the organisation's email server has been listed on a public spam blacklist because it has been relaying large volumes of spam. Investigation reveals the server was misconfigured to allow unauthenticated third parties to send email through it. What misconfiguration allowed this?",
 opts:["Missing DKIM signing — outbound emails are not digitally signed","Missing SPF record — the organisation has not published an SPF record","Open mail relay — the email server accepts and forwards email from unauthenticated external senders","Weak TLS configuration — the email server allows insecure protocol versions"],
 correct:[2],
 exp:"An open relay is an email server misconfigured to forward (relay) email from anyone, including unauthenticated external senders, to any destination. This allows spammers to use the organisation's server to send bulk spam — the organisation's IP gets blacklisted as a result. Proper mail server configuration requires authentication for relay (SMTP AUTH) and restricts relaying to authorised senders (internal IPs, authenticated accounts).",
 we:"Missing DKIM affects outbound email authentication — it doesn't allow external parties to send through the server. Missing SPF means no sending policy is published. Weak TLS affects transport encryption — it doesn't enable unauthorised relaying. Open relay is the specific misconfiguration that enables unauthorised email forwarding.",
 refs:[{text:"Email Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/email-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},


// ══════════════════════════════════════════
//  DOMAIN 5 — Security Program Management & Oversight
// ══════════════════════════════════════════
{id:121, domain:5,
 q:"An organisation calculates that a specific server has an asset value of $200,000. A fire could destroy 75% of the asset. Historical data suggests a fire occurs at this facility roughly once every 10 years. What is the Annual Loss Expectancy (ALE)?",
 opts:["$15,000 — ALE = Asset Value × Exposure Factor × Annual Rate of Occurrence","$150,000 — ALE = Asset Value × Exposure Factor","$200,000 — ALE = Asset Value only","$15,000 is incorrect; ALE = SLE / ARO"],
 correct:[0],
 exp:"ALE = SLE × ARO. SLE (Single Loss Expectancy) = Asset Value × Exposure Factor = $200,000 × 0.75 = $150,000. ARO (Annual Rate of Occurrence) = 1 fire / 10 years = 0.1. ALE = $150,000 × 0.1 = $15,000. This means the organisation can expect to lose on average $15,000 per year from fire risk on this server, justifying controls costing less than $15,000/year.",
 we:"$150,000 is the SLE — the single-event loss, not annualised. $200,000 is the full asset value without accounting for partial loss or frequency. ALE = SLE × ARO (not SLE / ARO).",
 refs:[{text:"Risk Calculations – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST SP 800-30: Risk Assessment",url:"https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"}]},

{id:122, domain:5,
 q:"After implementing security controls, the risk that remains is called:",
 opts:["Inherent risk — the risk level before any controls are applied","Residual risk — the risk remaining after controls are implemented","Transfer risk — the portion of risk shifted to a third party such as an insurer","Control risk — the risk that a control will fail to mitigate the threat"],
 correct:[1],
 exp:"Residual risk is the risk that remains after security controls are applied. No control eliminates risk entirely — some residual risk always remains. Organisations must decide whether the residual risk is acceptable (risk acceptance), needs further mitigation, or should be transferred. Residual risk = Inherent risk − Risk reduced by controls.",
 we:"Inherent risk is the risk level BEFORE controls. Transfer risk is a risk treatment strategy (insurance). Control risk is an internal audit term for the risk of control failure. Residual risk = what remains after controls.",
 refs:[{text:"Risk Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST Glossary: Residual Risk",url:"https://csrc.nist.gov/glossary/term/residual_risk"}]},

{id:123, domain:5,
 q:"A hospital must comply with HIPAA because it stores and processes electronic Protected Health Information (ePHI). Under HIPAA, what minimum technical safeguard must be applied to ePHI stored on portable devices?",
 opts:["HIPAA does not address portable device security — it only covers desktop systems","Encryption of ePHI on portable devices is addressable under HIPAA — if the organisation determines encryption is reasonable and appropriate, it must be implemented, or the organisation must document why not","Full-disk encryption of ePHI is required by HIPAA as a mandatory implementation specification","HIPAA requires biometric authentication on all devices storing ePHI"],
 correct:[1],
 exp:"HIPAA Security Rule divides implementation specifications into 'required' and 'addressable'. Encryption of ePHI is addressable — organisations must assess if it's reasonable and appropriate for their situation. If they determine it is, it must be implemented. If they determine it is not reasonable (rare), they must document that assessment. In practice, regulators expect encryption on portable devices — breaches of unencrypted devices carry heavy penalties.",
 we:"HIPAA does address portable devices — numerous breach incidents involved stolen unencrypted laptops. Encryption is 'addressable' (not 'required' as a mandatory specification) under the Security Rule. Biometric authentication is not a HIPAA-specified control.",
 refs:[{text:"Compliance Frameworks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"HHS: HIPAA Security Rule",url:"https://www.hhs.gov/hipaa/for-professionals/security/index.html"}]},

{id:124, domain:5,
 q:"An organisation that processes EU citizen data experiences a breach affecting 50,000 records including health data. Under GDPR, what are the notification obligations?",
 opts:["No notification is required unless the breach affects more than 100,000 individuals","Notify affected individuals immediately; notify supervisory authority within 30 days","Notify the supervisory authority within 72 hours of awareness; notify affected individuals 'without undue delay' when the breach is likely to cause high risk to their rights","Notification is voluntary — organisations may self-report when ready"],
 correct:[2],
 exp:"GDPR Article 33 requires notifying the supervisory authority (data protection regulator) within 72 hours of becoming aware of a personal data breach. GDPR Article 34 requires notifying affected individuals 'without undue delay' when the breach is likely to result in a high risk to their rights and freedoms. Health data is special-category data with higher sensitivity — notification is expected.",
 we:"There is no 100,000-record threshold for notification obligations. 30 days is not the GDPR deadline — 72 hours is the supervisory notification window. Notification under GDPR is mandatory, not voluntary, for qualifying breaches.",
 refs:[{text:"Data Privacy Regulations – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"GDPR: Article 33 Breach Notification",url:"https://gdpr.eu/article-33-notification-of-a-personal-data-breach/"}]},

{id:125, domain:5,
 q:"A company decides not to implement additional firewall rules for a low-risk vulnerability because the cost of the controls exceeds the potential financial impact and the business has adequate compensating controls already in place. Which risk response strategy is this?",
 opts:["Risk avoidance — eliminating the activity that creates the risk","Risk mitigation — implementing controls to reduce the likelihood or impact of the risk","Risk acceptance — acknowledging the residual risk and accepting it after determining controls are not cost-justified","Risk transference — shifting the financial risk to a third party such as an insurer"],
 correct:[2],
 exp:"Risk acceptance consciously acknowledges a residual risk and decides not to implement additional controls — because controls cost more than the potential loss, the risk is already at an acceptable level, or compensating controls sufficiently address it. Formal risk acceptance requires documentation and management sign-off. It is not the same as ignoring risk — it's a deliberate, documented decision.",
 we:"Risk avoidance stops the risky activity entirely. Risk mitigation adds controls to reduce likelihood or impact. Risk transference shifts financial consequences (insurance, contractual). Risk acceptance = acknowledging and keeping residual risk.",
 refs:[{text:"Risk Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST Glossary: Risk Acceptance",url:"https://csrc.nist.gov/glossary/term/risk_acceptance"}]},

{id:126, domain:5,
 q:"An organisation categorises its data as Public, Internal Use Only, Confidential, and Restricted. Credit card numbers are classified as Restricted, requiring AES-256 encryption at rest, TLS in transit, and access limited to authorised systems. Which governance practice does this implement?",
 opts:["Asset management — maintaining an inventory of all IT assets","Data classification — categorising information by sensitivity level and mapping each category to handling requirements","Privacy impact assessment — evaluating privacy risks before processing personal data","Data minimisation — collecting only the minimum data necessary for each purpose"],
 correct:[1],
 exp:"Data classification assigns sensitivity labels to information and maps each label to specific handling requirements (encryption, access controls, transmission rules, storage restrictions, disposal methods). You cannot implement appropriate controls without knowing what sensitivity level the data has. Classification is the foundation of an effective data governance programme.",
 we:"Asset management tracks IT hardware and software inventory. Privacy impact assessments evaluate privacy risks for specific processing activities. Data minimisation limits collection — it doesn't label and govern what is collected. Classification = label + required controls for each label.",
 refs:[{text:"Data Classifications – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-classifications-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:127, domain:5,
 q:"Which framework organises cybersecurity activities into five core functions — Identify, Protect, Detect, Respond, and Recover — and is designed to be voluntary, flexible, and adaptable to organisations of any size and sector?",
 opts:["ISO 27001 — a certifiable international standard for an information security management system (ISMS)","PCI DSS — prescriptive requirements for organisations that store, process, or transmit cardholder data","NIST Cybersecurity Framework (CSF) — a voluntary, risk-based framework using five core functions","CIS Controls — prioritised, prescriptive technical security controls in 18 control groups"],
 correct:[2],
 exp:"The NIST CSF (originally released in 2014, CSF 2.0 in 2024) organises cybersecurity practices around five core functions: Identify (understand your assets and risks), Protect (implement controls), Detect (identify incidents), Respond (contain and eradicate), and Recover (restore operations). It is framework-agnostic, voluntary, risk-based, and adaptable to any sector — not prescriptive like PCI DSS.",
 we:"ISO 27001 is an auditable ISMS certification standard with prescriptive requirements and formal certification. PCI DSS mandates specific controls for payment card data — it is mandatory for in-scope organisations. CIS Controls are technical best-practice controls grouped in 18 implementation groups.",
 refs:[{text:"Security Frameworks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-frameworks-sy0-701/"},{text:"NIST Cybersecurity Framework",url:"https://www.nist.gov/cyberframework"}]},

{id:128, domain:5,
 q:"A security manager assigns the following tasks: the same employee cannot both initiate AND approve purchase orders, and a different employee reconciles the bank statements. Which security principle governs these assignments?",
 opts:["Least privilege — each employee has only the minimum permissions needed for their role","Need-to-know — employees only access information relevant to their job","Separation of duties (SoD) — splitting critical tasks across multiple individuals so no single person has end-to-end control of sensitive processes","Multi-person integrity — requiring multiple people to be physically present for critical actions"],
 correct:[2],
 exp:"Separation of duties divides sensitive tasks between different individuals so no single person can commit fraud or error without involving another party. Classic SoD pairs: initiate/approve transactions, execute/audit, develop/deploy code. SoD is a core internal control in financial systems (SOX compliance) and privileged access management.",
 we:"Least privilege limits permissions but doesn't split tasks between people. Need-to-know limits information access. Multi-person integrity (dual control) requires simultaneous presence — SoD separates the tasks in time, between different people. SoD = no single person owns an entire sensitive workflow.",
 refs:[{text:"Personnel Controls – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/personnel-security-sy0-701/"},{text:"NIST Glossary: Separation of Duty",url:"https://csrc.nist.gov/glossary/term/separation_of_duty"}]},

{id:129, domain:5,
 q:"An organisation's security policy requires all employees to take a minimum of 10 consecutive business days of mandatory leave per year. From a security perspective, what is the PRIMARY purpose of this policy?",
 opts:["Improve employee well-being and reduce burnout","Ensure cross-training so other employees can cover roles","Detect fraud, embezzlement, or policy violations that require continuous access to conceal — a prolonged absence forces another person to handle the role, potentially exposing concealed irregularities","Comply with employment law requirements for annual leave"],
 correct:[2],
 exp:"Mandatory vacation (mandatory leave) is a security and fraud detection control. Many financial frauds and embezzlement schemes require the perpetrator to continuously manipulate records to cover their tracks. When forced to take extended leave and someone else covers the role, the substitute may discover discrepancies. Banks and financial institutions have used this control for decades — it's now recognised in the SY0-701 personnel security objectives.",
 we:"Employee well-being and cross-training are benefits, but they are not the primary security purpose. Employment law compliance may apply but is not the security rationale. The fraud detection purpose — exposing concealed irregularities when the perpetrator is absent — is the specific security objective.",
 refs:[{text:"Personnel Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/personnel-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:130, domain:5,
 q:"A company's legal team is notified of an upcoming regulatory investigation. They immediately issue an instruction to IT to suspend all automated email deletion and file retention policies for all email accounts. What is this instruction called?",
 opts:["Data classification — labelling sensitive emails by confidentiality level","Backup policy — ensuring all emails are backed up for disaster recovery","Legal hold (litigation hold) — a directive to preserve all potentially relevant electronically stored information (ESI) in anticipation of litigation or regulatory investigation","Records retention policy — the standard schedule for keeping or deleting business records"],
 correct:[2],
 exp:"A legal hold (litigation hold) is a formal directive from legal counsel to suspend normal retention and deletion schedules for ESI relevant to actual or anticipated legal proceedings. Failure to implement a legal hold, resulting in destruction of relevant evidence, constitutes spoliation — which can lead to severe legal sanctions. IT must document the hold, identify custodians, and track compliance.",
 we:"Data classification labels documents by sensitivity — it doesn't impose preservation obligations. Backup policy ensures data availability for restoration — a legal hold is a legally-mandated preservation order. Records retention defines normal schedules — a legal hold overrides it.",
 refs:[{text:"Data Governance – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-governance-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:131, domain:5,
 q:"A third-party cloud provider sends a SOC 2 Type II report to a customer to demonstrate their security controls effectiveness. The SOC 2 report was prepared by an independent CPA firm after auditing the provider's controls over a 12-month period. What does this report represent?",
 opts:["A penetration test report — documenting vulnerabilities found in the provider's systems","A self-assessment questionnaire — the provider's own evaluation of their security controls","Attestation — an independent third-party declaration that security controls exist and operated effectively over the audit period","An SLA — contractually guaranteeing specific security performance metrics"],
 correct:[2],
 exp:"Attestation is the formal process of a qualified, independent party confirming that controls exist and operate effectively. A SOC 2 Type II report (AICPA standard) is an attestation — a CPA firm audits the service organisation's controls over a defined period (6–12 months) and issues a signed opinion. Unlike a self-assessment, attestation carries independent verification and legal accountability. It is explicitly listed in SY0-701 Domain 5 audit objectives.",
 we:"A pen test actively exploits systems to find vulnerabilities — it is not a compliance attestation. A security questionnaire is self-reported, not independently verified. An SLA is a contractual service commitment — it doesn't provide independent verification of control effectiveness.",
 refs:[{text:"Attestation and Audits – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:132, domain:5,
 q:"An organisation needs to determine which business functions are critical, how long each can be interrupted before catastrophic impact, and the minimum resources needed to resume each. This analysis directly informs RTO and RPO values for the disaster recovery plan. What analysis produces these outputs?",
 opts:["Risk assessment — identifying and prioritising threats and vulnerabilities","Business Impact Analysis (BIA) — identifying critical business functions, their maximum tolerable downtime, and financial/operational impact of disruption","Disaster recovery plan (DRP) — documenting step-by-step recovery procedures","Continuity of operations plan (COOP) — the procedures for maintaining essential functions during emergencies"],
 correct:[1],
 exp:"A Business Impact Analysis (BIA) systematically identifies critical business functions, maps their dependencies (IT systems, personnel, facilities), determines Maximum Tolerable Downtime (MTD), sets Recovery Time Objectives (RTO) and Recovery Point Objectives (RPO), and quantifies the financial and operational impact of disruption per hour/day. The BIA outputs drive the prioritisation and investment decisions in the BCP and DRP.",
 we:"Risk assessment identifies and scores threats — it doesn't map critical functions to RTOs and RPOs. The DRP is the response procedure — it is built AFTER the BIA establishes the targets. COOP defines procedures for maintaining functions — it references BIA outputs.",
 refs:[{text:"Business Impact Analysis – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/business-impact-analysis-sy0-701/"},{text:"NIST SP 800-34: Contingency Planning",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

{id:133, domain:5,
 q:"An organisation is building a new mobile health app that will process patient biometric data and health records. Under GDPR Article 35, what must be completed before the app launches?",
 opts:["A penetration test to identify security vulnerabilities in the application","A Data Protection Impact Assessment (DPIA) — a structured evaluation of privacy risks, data flows, legal basis, and mitigations required before high-risk processing begins","A business continuity plan to ensure the app remains available","A vulnerability assessment to scan the app's backend infrastructure"],
 correct:[1],
 exp:"GDPR Article 35 mandates a DPIA before processing that is 'likely to result in a high risk' to individuals — including processing of health/biometric data, large-scale profiling, and systematic monitoring. A DPIA documents: what data is collected, the legal basis for processing, necessity and proportionality, risks to individuals, and mitigation measures. It must be completed before processing begins.",
 we:"Penetration testing finds security vulnerabilities — it doesn't assess privacy risks, legal basis, or data flow compliance. A BCP addresses operational availability. A vulnerability assessment scans for CVEs. DPIA = privacy risk assessment required before high-risk processing.",
 refs:[{text:"Privacy – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/privacy-sy0-701/"},{text:"GDPR: Article 35 DPIA",url:"https://gdpr.eu/article-35-impact-assessment/"}]},

{id:134, domain:5,
 q:"Which security framework is a certifiable international standard that specifies requirements for establishing, implementing, maintaining, and continually improving an information security management system (ISMS)?",
 opts:["NIST CSF — a voluntary five-function cybersecurity framework","ISO 27001 — an international ISMS standard with formal certification and audit requirements","CIS Controls — 18 prioritised technical security controls","COBIT — a framework for IT governance and management"],
 correct:[1],
 exp:"ISO 27001 is an international standard specifying requirements for an ISMS. Organisations can be formally certified by an accredited auditor, demonstrating to customers and regulators that their information security is systematically managed. It uses an Annex A of 93 controls (ISO 27002) as a reference. Unlike NIST CSF (voluntary guidance), ISO 27001 has formal certification with periodic audit cycles.",
 we:"NIST CSF is voluntary guidance without formal certification. CIS Controls are technical best practices — not certifiable ISMS requirements. COBIT addresses IT governance broadly, not specifically information security management systems.",
 refs:[{text:"Security Frameworks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-frameworks-sy0-701/"},{text:"ISO 27001 Overview",url:"https://www.iso.org/isoiec-27001-information-security.html"}]},

{id:135, domain:5,
 q:"During employee termination, the IT security team disables the employee's Active Directory account, revokes all access tokens, retrieves corporate devices, and ensures their credentials are removed from all systems before the employee exits the building. What security principle drives these immediate actions?",
 opts:["Least privilege — the employee should only have had minimum access throughout employment","Separation of duties — ensuring the terminated employee's tasks are divided among remaining staff","Offboarding security — removing all access and recovering assets immediately at termination to prevent a disgruntled employee from causing harm or exfiltrating data","Background check — verifying the employee's history before removing access"],
 correct:[2],
 exp:"Immediate access revocation upon termination is a critical offboarding security control. Disgruntled employees represent a significant insider threat — they may exfiltrate data, sabotage systems, or create backdoors if their access is not immediately revoked. The CISO security policy should specify that access revocation is synchronised with the final working moment, not days later. Account recovery (devices, badges, tokens) is also part of offboarding.",
 we:"Least privilege applies throughout employment — it's a standing principle, not specific to termination. Separation of duties redistributes tasks — it doesn't drive immediate access revocation. Background checks are pre-employment, not post-employment. Offboarding security specifically addresses the termination transition.",
 refs:[{text:"Personnel Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/personnel-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:136, domain:5,
 q:"An organisation uses a risk register to track identified risks. A new risk is identified: the public-facing web application uses a component with a known CVSS 8.1 vulnerability. The team chooses to implement a WAF as an interim compensating control while a permanent patch is developed. Which risk management step does implementing the WAF represent?",
 opts:["Risk identification — discovering and documenting a new risk","Risk analysis — assessing the likelihood and impact of the risk","Risk treatment — taking action to modify the risk (mitigating it with a compensating control)","Risk monitoring — tracking the risk over time to detect changes"],
 correct:[2],
 exp:"Risk treatment is the step where the organisation takes action on an identified, analysed risk. Options: avoid, mitigate (implement controls), transfer (insurance, contracts), or accept. Implementing a WAF as a compensating control is risk mitigation — reducing the exploitability of the vulnerability while the permanent fix (patch) is developed. The compensating control reduces impact and/or likelihood.",
 we:"Risk identification discovers and documents the risk. Risk analysis assesses likelihood and impact to produce a risk score. Risk monitoring tracks changes in risk level over time. Risk treatment = taking action on the risk.",
 refs:[{text:"Risk Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST SP 800-30: Risk Management Process",url:"https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"}]},

{id:137, domain:5,
 q:"A cloud services company signs an agreement with a customer specifying that the platform will maintain 99.9% monthly uptime, critical incidents will be acknowledged within 15 minutes, and security patches will be applied within 30 days. What type of agreement is this?",
 opts:["MOU (Memorandum of Understanding) — a non-binding statement of intent between two parties","NDA (Non-Disclosure Agreement) — protecting confidential information shared between parties","SLA (Service Level Agreement) — a contractual commitment specifying measurable service performance levels and remedies for failure","BPA (Business Partnership Agreement) — governing the overall commercial relationship"],
 correct:[2],
 exp:"A Service Level Agreement (SLA) defines specific, measurable commitments about service quality — uptime percentages, response times, patch SLAs — and specifies remedies (credits, penalties) if commitments are not met. SLAs are legally binding and provide recourse for customers when the provider fails to meet agreed performance levels. Security SLAs (patch response time, incident notification) are increasingly common in vendor contracts.",
 we:"MOU is non-binding — it documents intent, not commitments. NDA protects confidential information disclosure. BPA governs the commercial relationship. SLA = contractual, measurable service commitments with remedies.",
 refs:[{text:"Vendor Agreements – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/third-party-risk-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:138, domain:5,
 q:"A CISO is preparing a quarterly security report for the board. She presents: percentage of systems with current patch level (98%), mean time to detect threats (MTTD: 4.2 hours), phishing simulation click rate (6.8%), and critical vulnerability remediation within SLA (94%). What are these measurements called?",
 opts:["Indicators of compromise — artefacts indicating a security breach","Key Risk Indicators (KRIs) and Key Performance Indicators (KPIs) — quantifiable metrics measuring security program effectiveness and communicating value to stakeholders","Audit findings — issues identified during internal or external security audits","CVSS scores — severity ratings for individual vulnerabilities"],
 correct:[1],
 exp:"Security metrics — including KPIs (how well controls perform) and KRIs (indicators of emerging risk) — allow organisations to measure security program effectiveness, track progress over time, and communicate security posture to non-technical stakeholders. They enable data-driven decisions and demonstrate return on security investment. Common metrics: patch compliance rate, MTTD, MTTR, phishing click rate, vulnerability closure rate.",
 we:"Indicators of compromise are forensic artefacts of active or past breaches. Audit findings are issues identified in audits. CVSS scores rate individual vulnerability severity. Security metrics/KPIs measure program-level performance over time.",
 refs:[{text:"Security Program Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-program-management-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.6",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:139, domain:5,
 q:"An organisation outsources payroll processing to a third-party vendor. The vendor has access to all employee PII and salary information. Before signing the contract, the security team sends the vendor a questionnaire asking about their security controls, certifications, incident response procedures, and data handling practices. What process is this?",
 opts:["Penetration testing the vendor — simulating attacks against the vendor's systems","Third-party risk management / vendor due diligence — assessing a vendor's security posture before granting them access to sensitive data","A legal hold — preserving vendor communications for regulatory compliance","Supply chain attack analysis — investigating whether the vendor has previously been compromised"],
 correct:[1],
 exp:"Third-party risk management (TPRM) assesses the security posture of vendors, suppliers, and partners who have access to the organisation's data or systems. Components include: security questionnaires, reviewing certifications (SOC 2, ISO 27001), contractual requirements (right-to-audit clauses, data processing agreements), and ongoing monitoring. TPRM is critical because third-party breaches can result in regulatory liability for the organisation.",
 we:"Penetrating the vendor requires their authorisation and is a separate engagement. A legal hold preserves evidence for litigation — it's not part of vendor assessment. Supply chain attack analysis investigates a specific incident. TPRM = pre-contract security due diligence on vendors.",
 refs:[{text:"Third-Party Risk – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/third-party-risk-sy0-701/"},{text:"NIST SP 800-161: Supply Chain Risk Management",url:"https://csrc.nist.gov/publications/detail/sp/800-161/rev-1/final"}]},

{id:140, domain:5,
 q:"A public company's financial reporting system must have documented access controls, change management procedures, and segregation of duties that are audited annually by an independent CPA firm. Which US federal regulation mandates these controls for financial systems of public companies?",
 opts:["GLBA (Gramm-Leach-Bliley Act) — governs financial institutions' data privacy practices","HIPAA — protects patient health information at healthcare providers","SOX (Sarbanes-Oxley Act) — requires public companies to have documented, audited internal controls over financial reporting","PCI DSS — specifies security controls for organisations processing payment card data"],
 correct:[2],
 exp:"SOX (Sarbanes-Oxley Act, 2002) was enacted following accounting scandals (Enron, WorldCom). Section 302 requires executives to certify financial statements. Section 404 requires management to assess and report on internal controls over financial reporting — and the external auditor must attest to this assessment. IT controls (access management, segregation of duties, change management for financial systems) are directly audited under SOX.",
 we:"GLBA governs privacy and data security at financial institutions (banks, brokers, insurers) — not general financial reporting controls. HIPAA protects healthcare data. PCI DSS governs payment card processing. SOX is specifically about public company financial reporting controls.",
 refs:[{text:"Compliance Regulations – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"SEC: Sarbanes-Oxley Act",url:"https://www.sec.gov/about/laws/soa2002.pdf"}]},

{id:141, domain:5,
 q:"An organisation has experienced several phishing incidents where employees clicked on malicious links. Beyond technical controls, which security measure MOST directly addresses the human element and reduces susceptibility to phishing?",
 opts:["Deploying a next-generation email security gateway with URL sandboxing","Implementing MFA on all accounts so stolen credentials cannot be used alone","Security awareness training with regular phishing simulations, measuring click rates, and providing immediate targeted education for users who click","Installing an EDR agent on all endpoints to detect malware from phishing payloads"],
 correct:[2],
 exp:"Security awareness training directly addresses the human element — the main phishing target. Effective programmes include: regular training on recognising phishing, simulated phishing campaigns (measuring click rates as a KPI), immediate teachable moment education when users click simulated phishing, and refresher campaigns. The goal is building a security-conscious culture, not just compliance checkboxes.",
 we:"Email security gateways and MFA are technical controls — important but they don't address the human behaviour that leads to clicking. EDR detects malware after it's already deployed. Training directly changes employee behaviour, reducing the human risk.",
 refs:[{text:"Security Awareness Training – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-awareness-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.6",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:142, domain:5,
 q:"An organisation uses a qualitative risk assessment and scores a risk as High likelihood × High impact. They then compare this to their risk appetite. The risk score exceeds their defined risk tolerance threshold. Which action is REQUIRED by their risk management policy?",
 opts:["Document the risk and defer treatment to the next annual review","Accept the risk and move on to other priorities","Treat the risk — implementing avoidance, mitigation, or transference to bring it within the defined risk tolerance threshold","Immediately report the risk to law enforcement"],
 correct:[2],
 exp:"Risk tolerance defines the maximum acceptable level of risk for the organisation. When a risk score exceeds the tolerance threshold, risk treatment is required — the organisation must take action to reduce the risk (through avoidance, mitigation, or transference) until it falls within tolerance. Risks within tolerance may be accepted. Exceeding tolerance requires action — not deferral.",
 we:"Deferring to the next annual review leaves an above-tolerance risk unaddressed — violating risk management policy. Accepting a risk above the tolerance threshold contradicts the definition of tolerance. Law enforcement is not appropriate for risk management decisions.",
 refs:[{text:"Risk Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST Glossary: Risk Tolerance",url:"https://csrc.nist.gov/glossary/term/risk_tolerance"}]},

{id:143, domain:5,
 q:"An organisation's internal audit team conducts an annual review of security controls — reviewing firewall rule changes, access provisioning logs, and patch compliance reports. A separate external audit is conducted every two years by an independent firm for regulatory compliance. What is the PRIMARY security advantage of the external audit over the internal audit?",
 opts:["External audits are less expensive than internal audits","External audits can access systems that internal auditors cannot","External audits provide independent, unbiased verification — internal auditors report to the same organisation they audit, creating a potential conflict of interest","External auditors have greater technical expertise than internal auditors"],
 correct:[2],
 exp:"External audits are conducted by independent third parties with no financial or organisational relationship with the auditee. This independence is the key advantage — it eliminates the inherent conflict of interest in self-assessment or internal audit (where the auditor reports to the same management they are auditing). Independence gives external audit findings greater credibility with regulators, customers, and the board.",
 we:"External audits are typically more expensive, not less. Both internal and external auditors access the same scope by agreement. Internal auditors can have deep technical expertise. Independence — not cost, access, or skill — is the defining advantage of external audit.",
 refs:[{text:"Audits and Assessments – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-assessments-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:144, domain:5,
 q:"A company has a documented policy that employees must be rotated between roles every 12–18 months. From a security perspective, what is the PRIMARY benefit of job rotation?",
 opts:["It ensures employees develop a broad skill set for career advancement","It ensures cross-training so the organisation can function if an employee leaves","It limits the time any single employee performs a sensitive role, reducing opportunities for sustained fraud or error, and allows fresh eyes to detect irregularities","It satisfies regulatory requirements for personnel management"],
 correct:[2],
 exp:"Job rotation limits the window during which any single employee can perpetuate a fraud scheme, as they are moved out of the role before they can establish long-term concealment. The incoming employee, unfamiliar with the previous occupant's methods, is more likely to detect anomalies. Combined with mandatory vacation, it is a key insider threat deterrent control in financial and high-trust environments.",
 we:"Career development and cross-training are benefits but not the primary security purpose. Regulatory compliance may require it in some contexts but is not the core security rationale. The fraud detection and insider threat limitation purpose is the specific security objective.",
 refs:[{text:"Personnel Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/personnel-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:145, domain:5,
 q:"A financial services company is assessed under PCI DSS because it processes credit card transactions. An assessor finds that the organisation stores full Primary Account Numbers (PANs) in an unencrypted flat file on a shared network drive. Which PCI DSS requirement is violated?",
 opts:["PCI DSS Requirement 2 — Apply secure configurations to all system components","PCI DSS Requirement 3 — Protect stored account data by encrypting PANs at rest using strong cryptography","PCI DSS Requirement 8 — Identify users and authenticate access to system components","PCI DSS Requirement 10 — Log and monitor all access to system components and cardholder data"],
 correct:[1],
 exp:"PCI DSS Requirement 3 mandates protecting stored cardholder data. Stored PANs must be rendered unreadable using strong cryptography (AES-256, RSA-2048), truncation, tokenisation, or one-way hashing. Unencrypted PANs in a flat file on a shared drive is a clear violation — this data is accessible to any user with share access and is readable without any key.",
 we:"Requirement 2 addresses secure configuration (patching, disabling defaults). Requirement 8 governs user authentication and identity. Requirement 10 addresses logging and monitoring. Requirement 3 is specifically about protecting stored cardholder data through encryption or rendering it unreadable.",
 refs:[{text:"PCI DSS Compliance – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"PCI DSS: Requirement 3",url:"https://www.pcisecuritystandards.org/document_library/"}]},

{id:146, domain:5,
 q:"Two organisations agree to share network connectivity for a collaborative project. The agreement defines the connection specifications, security requirements each party must maintain, permitted data flows, and technical requirements for interconnection. What type of agreement governs network interconnections between organisations?",
 opts:["SLA — defining service performance commitments and remedies","MOU — a non-binding statement of mutual intentions","ISA (Interconnection Security Agreement) — a formal agreement specifying technical and security requirements for linking two organisations' IT systems","NDA — protecting confidential information shared between the organisations"],
 correct:[2],
 exp:"An ISA (Interconnection Security Agreement) governs the technical, operational, and security requirements for connecting two separate organisations' IT systems. It defines: what systems are connected, permitted data types, security controls each party must maintain, incident response responsibilities, and monitoring requirements. ISAs are commonly required when connecting to government networks (FISMA) or for regulated industry partnerships.",
 we:"SLAs define service performance levels. MOUs are non-binding statements of intent without technical specifications. NDAs protect confidential information. An ISA specifically governs network interconnection security requirements.",
 refs:[{text:"Vendor Agreements – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/third-party-risk-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:147, domain:5,
 q:"A penetration test finding states: 'The web application is vulnerable to SQL injection on the login form. An attacker with no credentials could extract the entire user database including password hashes.' The organisation decides not to fix it because remediation is too expensive. What risk management decision does this represent, and what documentation is required?",
 opts:["Risk avoidance — the organisation is avoiding the risk by not using the web application","Risk mitigation — implementing compensating controls reduces the risk","Risk acceptance — formally acknowledging the residual risk with documented justification and management sign-off","Risk transference — the risk is transferred to the web application vendor"],
 correct:[2],
 exp:"Risk acceptance is the deliberate decision to accept a risk without further mitigation — typically because controls cost more than the potential loss, or the risk is considered tolerable. Formal risk acceptance requires written documentation (a risk acceptance memo or entry in the risk register), justification, an owner, and management sign-off at an appropriate level. Undocumented risk acceptance ('ignoring' the finding) is not the same as formal acceptance.",
 we:"Risk avoidance eliminates the activity that creates the risk — they're keeping the application. Risk mitigation adds controls — they're explicitly not remediating. Risk transference shifts financial liability to a third party. Risk acceptance = documented decision to live with the risk.",
 refs:[{text:"Risk Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:148, domain:5,
 q:"An organisation's acceptable use policy (AUP) prohibits using company devices for personal social media, installing unapproved software, or connecting to public Wi-Fi without VPN. An employee is terminated after being found browsing competitor job boards on a company laptop. What type of document made this termination defensible?",
 opts:["Vulnerability assessment report — documenting the risk of the employee's actions","Incident response plan — defining how to handle employee policy violations","Acceptable Use Policy (AUP) — a documented policy defining permitted and prohibited uses of company IT resources, making violations enforceable","Data classification policy — defining how to label and handle sensitive information"],
 correct:[2],
 exp:"An AUP defines what employees may and may not do with company IT resources — computers, internet access, email, mobile devices, and cloud services. By documenting prohibited behaviours and requiring employee acknowledgement (signature), the AUP provides the legal and HR foundation for disciplinary action or termination. Without an AUP, it is difficult to enforce violations or defend termination decisions.",
 we:"Vulnerability assessment reports document technical weaknesses. The incident response plan handles security incidents. Data classification policies govern data handling. The AUP defines permitted/prohibited use and creates the enforceable rule.",
 refs:[{text:"Security Policies – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-policies-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:149, domain:5,
 q:"A security awareness programme measures its effectiveness by tracking phishing simulation click rates over time. In Q1, 22% of employees clicked. After targeted training for clickers and company-wide monthly micro-training, the Q4 rate is 6.3%. What does the declining click rate represent?",
