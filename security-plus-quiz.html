 q:"Malware that encrypts a victim's files and demands payment for the decryption key is classified as:",
 opts:["Spyware","Adware","Ransomware","Rootkit"],
 correct:[2],
 exp:"Ransomware encrypts victim files or locks systems and demands a ransom (usually cryptocurrency) for the decryption key. Modern ransomware also exfiltrates data and threatens to publish it (double extortion).",
 we:"Spyware secretly monitors user activity. Adware displays unwanted ads. Rootkit hides malware from detection. Ransomware = encryption + extortion.",
 refs:[{text:"Ransomware – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/ransomware-sy0-701/"},{text:"CISA: Ransomware Guide",url:"https://www.cisa.gov/ransomware"}]},

{id:73, domain:2,
 q:"An attacker uses a valid employee's credentials obtained from a data breach on another site to log into a corporate portal. What attack technique is this?",
 opts:["Brute force","Password spraying","Credential stuffing","Dictionary attack"],
 correct:[2],
 exp:"Credential stuffing uses actual username/password pairs leaked from previous data breaches, exploiting password reuse across sites. Tools automate testing thousands of stolen credentials against the target application.",
 we:"Brute force = tries all combinations. Password spraying = tries one common password across many accounts. Dictionary = tries wordlist. Credential stuffing = uses REAL leaked credentials from other breaches.",
 refs:[{text:"Password Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"MITRE ATT&CK: Credential Stuffing",url:"https://attack.mitre.org/techniques/T1110/004/"}]},

{id:74, domain:2,
 q:"Which type of injection attack allows an attacker to execute operating system commands through a vulnerable web application?",
 opts:["SQL injection","LDAP injection","Command injection","XML injection"],
 correct:[2],
 exp:"Command injection occurs when user input is passed unsanitized to a system shell. An attacker can execute arbitrary OS commands with the web server's privileges. Example: appending '; rm -rf /' to an input field that's used in a shell command.",
 we:"SQL injection targets databases. LDAP injection targets directory services. XML injection targets XML parsers. Command injection = OS shell execution through the application.",
 refs:[{text:"Injection Attacks – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/injection-attacks-sy0-701/"},{text:"OWASP: Command Injection",url:"https://owasp.org/www-community/attacks/Command_Injection"}]},

{id:75, domain:2,
 q:"A penetration tester uses a tool to scan for open ports and services on a target network. Which phase of the penetration testing process does this represent?",
 opts:["Exploitation","Reporting","Reconnaissance/scanning","Post-exploitation"],
 correct:[2],
 exp:"Port scanning and service enumeration are part of the reconnaissance and scanning phase. Tools like Nmap discover open ports, running services, and OS versions before exploitation begins.",
 we:"Exploitation = actually attacking the discovered vulnerabilities. Reporting = documenting findings. Post-exploitation = actions taken after gaining access (lateral movement, persistence). Scanning = discovery phase.",
 refs:[{text:"Penetration Testing – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"},{text:"NIST SP 800-115: Security Testing Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-115/final"}]},

// Domain 3 — Security Architecture
{id:76, domain:3,
 q:"Which protocol provides secure remote access to network devices using encrypted terminal sessions, replacing Telnet?",
 opts:["FTP","SSH","SFTP","HTTPS"],
 correct:[1],
 exp:"SSH (Secure Shell) provides encrypted command-line access to remote systems, replacing the plaintext Telnet protocol. It uses asymmetric keys for authentication and symmetric keys for session encryption.",
 we:"FTP = file transfer (unencrypted). SFTP = SSH-based file transfer (not terminal sessions). HTTPS = encrypted web traffic. SSH = encrypted remote terminal/command access.",
 refs:[{text:"Secure Protocols – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-protocols-sy0-701/"},{text:"NIST Glossary: Secure Shell",url:"https://csrc.nist.gov/glossary/term/secure_shell"}]},

{id:77, domain:3,
 q:"A company wants to verify that software downloads have not been tampered with. Which mechanism should they publish alongside the download?",
 opts:["Digital signature","Symmetric encryption key","SSL certificate","Access control list"],
 correct:[0],
 exp:"A digital signature (or cryptographic hash) published alongside a download allows users to verify integrity. Users compute the hash of the downloaded file and compare it to the published value. A mismatch indicates tampering.",
 we:"Symmetric keys would need to be shared securely. SSL certificates secure the transport, not file integrity. ACLs control access. Digital signature/hash = integrity verification for downloads.",
 refs:[{text:"Digital Signatures – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-signatures-sy0-701/"},{text:"NIST Glossary: Digital Signature",url:"https://csrc.nist.gov/glossary/term/digital_signature"}]},

{id:78, domain:3,
 q:"Which wireless security protocol replaced WPA2 and provides stronger encryption with Simultaneous Authentication of Equals (SAE)?",
 opts:["WEP","WPA","WPA2","WPA3"],
 correct:[3],
 exp:"WPA3 replaces WPA2 with stronger protections including Simultaneous Authentication of Equals (SAE), which replaces the Pre-Shared Key handshake and provides forward secrecy. It's resistant to offline dictionary attacks.",
 we:"WEP = broken (RC4, easily cracked). WPA = improved WEP but still weak (TKIP). WPA2 = AES-based, still widely used. WPA3 = current standard with SAE and forward secrecy.",
 refs:[{text:"Wireless Security – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/wireless-security-sy0-701/"},{text:"Wi-Fi Alliance: WPA3 Overview",url:"https://www.wi-fi.org/discover-wi-fi/security"}]},

{id:79, domain:3,
 q:"An organization is moving workloads to the cloud. The cloud provider manages the physical hardware, hypervisor, and network, while the customer manages the OS and applications. Which cloud model is this?",
 opts:["SaaS","PaaS","IaaS","On-premises"],
 correct:[2],
 exp:"In IaaS (Infrastructure as a Service), the cloud provider manages the physical infrastructure (hardware, virtualization, networking). The customer is responsible for the OS, middleware, runtime, and applications. This is the shared responsibility model for IaaS.",
 we:"SaaS = provider manages everything including the application. PaaS = provider manages infrastructure and runtime; customer manages only applications/data. IaaS = customer manages OS and up. On-premises = customer manages everything.",
 refs:[{text:"Cloud Shared Responsibility – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"NIST SP 800-145: Cloud Computing Definition",url:"https://csrc.nist.gov/publications/detail/sp/800-145/final"}]},

{id:80, domain:3,
 q:"Which concept ensures that data remains accessible and systems remain operational even during failures or attacks?",
 opts:["Confidentiality","Integrity","Availability","Non-repudiation"],
 correct:[2],
 exp:"Availability (the 'A' in the CIA triad) ensures that systems, services, and data are accessible when needed. Threats to availability include DDoS attacks, ransomware, hardware failures, and natural disasters.",
 we:"Confidentiality = data hidden from unauthorized users. Integrity = data hasn't been altered. Non-repudiation = actions can't be denied. Availability = systems accessible when needed.",
 refs:[{text:"CIA Triad – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/the-cia-triad-sy0-701/"},{text:"NIST Glossary: Availability",url:"https://csrc.nist.gov/glossary/term/availability"}]},

{id:81, domain:3,
 q:"A security architect implements a system where each microservice in an application only communicates with the services it explicitly needs. Which principle does this implement?",
 opts:["Defense in depth","Least privilege","Separation of duties","Zero trust"],
 correct:[1],
 exp:"Applying least privilege to network architecture means each service only has access to the services it needs. This limits blast radius — if one microservice is compromised, it can't freely communicate with all other services.",
 we:"Defense in depth = multiple layered controls. Separation of duties = splitting tasks across people. Zero trust = never trust, always verify. Least privilege = minimum necessary access — applied here at the network/service level.",
 refs:[{text:"Least Privilege – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/least-privilege-sy0-701/"},{text:"NIST SP 800-207: Zero Trust & Least Privilege",url:"https://csrc.nist.gov/publications/detail/sp/800-207/final"}]},

{id:82, domain:3,
 q:"Which backup strategy backs up only the data that has changed since the last FULL backup, requiring the full backup and only the most recent differential backup to restore?",
 opts:["Full backup","Incremental backup","Differential backup","Snapshot backup"],
 correct:[2],
 exp:"A differential backup captures all changes since the last full backup. Restoration requires the full backup plus the latest differential — simpler than incremental but differential backups grow larger over time.",
 we:"Full = everything. Incremental = only changes since last backup of ANY type (faster backup, slower restore — needs full + all incrementals). Differential = changes since last FULL (slower backup than incremental, faster restore). Snapshot = point-in-time copy.",
 refs:[{text:"Backup Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/backups-sy0-701/"},{text:"NIST SP 800-34: Backup Strategies",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

// Domain 4 — Security Operations
{id:83, domain:4,
 q:"Which framework describes adversary tactics and techniques and is widely used by SOC teams to understand and detect attacker behavior?",
 opts:["NIST CSF","MITRE ATT&CK","OWASP Top 10","CIS Controls"],
 correct:[1],
 exp:"MITRE ATT&CK (Adversarial Tactics, Techniques, and Common Knowledge) is a knowledge base of real-world adversary behaviors organized by tactics (what they're trying to achieve) and techniques (how they do it). SOC teams use it to detect, hunt, and respond to threats.",
 we:"NIST CSF = five-function cybersecurity framework. OWASP Top 10 = web application vulnerabilities. CIS Controls = prioritized security best practices. MITRE ATT&CK = adversary tactics and techniques.",
 refs:[{text:"Threat Intelligence – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"MITRE ATT&CK Framework",url:"https://attack.mitre.org/"}]},

{id:84, domain:4,
 q:"A SOC analyst notices unusual outbound traffic to a foreign IP occurring every 60 seconds from an internal host. What is the MOST likely explanation?",
 opts:["A software update is checking for new versions","The host is beaconing to a command-and-control server","The firewall is sending heartbeat packets","A legitimate scheduled task is running"],
 correct:[1],
 exp:"Regular, timed outbound connections to an external IP are a classic indicator of C2 (command-and-control) beaconing. Malware on the compromised host 'phones home' at regular intervals to receive instructions or exfiltrate data.",
 we:"Software updates are typically user-initiated or irregular. Firewall heartbeats go to internal management systems. Scheduled tasks usually run internal processes. Regular outbound beaconing to unknown external IPs = C2 malware.",
 refs:[{text:"Network Traffic Analysis – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-traffic-analysis-sy0-701/"},{text:"MITRE ATT&CK: C2 Beaconing",url:"https://attack.mitre.org/tactics/TA0011/"}]},

{id:85, domain:4,
 q:"During incident response, an analyst discovers that an attacker has created a new admin account on a compromised server. Which incident response phase addresses removing this account?",
 opts:["Identification","Containment","Eradication","Recovery"],
 correct:[2],
 exp:"Eradication involves removing all artifacts of the attack — malware, backdoors, unauthorized accounts, and persistence mechanisms. After eradication, recovery restores the system to normal operation.",
 we:"Identification = detecting the incident. Containment = stopping the spread. Eradication = removing the threat artifacts (backdoor accounts, malware). Recovery = restoring normal operations.",
 refs:[{text:"Incident Response – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"NIST SP 800-61: Eradication Phase",url:"https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"}]},

{id:86, domain:4,
 q:"Which mobile device management (MDM) capability allows an organization to remotely delete all data from a lost or stolen device?",
 opts:["Remote lock","Remote wipe","Containerization","Geofencing"],
 correct:[1],
 exp:"Remote wipe sends a command to a mobile device to delete all data, returning it to factory settings. This prevents data theft if a device is lost or stolen. MDM solutions like Microsoft Intune and Jamf provide this capability.",
 we:"Remote lock = locks the screen with a PIN. Containerization = separates corporate from personal data. Geofencing = restricts device use by location. Remote wipe = delete all data remotely.",
 refs:[{text:"Mobile Device Management – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/mobile-device-management-sy0-701/"},{text:"NIST SP 800-124: Mobile Device Security",url:"https://csrc.nist.gov/publications/detail/sp/800-124/rev-2/final"}]},

{id:87, domain:4,
 q:"A security engineer wants to implement a system that automatically blocks an IP address after 5 failed login attempts. Which technology category provides this?",
 opts:["SIEM","IPS","WAF","DLP"],
 correct:[1],
 exp:"An Intrusion Prevention System (IPS) or an account lockout policy can automatically block IPs after repeated failed attempts. IPS rules can detect brute-force patterns and take automated blocking actions.",
 we:"SIEM = aggregates/correlates logs but doesn't directly block. WAF = blocks web application attacks. DLP = prevents data exfiltration. IPS = actively blocks detected threats.",
 refs:[{text:"IDS and IPS – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/intrusion-detection-and-prevention-sy0-701/"},{text:"NIST Glossary: Intrusion Prevention System",url:"https://csrc.nist.gov/glossary/term/intrusion_prevention_system"}]},

{id:88, domain:4,
 q:"Which type of malware analysis executes the malware in a controlled, isolated environment to observe its behavior without risking the production network?",
 opts:["Static analysis","Dynamic analysis","Code review","Signature analysis"],
 correct:[1],
 exp:"Dynamic analysis (also called behavioral analysis) executes malware in a sandbox environment to observe what it does — files created, registry changes, network connections, processes spawned. Tools like Cuckoo Sandbox automate this.",
 we:"Static analysis = examining the file without executing it (disassembly, strings). Code review = reading source code. Signature analysis = matching known patterns. Dynamic analysis = run it and watch what happens.",
 refs:[{text:"Malware Analysis – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-analysis-sy0-701/"},{text:"CISA: Malware Analysis Tools",url:"https://www.cisa.gov/resources-tools/services/malware-analysis"}]},

{id:89, domain:4,
 q:"An organization uses a honeynet to detect attackers. What is a honeynet?",
 opts:["A network of security scanners","A decoy network of systems designed to lure and detect attackers","An encrypted VPN network","A network segmentation technique"],
 correct:[1],
 exp:"A honeynet is a network of honeypots — decoy systems intentionally made to look valuable and vulnerable. Any traffic to or from the honeynet is suspicious by definition, since legitimate users have no reason to access these systems.",
 we:"Security scanners are active tools. VPN creates encrypted tunnels. Network segmentation limits lateral movement. Honeynet = decoy infrastructure to detect and study attackers.",
 refs:[{text:"Honeypots & Honeynets – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/honeypots-and-honeynets-sy0-701/"},{text:"NIST Glossary: Honeypot",url:"https://csrc.nist.gov/glossary/term/honeypot"}]},

{id:90, domain:4,
 q:"Which process involves proactively searching through networks and systems for indicators of compromise that have evaded existing security tools?",
 opts:["Vulnerability scanning","Penetration testing","Threat hunting","Incident response"],
 correct:[2],
 exp:"Threat hunting is a proactive, human-led activity where analysts search for hidden threats that automated tools may have missed. Hunters use threat intelligence, behavioral analytics, and hypotheses to find attackers already in the environment.",
 we:"Vulnerability scanning = finding weaknesses. Pen testing = simulating attacks. Incident response = reacting to known incidents. Threat hunting = proactively searching for undetected threats.",
 refs:[{text:"Threat Hunting – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-hunting-sy0-701/"},{text:"MITRE ATT&CK: Threat Hunting",url:"https://attack.mitre.org/resources/faq/"}]},

// Domain 5 — Security Program Management
{id:91, domain:5,
 q:"A company performs a risk assessment and determines the potential financial loss from a single ransomware incident is $500,000. What is this value called?",
 opts:["Annual Loss Expectancy (ALE)","Single Loss Expectancy (SLE)","Exposure Factor (EF)","Annual Rate of Occurrence (ARO)"],
 correct:[1],
 exp:"Single Loss Expectancy (SLE) is the expected financial loss from a single occurrence of a risk event. SLE = Asset Value × Exposure Factor. ALE = SLE × ARO (how many times per year the event is expected to occur).",
 we:"ALE = annual expected loss (SLE × ARO). EF = percentage of asset value lost in one incident. ARO = frequency of occurrence per year. SLE = loss from ONE incident.",
 refs:[{text:"Risk Calculations – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/risk-management-types-sy0-701/"},{text:"NIST SP 800-30: Quantitative Risk Assessment",url:"https://csrc.nist.gov/publications/detail/sp/800-30/rev-1/final"}]},

{id:92, domain:5,
 q:"Which security document defines what is and is not acceptable use of company IT resources by employees?",
 opts:["Data classification policy","Acceptable Use Policy (AUP)","Incident response plan","Service Level Agreement (SLA)"],
 correct:[1],
 exp:"An Acceptable Use Policy (AUP) defines the rules for how employees may use company IT resources including computers, internet access, email, and software. Violations can result in disciplinary action.",
 we:"Data classification policy = how to label and handle data. IRP = how to respond to incidents. SLA = service availability commitments. AUP = what employees can and cannot do with IT resources.",
 refs:[{text:"Security Policies – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-policies-sy0-701/"},{text:"SANS: Acceptable Use Policy Template",url:"https://www.sans.org/information-security-policy/"}]},

{id:93, domain:5,
 q:"An organization requires all new employees to complete security awareness training within 30 days of hire. What type of control is this?",
 opts:["Technical control","Physical control","Administrative control","Compensating control"],
 correct:[2],
 exp:"Administrative controls (also called managerial controls) are policies, procedures, and training programs. Security awareness training is an administrative control that addresses the human element of security.",
 we:"Technical controls = software/hardware (firewalls, encryption, MFA). Physical controls = locks, cameras, guards. Compensating controls = alternative controls when primary isn't feasible. Administrative = policies, training, procedures.",
 refs:[{text:"Security Control Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"NIST SP 800-53: Control Categories",url:"https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"}]},

{id:94, domain:5,
 q:"Which term describes the process of identifying, cataloguing, and managing an organization's IT assets including hardware, software, and data?",
 opts:["Change management","Asset management","Configuration management","Patch management"],
 correct:[1],
 exp:"Asset management involves maintaining an inventory of all IT assets and understanding their value, location, ownership, and security posture. You cannot protect what you don't know you have.",
 we:"Change management = controlling changes to systems. Configuration management = maintaining desired system states. Patch management = applying software updates. Asset management = knowing what you own.",
 refs:[{text:"Asset Management – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/asset-management-sy0-701/"},{text:"CIS Control 1: Inventory of Enterprise Assets",url:"https://www.cisecurity.org/controls/inventory-and-control-of-enterprise-assets"}]},

{id:95, domain:5,
 q:"A financial institution is required to encrypt customer financial data under penalty of law. Which type of requirement is this?",
 opts:["Best practice","Guideline","Regulatory compliance requirement","Voluntary standard"],
 correct:[2],
 exp:"Regulatory compliance requirements are legally mandated controls. Financial institutions are subject to regulations like Gramm-Leach-Bliley Act (GLBA) and SOX which mandate specific security controls with legal penalties for non-compliance.",
 we:"Best practices = recommended but not required. Guidelines = optional suggestions. Voluntary standards = organizations choose to adopt (like ISO 27001). Regulatory = legally mandated with penalties.",
 refs:[{text:"Regulations & Compliance – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"NIST Compliance Resources",url:"https://csrc.nist.gov/Topics/Laws-and-Regulations"}]},

{id:96, domain:5,
 q:"Which type of audit examines an organization's security controls and practices and is conducted by an independent third party?",
 opts:["Internal audit","Penetration test","External audit","Vulnerability assessment"],
 correct:[2],
 exp:"An external audit is conducted by an independent third party, providing an unbiased assessment of security controls and compliance. It carries more credibility than an internal audit for demonstrating compliance to regulators and customers.",
 we:"Internal audit = conducted by the organization's own staff. Pen test = simulates attacks. Vulnerability assessment = identifies weaknesses. External audit = independent third-party assessment.",
 refs:[{text:"Audits & Assessments – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-assessments-sy0-701/"},{text:"ISACA: Auditing Standards",url:"https://www.isaca.org/resources/isaca-journal/issues"}]},

{id:97, domain:5,
 q:"What does the term 'data sovereignty' refer to in cloud computing?",
 opts:["Encrypting data before storing it in the cloud","The concept that data is subject to the laws of the country where it is stored","The cloud provider owning the customer's data","Using multiple cloud providers for redundancy"],
 correct:[1],
 exp:"Data sovereignty means that data stored in a particular country is subject to that country's laws and regulations. Organizations must consider where cloud providers physically store data to ensure compliance with local regulations like GDPR.",
 we:"Encrypting data = data security, not sovereignty. Cloud providers don't own customer data (contractually). Multi-cloud = redundancy strategy. Data sovereignty = legal jurisdiction over data based on where it's stored.",
 refs:[{text:"Data Privacy in the Cloud – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"GDPR: Data Location Requirements",url:"https://gdpr.eu/data-transfer-outside-eu/"}]},

{id:98, domain:2,
 q:"An attacker calls the help desk pretending to be a new employee and convinces them to reset a password and provide temporary credentials. What type of attack is this?",
 opts:["Phishing","Pretexting","Tailgating","Baiting"],
 correct:[1],
 exp:"Pretexting involves creating a fabricated scenario (pretext) to manipulate someone into providing information or access. Impersonating a new employee to trick the help desk is a classic pretexting social engineering attack.",
 we:"Phishing = deceptive email. Tailgating = physical unauthorized entry. Baiting = luring with physical media or downloads. Pretexting = fabricated identity/scenario to manipulate.",
 refs:[{text:"Social Engineering – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/social-engineering-sy0-701/"},{text:"MITRE ATT&CK: Pretexting",url:"https://attack.mitre.org/techniques/T1598/"}]},

{id:99, domain:3,
 q:"Which network device operates at Layer 3 and makes forwarding decisions based on IP addresses to route traffic between different networks?",
 opts:["Hub","Switch","Router","Repeater"],
 correct:[2],
 exp:"Routers operate at OSI Layer 3 (Network) and forward packets based on destination IP addresses using routing tables. They connect different networks (e.g., LAN to internet) and make intelligent path decisions.",
 we:"Hub = Layer 1, broadcasts to all ports. Switch = Layer 2, forwards based on MAC addresses. Repeater = Layer 1, regenerates signals. Router = Layer 3, routes based on IP.",
 refs:[{text:"Network Devices – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-devices-sy0-701/"},{text:"CompTIA: OSI Model & Networking Basics",url:"https://www.comptia.org/blog/what-is-the-osi-model"}]},

{id:100, domain:4,
 q:"A company implements a solution that decrypts, inspects, then re-encrypts HTTPS traffic to detect malware in encrypted sessions. What is this called?",
 opts:["Port mirroring","SSL/TLS inspection (SSL decryption)","Deep packet inspection of plaintext","Certificate pinning"],
 correct:[1],
 exp:"SSL/TLS inspection (also called SSL interception or SSL decryption) uses a proxy that terminates the SSL session, inspects the plaintext content for threats, then re-encrypts and forwards it. It requires installing a trusted root CA on client devices.",
 we:"Port mirroring = copies traffic to a monitoring device without decryption. DPI of plaintext = inspection after decryption, not the process itself. Certificate pinning = clients only accept specific certs, making SSL inspection harder. SSL inspection = the decrypt-inspect-re-encrypt process.",
 refs:[{text:"SSL Inspection – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/ssl-inspection-sy0-701/"},{text:"NIST Glossary: TLS Inspection",url:"https://csrc.nist.gov/glossary/term/tls_inspection"}]},

{id:101, domain:1,
 q:"Which term describes the practice of verifying a user's claimed identity before granting access?",
 opts:["Authorization","Authentication","Accounting","Auditing"],
 correct:[1],
 exp:"Authentication verifies WHO you are — confirming the identity of a user, device, or system before granting access. Authorization determines WHAT you can do after authentication. Accounting tracks what you did.",
 we:"Authorization = what access is permitted after identity is confirmed. Accounting (auditing) = tracking and logging activity. Authentication = proving identity.",
 refs:[{text:"AAA Framework – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/authentication-authorization-and-accounting-sy0-701/"},{text:"NIST Glossary: Authentication",url:"https://csrc.nist.gov/glossary/term/authentication"}]},

{id:102, domain:2,
 q:"Which type of cross-site scripting attack stores the malicious script on the server (e.g., in a database) so it executes for every user who visits the affected page?",
 opts:["Reflected XSS","Stored XSS","DOM-based XSS","Blind XSS"],
 correct:[1],
 exp:"Stored (persistent) XSS saves the malicious script in the application's database. Every user who visits the infected page receives and executes the script. This is more dangerous than reflected XSS, which only affects users who click a malicious link.",
 we:"Reflected XSS = script in URL, only affects users clicking the malicious link. DOM-based XSS = manipulates the DOM without server involvement. Blind XSS = script fires in admin panels not visible to attacker. Stored XSS = persisted in database, affects all visitors.",
 refs:[{text:"OWASP: Cross-Site Scripting Types",url:"https://owasp.org/www-community/attacks/xss/"},{text:"OWASP XSS Prevention Cheat Sheet",url:"https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html"}]},

{id:103, domain:3,
 q:"An organization deploys sensors throughout their network to detect abnormal traffic patterns and automatically alert the security team. This is an example of:",
 opts:["Preventive control","Detective control","Corrective control","Deterrent control"],
 correct:[1],
 exp:"Detecting abnormal traffic and alerting the security team is a detective control — it identifies that something suspicious is occurring. IDS systems, SIEM alerts, and anomaly detection are detective controls.",
 we:"Preventive = stops attacks before they happen. Corrective = fixes issues after detection. Deterrent = discourages attacks. Detective = identifies attacks that are occurring or have occurred.",
 refs:[{text:"Security Control Types – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"NIST SP 800-53: Detective Controls",url:"https://csrc.nist.gov/publications/detail/sp/800-53/rev-5/final"}]},

{id:104, domain:4,
 q:"Which OWASP Top 10 vulnerability occurs when an application includes components such as libraries or frameworks with known vulnerabilities?",
 opts:["Injection","Broken Access Control","Vulnerable and Outdated Components","Security Misconfiguration"],
 correct:[2],
 exp:"'Vulnerable and Outdated Components' (formerly A9, now A06 in OWASP Top 10 2021) occurs when applications use libraries, frameworks, or other components with known vulnerabilities. Log4Shell (Log4j vulnerability) is a prominent example.",
 we:"Injection = SQL/command/XSS injection. Broken Access Control = unauthorized access. Security Misconfiguration = defaults, error messages, unnecessary features. Vulnerable components = using outdated/unpatched libraries.",
 refs:[{text:"OWASP Top 10 (2021)",url:"https://owasp.org/Top10/"},{text:"Application Vulnerabilities – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-vulnerabilities-sy0-701/"}]},

{id:105, domain:5,
 q:"An organization's security team must notify affected customers within 72 hours of discovering a data breach. Which regulation mandates this requirement?",
 opts:["PCI DSS","HIPAA","GDPR","SOX"],
 correct:[2],
 exp:"GDPR (General Data Protection Regulation) requires organizations to notify supervisory authorities within 72 hours of becoming aware of a personal data breach, and to notify affected individuals without undue delay when the breach poses a high risk to their rights.",
 we:"PCI DSS requires breach notification but doesn't mandate a specific 72-hour window. HIPAA requires breach notification within 60 days. SOX focuses on financial reporting. GDPR = 72-hour breach notification requirement.",
 refs:[{text:"Data Privacy Regulations – Professor Messer",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-regulations-sy0-701/"},{text:"GDPR: Breach Notification Requirements",url:"https://gdpr.eu/article-33-notification-of-a-personal-data-breach/"}]},


// ── Q115–Q134: Pool expansion ─────────────────────────────────────────────

{id:115, domain:1,
 q:"A threat actor embeds a secret message inside a JPEG image file by slightly altering the least-significant bits of pixel values. The resulting image is visually identical to the original. Which technique is being used?",
 opts:["Encryption — the message is scrambled using a symmetric cipher","Steganography — concealing data within an ordinary carrier file so the existence of the message is hidden","Obfuscation — making source code difficult to reverse-engineer","Digital watermarking — embedding a visible copyright notice in media"],
 correct:[1],
 exp:"Steganography hides the existence of a message by embedding it within a non-secret carrier file (image, audio, video, or document). Unlike encryption — which makes it obvious that ciphertext exists — steganography conceals the fact that a secret is present at all. Least-significant bit (LSB) modification is the most common image steganography technique. Steganography is used in covert data exfiltration and is listed in SY0-701 Domain 1 under application security and cryptographic concepts.",
 we:"Encryption makes the presence of secret data obvious (ciphertext). Obfuscation makes source code harder to read but doesn't hide data inside an image file. Digital watermarking embeds detectable ownership metadata and may be visible — it is not about hiding the existence of the data.",
 refs:[{text:"Steganography – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/steganography-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:116, domain:1,
 q:"A company uses a third-party HR system that authenticates employees via the company's own identity provider. When an employee logs into the HR portal, their browser is redirected to the corporate IdP to authenticate, then returned to the HR system with an assertion of identity — without the HR system ever seeing the employee's password. Which protocol and framework is MOST commonly used for this type of federated authentication?",
 opts:["LDAP — the HR system queries the directory server directly for credentials","SAML 2.0 (Security Assertion Markup Language) — the IdP issues a signed XML assertion to the service provider confirming the user's identity after authentication","OAuth 2.0 — the user grants the HR system an access token for their calendar","Kerberos — the HR system requests a service ticket from the domain controller"],
 correct:[1],
 exp:"SAML 2.0 (Security Assertion Markup Language) is the dominant standard for web-based SSO federation. The Identity Provider (IdP) authenticates the user and issues a signed XML assertion to the Service Provider (SP). The SP trusts the assertion because it is cryptographically signed by the trusted IdP. The SP never handles the user's password. This is the standard for enterprise SSO (Okta, Azure AD, ADFS) connecting to SaaS applications. OAuth 2.0 is an authorisation framework, not an authentication/identity federation protocol (OIDC adds authentication on top of OAuth).",
 we:"LDAP is a directory access protocol — the HR system would need to check credentials itself (not federated). OAuth 2.0 delegates authorisation (access to resources), not identity assertions — SAML is the identity federation standard. Kerberos is used within Windows domains for internal single sign-on, not cross-domain web federation.",
 refs:[{text:"Federation and SAML – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/federation-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:117, domain:1,
 q:"A user's authentication app generates a 6-digit code that changes every 30 seconds based on the current time and a shared secret. This code must be entered alongside the user's password to log in. Which authentication mechanism does this describe?",
 opts:["HOTP (HMAC-based One-Time Password) — counter-based OTP that increments with each use","TOTP (Time-based One-Time Password) — a one-time code derived from the current time and a shared secret, valid for a short window (typically 30 seconds)","Push notification MFA — a mobile app receives a server-sent push to approve or deny","SMS-based OTP — a code sent via text message to the user's phone number"],
 correct:[1],
 exp:"TOTP (RFC 6238) generates a one-time password using HMAC-SHA1 applied to the current Unix timestamp (truncated to 30-second intervals) and a shared secret provisioned during enrollment (often via QR code). The authenticator app (Google Authenticator, Authy, Microsoft Authenticator) and the server independently calculate the same code using the same shared secret and time. TOTP is more secure than SMS OTP (not vulnerable to SIM-swapping intercept at the carrier) and is listed in SY0-701 Domain 1 under MFA methods.",
 we:"HOTP is counter-based — it increments on each use and doesn't expire by time. Push notification MFA sends a server-initiated prompt rather than a locally generated code. SMS OTP is delivered by the carrier and is vulnerable to SIM-swapping and SS7 attacks.",
 refs:[{text:"Multi-Factor Authentication – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/multifactor-authentication-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:118, domain:1,
 q:"A payment processor replaces raw credit card numbers (PANs) stored in their database with randomly generated substitute values. A mapping table stored in a separate, highly secured system links each substitute value back to the real PAN when needed for transaction processing. Which data protection technique is this?",
 opts:["Encryption — the PAN is mathematically transformed using a key and can be reversed","Tokenisation — a sensitive value is replaced with a non-sensitive placeholder (token) that has no mathematical relationship to the original","Hashing — the PAN is run through a one-way hash function","Data masking — displaying only the last four digits of the PAN"],
 correct:[1],
 exp:"Tokenisation replaces a sensitive value with a randomly generated token that has no mathematical or algorithmic relationship to the original value (unlike encryption, which is a reversible transformation). The original value is stored in a secure token vault. If the database containing tokens is breached, the attacker gets meaningless tokens. Tokenisation is the core of PCI DSS compliance for cardholder data — replacing PANs with tokens in application databases reduces PCI scope. SY0-701 lists tokenisation under Domain 1 data protection techniques.",
 we:"Encryption transforms data using a key and can be reversed with the key — encrypted PAN values in a breached database are still recoverable if the key is obtained. Hashing is one-way and cannot be reversed to recover the PAN, but tokens need to be reversible for transaction processing. Data masking (displaying **** 1234) is a display-layer technique.",
 refs:[{text:"Tokenisation and Data Protection – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-classifications-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:119, domain:2,
 q:"An attacker registers the domain 'micros0ft-support.com' — replacing the letter 'o' with the digit '0' — and creates a convincing support portal. Users receive phishing emails directing them to this site. Which attack technique does this describe?",
 opts:["DNS poisoning — corrupting a DNS resolver's cache to redirect queries for a legitimate domain","Typosquatting (URL hijacking) — registering a misspelled or visually deceptive domain name to capture users who mistype or are deceived","A man-in-the-middle attack intercepting and relaying traffic to the real Microsoft site","Subdomain hijacking — taking over a dangling DNS subdomain record"],
 correct:[1],
 exp:"Typosquatting (also called URL hijacking or homograph attacks) involves registering domain names visually similar to legitimate domains to deceive users. Techniques include replacing letters with digits (0 for o, 1 for l), adding/removing characters, using different TLDs (.net vs .com), or using homoglyph characters (Cyrillic that resemble Latin letters). Combined with phishing, it bypasses user vigilance. Typosquatting is listed in SY0-701 Domain 2 under social engineering and phishing techniques.",
 we:"DNS poisoning redirects queries for the legitimate domain itself — attackers use the real domain name, not a fake one. MitM intercepts traffic to the real site in transit. Subdomain hijacking takes over a legitimate organisation's own subdomain (e.g., abandoned cloud resources).",
 refs:[{text:"Phishing and Typosquatting – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/phishing-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:120, domain:2,
 q:"A company's CFO receives an email with the display name 'CEO Jane Smith' but sent from 'jane.smith@ceo-company-finance.net'. The email urgently requests a $250,000 wire transfer to a new vendor, citing a confidential acquisition. No phone verification is performed, and the transfer is completed. What type of attack is this?",
 opts:["Whaling — a phishing attack specifically targeting C-suite executives as victims","Business Email Compromise (BEC) — impersonating a trusted executive or authority figure via email to manipulate employees into wiring money or disclosing sensitive data","Vishing — a voice-based social engineering attack over the phone","Spear phishing — a targeted email attack that includes personalised details to appear credible"],
 correct:[1],
 exp:"Business Email Compromise (BEC) impersonates a trusted party — typically a CEO, CFO, attorney, or vendor — to manipulate employees into authorising fraudulent wire transfers or disclosing sensitive information. BEC exploits authority and urgency without requiring malware. The FBI IC3 reports BEC as the highest-cost cyber crime category annually, exceeding ransomware losses. BEC is listed in SY0-701 Domain 2 under social engineering attacks. Note: the CFO is the victim (targeted), while the CEO is impersonated — whaling would describe targeting the CEO directly as the victim.",
 we:"Whaling describes high-value executive targeting as victims (e.g., targeting the CEO to steal credentials). Here the CEO is impersonated, not targeted. Vishing uses voice calls. Spear phishing is highly personalised email targeting but doesn't necessarily involve impersonating an executive to request a wire transfer — BEC is the specific term for this financial fraud pattern.",
 refs:[{text:"Business Email Compromise – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/phishing-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:121, domain:2,
 q:"An attacker compromises an Active Directory environment and identifies service accounts that have SPNs (Service Principal Names) registered. The attacker requests Kerberos service tickets for these accounts, extracts them from memory, and cracks them offline to recover the plaintext service account passwords. What attack technique is this?",
 opts:["Pass-the-Hash — using a captured NTLM hash directly for authentication without cracking it","Kerberoasting — requesting Kerberos service tickets for SPN-registered accounts and cracking them offline to recover service account passwords","Golden Ticket attack — forging Kerberos TGTs using the KRBTGT account hash","DCSync — replicating the domain controller's password database remotely"],
 correct:[1],
 exp:"Kerberoasting exploits Kerberos ticket-granting service (TGS) functionality. Any domain user can request a service ticket (TGS) for any account with a Service Principal Name (SPN). The TGS is encrypted with the service account's NTLM hash. Attackers extract these tickets from memory (using Mimikatz, Rubeus) and crack them offline — no network noise during cracking. High-privilege service accounts with weak passwords are the primary target. Mitigations include long random service account passwords, managed service accounts (gMSA), and monitoring for unusual TGS requests. Kerberoasting is listed in SY0-701 Domain 2.",
 we:"Pass-the-Hash reuses a captured NTLM hash directly — no cracking required. Golden Ticket forges TGTs using the domain's KRBTGT hash to impersonate any user. DCSync replicates the AD password database by abusing replication permissions. Kerberoasting specifically targets service ticket encryption.",
 refs:[{text:"Kerberos Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:122, domain:2,
 q:"An attacker intercepts the TLS session token cookie from an authenticated user's browser traffic. The attacker replays this cookie in their own HTTP request to the web application and gains access to the victim's authenticated session — without knowing the user's password. What attack is this?",
 opts:["Cross-site request forgery (CSRF) — tricking the victim's browser into making an unintended request","Session hijacking — stealing and reusing a valid session token to impersonate an authenticated user","SQL injection — inserting malicious SQL to extract session tokens from the database","Cross-site scripting (XSS) — injecting malicious scripts to steal session cookies"],
 correct:[1],
 exp:"Session hijacking (also called cookie hijacking or session token theft) involves stealing a valid authenticated session identifier and replaying it to impersonate the victim. If session cookies are transmitted over unencrypted HTTP or are not marked HttpOnly/Secure, they can be intercepted or stolen. Once the attacker has the session token, they bypass authentication entirely — the server sees a valid token and grants access. Mitigations include HTTPS-only, Secure/HttpOnly cookie flags, short session timeouts, and IP binding. Session hijacking is listed in SY0-701 Domain 2.",
 we:"CSRF tricks the victim's own browser into making requests (the attacker never sees the session token). SQL injection manipulates database queries — it can extract data but isn't how a session token is replayed. XSS can be used to steal cookies (the delivery mechanism), but the attack of reusing that stolen token is session hijacking specifically.",
 refs:[{text:"Session Hijacking – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/session-hijacking-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:123, domain:3,
 q:"A security architect is designing a cloud environment where each microservice can only communicate with the specific services it depends on. Firewall rules are enforced at the individual workload level — not just at the subnet or VLAN boundary. A compromised container should not be able to reach unrelated services. Which security architecture concept describes this granular control?",
 opts:["Network segmentation — separating workloads into VLANs or subnets","Microsegmentation — enforcing fine-grained, identity- and workload-based access control policies between individual workloads within the same network segment","Air gapping — physically isolating the container environment","DMZ architecture — placing microservices in a semi-trusted network zone"],
 correct:[1],
 exp:"Microsegmentation applies access control at the individual workload or container level, not just at the subnet/VLAN perimeter. It is typically implemented using software-defined networking (SDN), service meshes (Istio, Cilium), or hypervisor-level firewalls. Each workload has an identity, and policies dictate which workloads can communicate with which — regardless of network location. If a container is compromised, microsegmentation limits lateral movement to only the services that container is permitted to reach. Microsegmentation is a core component of Zero Trust Architecture and is listed in SY0-701 Domain 3.",
 we:"Traditional network segmentation creates perimeters at subnet/VLAN boundaries but allows free communication within a segment. Microsegmentation adds intra-segment controls. Air gapping physically disconnects systems — not applicable to cloud microservices. DMZ is a traditional perimeter zone between the internet and internal network.",
 refs:[{text:"Microsegmentation – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/zero-trust-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:124, domain:3,
 q:"A company has remote employees, branch offices, and heavy use of SaaS applications. They want to converge SD-WAN, firewall-as-a-service (FWaaS), zero trust network access (ZTNA), secure web gateway (SWG), and CASB into a single cloud-native service that applies security policies close to the user — without backhauling traffic through a central data centre. Which architecture model describes this?",
 opts:["Traditional hub-and-spoke WAN with MPLS and on-premises NGFW at the data centre","SASE (Secure Access Service Edge) — converging SD-WAN networking and network security services into a unified, cloud-delivered platform with PoPs near users worldwide","VPN concentrator with split-tunnelling at each branch","SD-WAN with dedicated on-premises NGFW appliances at each branch office"],
 correct:[1],
 exp:"SASE (Secure Access Service Edge), coined by Gartner, converges WAN networking (SD-WAN) with a full security stack — FWaaS, CASB, SWG, ZTNA, and DLP — into a cloud-native service delivered from globally distributed PoPs. Users connect to the nearest PoP; security policies are enforced at the edge rather than backhauling to a central data centre. This reduces latency for SaaS access and eliminates the cost and complexity of maintaining security appliances. SASE is listed in the SY0-701 Domain 3 architecture objectives.",
 we:"Hub-and-spoke MPLS requires backhauling all traffic to a central firewall — inefficient for cloud-first organisations. VPN concentrators provide connectivity but not an integrated security stack at the edge. On-premises NGFW at each branch is a distributed approach but not converged into a cloud-native service — SASE is the specific model described.",
 refs:[{text:"SASE – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-access-service-edge-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:125, domain:3,
 q:"After a ransomware attack encrypted all production servers, the IT team discovered that backup data was also encrypted because backups were stored on the same network-attached storage. The business was offline for 18 days. Which backup resilience principle, if properly implemented, would MOST directly have prevented the backups from being encrypted?",
 opts:["Implementing AES-256 encryption on the backup storage to prevent the ransomware from reading backup data","The 3-2-1 backup rule — maintaining 3 copies of data, on 2 different media types, with at least 1 copy stored offline or air-gapped and therefore unreachable by ransomware","Increasing backup frequency from weekly to daily","Running backups to a separate VLAN on the same physical storage array"],
 correct:[1],
 exp:"The 3-2-1 backup rule specifies: 3 copies of data, on 2 different storage media types, with 1 copy stored offsite or offline (air-gapped/immutable). The offline or immutable copy is the critical defence against ransomware — malware that reaches the production network cannot encrypt or delete a copy it cannot connect to. Common implementations include tape (offline), cloud object storage with object lock (immutable), or a physically disconnected external drive. Encrypting backup drives protects confidentiality if drives are stolen but doesn't prevent network-accessible ransomware from overwriting them.",
 we:"Encrypting backup drives protects against physical theft of media but doesn't protect against ransomware with network access — ransomware can still write to an accessible encrypted volume. Increasing backup frequency improves the recovery point (RPO) but all copies are still lost if they're accessible to the attacker. A separate VLAN on the same NAS is not truly air-gapped — the storage is still reachable.",
 refs:[{text:"Backup and Recovery – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/backup-and-recovery-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:126, domain:4,
 q:"A security team wants to proactively detect command-and-control (C2) communication from compromised hosts on their network before malware can exfiltrate data. They deploy a service that monitors all DNS queries leaving the network and blocks resolution of domains identified in threat intelligence feeds as C2 infrastructure. Which security control is this?",
 opts:["A network IPS with signature rules matching known C2 traffic patterns","DNS Security Extensions (DNSSEC) — cryptographically signing DNS records to prevent spoofing","A DNS sinkhole / DNS filtering service — intercepting DNS queries and returning a null or sinkhole response for domains on a blocklist","Egress firewall rules blocking outbound traffic on port 443 to unknown IPs"],
 correct:[2],
 exp:"A DNS sinkhole (DNS filtering) intercepts DNS queries and returns a controlled response (NXDOMAIN, or a sinkhole IP) for domains on a blocklist — preventing the compromised host from resolving the C2 domain and establishing a connection. Because malware almost always uses DNS for C2 discovery, DNS sinkholes are highly effective at disrupting C2 communications. They also generate telemetry (which hosts attempted to resolve C2 domains). DNSSEC prevents DNS record tampering but does not block resolution of malicious domains. IPS can detect known C2 traffic patterns but operates after a connection is already being established.",
 we:"Network IPS with C2 signatures can detect traffic patterns after a connection is established, but DNS filtering blocks the initial resolution step — earlier in the kill chain. DNSSEC authenticates DNS records to prevent cache poisoning; it does not filter or block malicious domains. Egress firewall rules on port 443 would block most HTTPS traffic indiscriminately.",
 refs:[{text:"DNS Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/dns-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:127, domain:4,
 q:"A security team wants to share indicators of compromise (IoCs) — including malicious IP addresses, file hashes, and domain names — with partner organisations in a machine-readable, structured format that can be automatically ingested into SIEM and threat intelligence platforms. Which pair of standards enables this structured threat intelligence exchange?",
 opts:["CVE and CVSS — the vulnerability naming and scoring standards","STIX (Structured Threat Information eXpression) and TAXII (Trusted Automated eXchange of Indicator Information) — STIX defines the data format; TAXII is the transport protocol for sharing STIX content","Syslog and SNMP — standard protocols for log and network management data","OpenIOC and MISP — open-source IoC formats specific to incident response tools"],
 correct:[1],
 exp:"STIX (Structured Threat Information eXpression) is the standard language for describing cyber threat intelligence — including threat actors, TTPs (from MITRE ATT&CK), indicators of compromise, campaigns, and courses of action — in a structured, machine-readable JSON format. TAXII (Trusted Automated eXchange of Indicator Information) is the transport protocol (HTTP-based API) for sharing STIX content between organisations. ISACs (Information Sharing and Analysis Centres), threat intelligence platforms (Palo Alto XSOAR, IBM QRadar), and government agencies (CISA) use STIX/TAXII for automated threat intelligence sharing. Both are listed in SY0-701 Domain 4.",
 we:"CVE names vulnerabilities and CVSS scores their severity — they are vulnerability management standards, not threat intelligence sharing formats. Syslog is a log transport protocol; SNMP monitors network device status. OpenIOC and MISP are real tools but are not the standardised pair listed in SY0-701.",
 refs:[{text:"Threat Intelligence – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:128, domain:4,
 q:"A DevOps team uses a container registry to store Docker images. Before any image is deployed to production, security tooling in the CI/CD pipeline automatically checks the image for known CVEs in OS packages and third-party libraries, and fails the build if critical vulnerabilities are found. What security practice is this?",
 opts:["Runtime container security — monitoring running containers for anomalous process behaviour","Container image scanning in the CI/CD pipeline — analysing image layers against CVE databases before deployment to catch vulnerabilities early (shift-left security)","Image signing — using a digital signature to verify the image hasn't been tampered with","Running containers as root to simplify build tooling"],
 correct:[1],
 exp:"Container image scanning analyses a Docker image's layers — checking all installed OS packages and library dependencies against CVE databases (NVD, vendor advisories) — before the image is pushed to a registry or deployed. Integrating scanning into the CI/CD pipeline implements 'shift-left security': finding vulnerabilities when the image is built, not after it's running in production. Tools include Trivy, Snyk Container, Clair, and AWS ECR image scanning. This is listed in SY0-701 Domain 4 under application and infrastructure security. Running as root is a security anti-pattern.",
 we:"Runtime container monitoring detects suspicious behaviour after deployment but doesn't prevent a vulnerable image from being deployed. Image signing (e.g., Docker Content Trust, Cosign) verifies integrity and provenance but doesn't scan for CVEs in dependencies. Running as root dramatically increases the blast radius of a container escape.",
 refs:[{text:"Container Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/container-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:129, domain:4,
 q:"A forensic investigator arrives at a compromised server that is still running. She needs to collect evidence in the correct order to preserve the most valuable and ephemeral data. Which sequence correctly follows the principle of order of volatility?",
 opts:["Hard drive image → system logs → RAM — physical storage media holds the most permanent evidence","RAM / memory contents → active network connections and routing tables → running processes → temp files on disk → hard drive image — capture the most volatile data first","Shut down the server immediately, then image the hard drive — this preserves a clean state","System logs → hard drive image → RAM — logs are most likely to be overwritten first"],
 correct:[1],
 exp:"The order of volatility principle in digital forensics dictates collecting evidence in order of how quickly it disappears. The standard order is: (1) CPU registers and cache (milliseconds), (2) RAM / memory — contains running processes, open network sockets, encryption keys, and malware artefacts not on disk; (3) active network connections and routing tables; (4) running processes and open file handles; (5) temporary/swap files; (6) disk (hard drive image — most persistent). Shutting down the server destroys all volatile evidence. Always image RAM before anything else.",
 we:"Shutting down the server immediately destroys all volatile evidence — the opposite of the correct procedure. Hard drive imaging is important but is the last step in order of volatility. System logs on disk are relatively persistent; RAM is the most volatile and should be captured first.",
 refs:[{text:"Digital Forensics – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-forensics-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.8",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:130, domain:5,
 q:"An organisation is launching a new app that collects biometric data and health information from EU residents. Before launch, the legal and privacy team must formally evaluate what personal data is collected, the legal basis for processing it, risks to individual rights, and mitigation controls — and GDPR requires this be documented for high-risk processing. What is this assessment called?",
 opts:["Penetration test — a simulated attack to identify security vulnerabilities before the app goes live","DPIA / Privacy Impact Assessment (PIA) — a structured assessment of privacy risks, data flows, compliance requirements, and mitigation measures required before high-risk data processing begins","Business Impact Analysis (BIA) — evaluating the operational impact if the app becomes unavailable","Vulnerability assessment — automated scanning for known weaknesses in the app"],
 correct:[1],
 exp:"A Data Protection Impact Assessment (DPIA) — called a Privacy Impact Assessment (PIA) in some frameworks — is a structured process for identifying and mitigating privacy risks before high-risk processing activities begin. Under GDPR Article 35, a DPIA is legally mandatory for processing involving biometrics, health data, large-scale profiling, or systematic monitoring. It documents: data categories, processing purpose, necessity and proportionality, risks to individuals, and mitigation controls. PIAs/DPIAs are listed in the SY0-701 Domain 5 privacy objectives.",
 we:"A penetration test identifies technical vulnerabilities but doesn't analyse privacy data flows or legal compliance. A BIA assesses operational availability impacts, not privacy risks to individuals. A vulnerability assessment scans for CVEs — it is not a privacy or compliance analysis.",
 refs:[{text:"Privacy Impact Assessment – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/privacy-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:131, domain:5,
 q:"A company's legal counsel notifies IT that litigation is anticipated regarding a contract dispute. All emails, documents, and records related to the project from the past three years must be preserved immediately. Normal email auto-deletion policies must be suspended for this data until the case is resolved. What is this preservation obligation called?",
 opts:["Data retention policy — the company's standard schedule for how long data is kept before deletion","Legal hold (litigation hold) — a preservation directive that suspends normal retention/deletion schedules for electronically stored information (ESI) relevant to actual or anticipated litigation","Data classification — labelling documents by their sensitivity level","Backup and recovery — maintaining copies of data for restoration after a failure"],
 correct:[1],
 exp:"A legal hold (litigation hold) is a directive — initiated by legal counsel — requiring an organisation to preserve all electronically stored information (ESI) potentially relevant to litigation or regulatory investigation. It overrides normal data retention and deletion schedules. Failure to implement a legal hold and resulting destruction of relevant data can constitute spoliation, leading to serious legal sanctions (adverse inference instructions, fines). Legal holds are explicitly listed in the SY0-701 Domain 5 data governance objectives.",
 we:"A data retention policy defines normal schedules for keeping or deleting data — a legal hold overrides it. Data classification labels data by sensitivity but doesn't impose preservation obligations. Backup and recovery ensures data availability for restoration — it is not the same as a legally mandated preservation order.",
 refs:[{text:"Data Governance – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-governance-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:132, domain:5,
 q:"A company's IT team needs to determine which business functions are critical, estimate how long the organisation can survive without each function (Maximum Tolerable Downtime), and quantify the financial loss per hour of downtime for each. This information will be used to set recovery time objectives (RTOs) and justify investment in resilience controls. What analysis produces this information?",
 opts:["Risk assessment — identifying and scoring the likelihood and impact of threats","Business Impact Analysis (BIA) — identifying critical business functions, their dependencies, MTD, RTO, RPO, and financial impact of disruption","Disaster Recovery Plan (DRP) — the step-by-step procedures for restoring systems after an incident","Penetration test — simulating failures to identify gaps in resilience"],
 correct:[1],
 exp:"A Business Impact Analysis (BIA) identifies and prioritises critical business functions by analysing the consequences of disruption. Key BIA outputs include: Maximum Tolerable Downtime (MTD) — how long before the disruption becomes catastrophic; Recovery Time Objective (RTO) — how quickly a system must be restored; Recovery Point Objective (RPO) — the maximum acceptable data loss; and financial/operational impact per hour of downtime. The BIA informs the Business Continuity Plan (BCP) and Disaster Recovery Plan (DRP) priorities. BIA is listed in SY0-701 Domain 5.",
 we:"Risk assessment identifies and scores threats but doesn't quantify MTD/RTO/RPO or map critical business functions. A DRP is the response procedure — it is built after the BIA defines the targets. A penetration test finds security vulnerabilities, not business continuity requirements.",
 refs:[{text:"Business Impact Analysis – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/business-impact-analysis-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 5.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

// ── NEW: Blueprint gap-fill questions (Q106–Q114) ──────────────────────────

{id:106, domain:1,
 q:"Before deploying a firewall rule change, a security team documents the purpose of the change, obtains approval from the change advisory board (CAB), schedules a maintenance window, and prepares a rollback plan. Which formal process does this describe?",
 opts:["Incident response","Change management","Configuration management","Patch management"],
 correct:[1],
 exp:"Change management is the formal process for controlling modifications to IT systems to minimise risk and unplanned outages. Key components are: request for change (RFC), impact assessment, CAB approval, maintenance window, rollback plan, and post-change documentation. The SY0-701 blueprint covers technical implications (service outages, legacy dependencies), version control, and documentation requirements under this objective.",
 we:"Incident response reacts to security events rather than planned modifications. Configuration management maintains desired system state but doesn't govern the approval/rollback process for changes. Patch management is a subset — applying software updates — not the overarching approval workflow.",
 refs:[{text:"Change Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/change-management-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:107, domain:1,
 q:"A company wants a tamper-evident, distributed audit log that records every configuration change made to network devices. No single party should be able to silently alter historical records. Which cryptographic technology provides this property?",
 opts:["Symmetric encryption (AES-256) applied to a central log database","Public key infrastructure (PKI) with certificate pinning","Blockchain — a distributed ledger where each block cryptographically references the previous block","HMAC-SHA256 message authentication codes appended to each log entry"],
 correct:[2],
 exp:"Blockchain is a distributed ledger where each block contains a cryptographic hash of the previous block, creating an immutable chain. Altering any historical record invalidates all subsequent hashes, making tampering detectable. Unlike AES encryption or HMAC on a centralised log file, blockchain is decentralised — no single authority can silently modify it. This tamper-evidence property makes it a recognised cryptographic solution in the SY0-701 objectives.",
 we:"AES-256 protects confidentiality but a database admin can still modify records and re-encrypt. PKI with certificate pinning authenticates servers, not audit logs. HMAC on individual entries detects modification of that entry but can be re-computed if the key is compromised; it doesn't provide the distributed trust model that blockchain does.",
 refs:[{text:"Blockchain Technology – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/blockchain-technology-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4 (Cryptographic Solutions)",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:108, domain:2,
 q:"Employees at a company begin using an unsanctioned cloud storage service to share work files because the approved solution is too slow. The IT department has no visibility into what data is being uploaded. What does this scenario BEST describe?",
 opts:["An insider threat — employees are intentionally exfiltrating sensitive data","Shadow IT — the use of technology not approved or managed by the IT department","A supply chain attack via a compromised third-party cloud provider","A man-in-the-middle attack intercepting file transfers"],
 correct:[1],
 exp:"Shadow IT refers to hardware, software, or cloud services used within an organisation without IT's knowledge or approval. It creates security risks because data may be stored outside monitored, policy-controlled systems. Unlike insider threats, shadow IT is typically motivated by productivity, not malice. The SY0-701 blueprint lists shadow IT as a threat vector under 'other threat vectors' in Domain 2.",
 we:"An insider threat implies deliberate intent to harm the organisation; shadow IT use is typically convenience-driven. A supply chain attack compromises a vendor's product/service — not applicable here. A man-in-the-middle attack intercepts communications in transit, not the act of using an unsanctioned service.",
 refs:[{text:"Shadow IT – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:109, domain:3,
 q:"A DevOps team uses Terraform to provision cloud infrastructure automatically. A security review finds that hardcoded API keys are embedded in several Terraform configuration files that have been committed to a public GitHub repository. What type of vulnerability does this BEST represent?",
 opts:["A web application vulnerability — SQL injection via the cloud management API","An Infrastructure as Code (IaC) misconfiguration — hardcoded secrets exposed in version-controlled configuration files","A supply chain attack — the Terraform registry provider was compromised","A physical security failure — the developer's laptop was stolen"],
 correct:[1],
 exp:"Infrastructure as Code (IaC) tools like Terraform, CloudFormation, and Ansible define infrastructure in files that can be version-controlled. A critical IaC vulnerability is embedding secrets (API keys, passwords, tokens) directly in configuration files committed to repositories. Even if the repo is later made private, secrets may already be cached or indexed. Best practice is using secrets managers (e.g., HashiCorp Vault, AWS Secrets Manager) or environment variables. SY0-701 explicitly includes IaC as an architecture model under Domain 3.",
 we:"SQL injection exploits unvalidated input in database queries — unrelated to infrastructure provisioning files. A supply chain attack targets the toolchain itself, not the configuration files. Physical security applies to hardware theft — the issue here is secrets in code.",
 refs:[{text:"Infrastructure as Code – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/infrastructure-as-code-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:110, domain:4,
 q:"A security operations centre (SOC) wants to automatically isolate an infected endpoint the moment an EDR alert fires, create a helpdesk ticket, and notify the analyst — all without manual intervention. Which technology enables this automated incident response workflow?",
 opts:["A SIEM with dashboards configured for manual analyst review","SOAR (Security Orchestration, Automation and Response) executing a pre-built playbook","A vulnerability scanner with scheduled remediation tasks","An IDS/IPS with inline signature-based blocking"],
 correct:[1],
 exp:"SOAR platforms connect disparate security tools via integrations and execute pre-defined playbooks automatically when triggered by alerts. A SOAR playbook can isolate an endpoint via EDR API, open a ticket in the ITSM system, and page the analyst — all within seconds of the alert. SIEM aggregates and correlates logs but requires analyst action to respond. IDS/IPS blocks specific traffic patterns inline but doesn't orchestrate multi-tool workflows. SOAR is explicitly listed in SY0-701 Domain 4.7.",
 we:"SIEM (Security Information and Event Management) is primarily a log aggregation and correlation tool — it can trigger alerts but doesn't automate multi-step response actions natively. IDS/IPS operates at the network packet level; it cannot isolate endpoints or create tickets. Vulnerability scanners find weaknesses, they don't respond to active incidents.",
 refs:[{text:"SOAR – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-loss-prevention-and-soar-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.7",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:111, domain:4,
 q:"A security analyst needs deep visibility into malicious processes running on endpoints, including behavioral analysis, the ability to hunt for threats across historical endpoint telemetry, and automated response actions such as process termination or host isolation. Which technology is specifically designed for this?",
 opts:["Network IDS (NIDS) — monitors network packets for attack signatures","EDR (Endpoint Detection and Response) — provides endpoint-level behavioral monitoring, detection, investigation, and automated response","DLP (Data Loss Prevention) — monitors data flows to prevent sensitive data exfiltration","SIEM — aggregates logs from multiple sources for centralised correlation"],
 correct:[1],
 exp:"EDR solutions are installed on endpoints to continuously monitor and record process behaviour, file changes, network connections, and registry modifications. They detect threats through behavioral analysis (not just signatures), enable retrospective threat hunting across stored telemetry, and can automatically isolate hosts or terminate processes. XDR (Extended Detection and Response) extends this visibility across network, cloud, and email layers. Both EDR and XDR are explicitly listed in the SY0-701 Domain 4 objectives.",
 we:"NIDS monitors network traffic but has no visibility into what processes are running inside an endpoint. SIEM aggregates logs but doesn't provide real-time endpoint behavioral monitoring or automated endpoint response. DLP focuses on preventing data exfiltration, not detecting or responding to malware behaviour.",
 refs:[{text:"EDR and XDR – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/endpoint-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:112, domain:4,
 q:"An organisation wants to prevent users from accessing websites hosting malware, phishing pages, and command-and-control (C2) infrastructure. The solution must protect all devices on the network — including IoT devices that cannot run endpoint agents — without requiring per-device software. Which security control BEST achieves this?",
 opts:["Host-based IPS deployed on every endpoint","DNS filtering — blocking resolution of known-malicious domains before any connection is established","Application whitelisting on all managed endpoints","Network flow analysis to detect C2 beaconing patterns"],
 correct:[1],
