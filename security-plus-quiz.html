//  DOMAIN 3 — Security Architecture
// ══════════════════════════════════════════
{id:52, domain:3,
 q:"A VPN client is configured so that only traffic destined for the corporate network routes through the encrypted VPN tunnel, while all other internet traffic goes directly to the internet from the user's local connection. What VPN configuration is this?",
 opts:["Full-tunnel VPN — all client traffic routes through the VPN tunnel regardless of destination","Split-tunnel VPN — only traffic destined for specific corporate resources routes through the VPN; other internet traffic exits locally","Site-to-site VPN — a persistent encrypted tunnel between two fixed network locations","Always-on VPN — the device maintains the VPN connection at all times regardless of network"],
 correct:[1],
 exp:"Split tunnelling sends only corporate-bound traffic through the VPN tunnel while other internet traffic exits the local connection directly. It reduces VPN bandwidth and latency for internet browsing. Security concern: the split-tunnel endpoint is less monitored — threats could enter the corporate network via the VPN from a compromised endpoint browsing the open internet.",
 we:"Full-tunnel VPN routes all traffic through the corporate gateway, providing complete visibility but using more bandwidth. Site-to-site VPN connects two fixed networks. Always-on VPN maintains a persistent connection — it can be either full or split tunnel.",
 refs:[{text:"VPN – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vpns-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:53, domain:3,
 q:"Which firewall type tracks the state of network connections and only allows return traffic for connections that were legitimately initiated from inside the network?",
 opts:["Packet filter firewall — inspects each packet individually based on static IP/port rules with no connection context","Stateful inspection firewall — maintains a state table of active connections and allows return traffic only for established sessions","Next-generation firewall (NGFW) — performs deep packet inspection at Layer 7 with application awareness","Circuit-level gateway — monitors TCP handshake completion at the session layer"],
 correct:[1],
 exp:"Stateful inspection firewalls maintain a connection state table (Layer 4 state). When an internal host initiates a TCP connection, the firewall records it in the state table and permits return packets. Unsolicited inbound packets with no corresponding state table entry are dropped. This is far more secure than stateless packet filters, which cannot distinguish return traffic from unsolicited inbound connections.",
 we:"Packet filters evaluate each packet independently with no state — they cannot distinguish legitimate return traffic from unsolicited inbound. NGFW goes further with Layer 7 application inspection and IPS. Circuit-level gateways monitor TCP handshake completion but don't inspect packet content. Stateful inspection is the Layer 3/4 connection-tracking model.",
 refs:[{text:"Firewalls – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/firewalls-sy0-701/"},{text:"NIST Glossary: Stateful Inspection",url:"https://csrc.nist.gov/glossary/term/stateful_inspection_firewall"}]},

{id:54, domain:3,
 q:"A company deploys a security device inline in front of their web application servers that can inspect HTTP requests, block SQL injection and XSS payloads, and enforce custom allow/deny rules for web traffic. What device is this?",
 opts:["Network IPS — blocks known attack signatures across all traffic types","Next-generation firewall (NGFW) — performs deep packet inspection at the application layer","Web Application Firewall (WAF) — specifically inspects and filters HTTP/HTTPS traffic to protect web applications from Layer 7 attacks","Unified Threat Management (UTM) — an all-in-one device combining multiple security functions"],
 correct:[2],
 exp:"A WAF specifically understands HTTP/HTTPS protocol semantics and can detect and block web-specific attacks: SQL injection, XSS, CSRF, directory traversal, and parameter tampering. WAFs can operate as reverse proxies, in-line appliances, or cloud services (AWS WAF, Cloudflare WAF). They can be signature-based, behavioural, or use ML-based anomaly detection.",
 we:"Network IPS detects attacks across all protocols but isn't specialised for HTTP semantics. NGFW inspects applications but doesn't have the same depth of web attack knowledge as a dedicated WAF. UTM is a multi-function appliance that may include a WAF but the specific component is the WAF.",
 refs:[{text:"Application Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/firewalls-sy0-701/"},{text:"OWASP: Web Application Firewall",url:"https://owasp.org/www-community/controls/Web_Application_Firewall"}]},

{id:55, domain:3,
 q:"An IDS sensor needs to see all traffic flowing through the core network switch to detect threats. Which switch configuration provides a copy of all traffic to the IDS without interrupting the flow of production traffic?",
 opts:["VLAN tagging — assigning ports to separate VLANs to isolate traffic","Port mirroring (SPAN port) — the switch copies all traffic from specified ports/VLANs to a designated monitoring port connected to the IDS","Network TAP — a physical device inserted inline that passes traffic through while sending a copy to the monitoring device","Inline IPS deployment — inserting the device directly in the traffic path so all packets flow through it"],
 correct:[1],
 exp:"Port mirroring (SPAN — Switched Port Analyser) configures the switch to copy traffic from one or more source ports/VLANs to a destination monitoring port. The IDS passively analyses the copied traffic without being in the packet path — no impact on production traffic. Alternative: a network TAP (hardware device) also copies traffic passively but is a physical device rather than a switch configuration.",
 we:"VLAN tagging segments traffic — it doesn't provide a copy to a monitoring device. A network TAP is similar but is a physical device, not a switch configuration. Inline IPS sits in the packet path, which introduces latency and a point of failure — SPAN/TAP are used for passive IDS monitoring.",
 refs:[{text:"Network Monitoring – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-monitoring-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:56, domain:3,
 q:"A company separates its HR, Finance, and Engineering systems into distinct network segments with firewall rules controlling inter-segment communication. If the HR network is compromised, the attacker cannot freely access Finance systems. Which security principle does this implement?",
 opts:["Zero trust — never trust, always verify every access request regardless of network location","Network segmentation — dividing a network into isolated zones to contain threats and enforce access control between segments","Defence in depth — applying multiple overlapping security controls","Least privilege — granting users only the minimum access needed for their job"],
 correct:[1],
 exp:"Network segmentation divides a network into zones (segments, VLANs, subnets) with controlled traffic flow between them via firewalls or ACLs. A compromise of one segment does not grant automatic access to other segments — the attacker must breach additional controls to pivot. This contains the blast radius of a breach and is a foundational architecture principle.",
 we:"Zero trust eliminates implicit trust based on network location and requires continuous verification — related but broader than just segmentation. Defence in depth uses multiple overlapping controls. Least privilege limits permissions for users/services. Network segmentation specifically divides networks into isolated zones.",
 refs:[{text:"Network Segmentation – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-segmentation-sy0-701/"},{text:"NIST SP 800-207: Zero Trust and Segmentation",url:"https://csrc.nist.gov/publications/detail/sp/800-207/final"}]},

{id:57, domain:3,
 q:"Which cloud service model requires the customer to manage only the application code and data, while the provider manages the runtime, middleware, OS, virtualisation, and physical infrastructure?",
 opts:["IaaS — the provider manages physical hardware; the customer manages OS and applications","SaaS — the provider manages everything; the customer only uses the application","PaaS — the provider manages infrastructure and runtime; the customer deploys and manages applications and data only","FaaS — the customer provides only functions triggered by events; the provider manages all execution infrastructure"],
 correct:[2],
 exp:"PaaS (Platform as a Service) provides a managed platform — the cloud provider handles infrastructure, virtualisation, OS, runtime, and middleware. The customer focuses on deploying and managing applications and their data. Examples: AWS Elastic Beanstalk, Azure App Service, Google App Engine, Heroku. This is the shared responsibility division point for PaaS.",
 we:"IaaS requires customers to manage OS and applications. SaaS is fully managed — customers just use the application (Salesforce, Gmail). FaaS (serverless functions) goes even further — customers write only function code. PaaS = provider manages up to and including the runtime.",
 refs:[{text:"Cloud Service Models – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-deployment-models-sy0-701/"},{text:"NIST SP 800-145: Cloud Computing Definition",url:"https://csrc.nist.gov/publications/detail/sp/800-145/final"}]},

{id:58, domain:3,
 q:"A company stores highly sensitive R&D data on a system that is not connected to any network — no Ethernet, no Wi-Fi, no Bluetooth. Physical access requires biometric authentication. Which security architecture concept does this describe?",
 opts:["Zero trust architecture — access to every resource requires continuous verification","Microsegmentation — firewall policies enforced at the individual workload level","Air gap — physical isolation from all network connections to prevent remote attacks","DMZ — a semi-trusted network zone separating public-facing and internal systems"],
 correct:[2],
 exp:"An air gap physically isolates a system from all networks, making remote attacks impossible. The only attack vectors are physical (an insider with access) or side-channel attacks (power analysis, acoustic, electromagnetic). Air gapping is used for the most sensitive systems: nuclear facility controls, classified government networks, and critical infrastructure. It significantly constrains operational usability.",
 we:"Zero trust controls access through policy verification — it still allows network connectivity. Microsegmentation enforces granular network policies between networked workloads. DMZ is a network zone between internet and internal — still connected. Air gap = no network connections at all.",
 refs:[{text:"Air Gap – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-segmentation-sy0-701/"},{text:"NIST Glossary: Air Gap",url:"https://csrc.nist.gov/glossary/term/air_gap"}]},

{id:59, domain:3,
 q:"An organisation uses a dedicated server as the only access path into a highly secured production network. All administrators must SSH into this server first, and from there, connect to production systems. Direct production access from engineer workstations is blocked. What is this server called?",
 opts:["Proxy server — forwards client requests to other servers on behalf of the client","Load balancer — distributes incoming connections across multiple backend servers","Bastion host / jump server — a hardened, single-access-path server used to securely access systems in a protected network","Honeypot — a decoy system designed to attract and detect attackers"],
 correct:[2],
 exp:"A bastion host (jump server / jump box) is a hardened, minimally functional server that serves as the sole gateway into a protected network. All access is logged and audited. By funnelling all administrative access through a single, well-monitored point, it simplifies auditing and reduces the attack surface. PAM (Privileged Access Management) solutions often incorporate bastion host functionality.",
 we:"A proxy server forwards general client traffic. A load balancer distributes traffic across servers. A honeypot is a decoy trap for attackers. A bastion host is specifically the controlled, audited gateway for privileged access.",
 refs:[{text:"Network Security Devices – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-devices-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:60, domain:3,
 q:"A company's RPO is 4 hours and its RTO is 2 hours. Their backup system completes a full backup every 24 hours at midnight. Which statement BEST identifies a gap?",
 opts:["The RTO gap: the backup system can restore systems in 30 minutes, exceeding the 2-hour RTO requirement","The RPO gap: if a failure occurs at 11 PM, up to 23 hours of data could be lost, far exceeding the 4-hour RPO","There is no gap: the 24-hour backup cycle is sufficient to meet both the 2-hour RTO and 4-hour RPO","The RTO gap: the system cannot be restored within 4 hours after a failure"],
 correct:[1],
 exp:"RPO (Recovery Point Objective) defines the maximum acceptable data loss measured in time. With a 4-hour RPO, the organisation can lose at most 4 hours of data. A 24-hour full backup cycle means a failure at 11 PM could result in up to 23 hours of data loss — far exceeding the 4-hour RPO. More frequent backups (incremental/differential) or continuous data replication are needed.",
 we:"RTO (Recovery Time Objective) is about how quickly systems are restored — 2 hours. The problem described is about data loss (RPO), not restoration time. The 24-hour backup cycle clearly violates a 4-hour RPO requirement.",
 refs:[{text:"Business Continuity – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/business-continuity-sy0-701/"},{text:"NIST SP 800-34: Contingency Planning Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

{id:61, domain:3,
 q:"A disaster recovery team needs a backup site that can be operational within 2–4 hours. It has networking and some hardware pre-installed, but servers need to be configured and software installed from backups before operations can resume. Which site type does this describe?",
 opts:["Hot site — a fully operational duplicate site that can assume production workloads within minutes","Cold site — an empty facility with power and networking but no hardware or software pre-installed","Warm site — partially equipped with networking and some hardware, requiring configuration time before becoming operational","Mobile site — portable equipment that can be transported to any location"],
 correct:[2],
 exp:"A warm site is the middle ground between hot and cold. It has basic infrastructure (power, cooling, networking, some hardware) but is not fully configured — systems must be set up and data restored from backups, typically taking hours to days. Warm sites balance cost savings over hot sites with faster recovery than cold sites.",
 we:"Hot sites mirror production and can fail over within minutes with minimal data loss. Cold sites are essentially empty floor space — days/weeks to become operational. A warm site specifically has partial infrastructure ready.",
 refs:[{text:"Disaster Recovery Sites – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/disaster-recovery-sy0-701/"},{text:"NIST SP 800-34: Alternate Sites",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

{id:62, domain:3,
 q:"Which RAID level distributes data and parity information across three or more drives, can survive any single drive failure, provides good read performance, but requires a minimum of three drives and has slightly reduced write performance due to parity calculations?",
 opts:["RAID 0 — striping across two drives with no redundancy, fastest read/write but zero fault tolerance","RAID 1 — mirroring data identically across two drives","RAID 5 — striping with distributed parity across three or more drives, survives one drive failure","RAID 6 — striping with double parity, can survive two simultaneous drive failures"],
 correct:[2],
 exp:"RAID 5 distributes data AND parity across all drives in the array. Parity allows rebuilding a failed drive's data from the remaining drives. Minimum 3 drives; effective capacity = (N-1) × drive size. Read performance is excellent (data striped across multiple drives). Write performance is slightly reduced by parity calculation. One drive failure is survivable; two concurrent failures result in data loss.",
 we:"RAID 0 has zero fault tolerance — one drive failure loses all data. RAID 1 mirrors data — no parity, requires 2 drives, 50% capacity. RAID 6 adds double parity (can survive 2 failures). RAID 5 = single parity distributed across N drives.",
 refs:[{text:"Redundancy – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/redundancy-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:63, domain:3,
 q:"An organisation performs a full backup every Sunday and daily incremental backups Monday–Saturday. A failure occurs on Friday afternoon. In what ORDER must backups be restored?",
 opts:["Friday incremental → Thursday incremental → Wednesday incremental → Tuesday incremental → Monday incremental → Sunday full","Sunday full → Monday incremental → Tuesday incremental → Wednesday incremental → Thursday incremental → Friday incremental","Sunday full backup only — incremental backups are cumulative","Friday incremental only — incremental backups contain all changes since the full backup"],
 correct:[1],
 exp:"Incremental backups capture changes since the LAST backup of ANY type. To restore, you must apply the full backup first (baseline) then each incremental in order to layer in successive changes. This is the main disadvantage of incremental vs differential — differential only needs the full + the latest differential, but incrementals require every backup in the chain.",
 we:"Applying incrementals before the full backup makes no sense — there's no baseline. A full backup alone ignores all changes made after Sunday. The last incremental alone only contains Friday's changes — without the base and preceding incrementals, the restore is incomplete.",
 refs:[{text:"Backup Types – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/backups-sy0-701/"},{text:"NIST SP 800-34: Backup and Recovery",url:"https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final"}]},

{id:64, domain:3,
 q:"A company wants all SaaS cloud applications to enforce their identity provider's MFA policies, even for apps that don't natively support MFA. Which technology enforces security policies between users and cloud services?",
 opts:["VPN — encrypts traffic between users and cloud applications","SIEM — aggregates and correlates logs from cloud services","CASB (Cloud Access Security Broker) — enforces security policies between users and cloud services, including MFA, DLP, and access control","WAF — filters malicious HTTP traffic to cloud-hosted web applications"],
 correct:[2],
 exp:"A CASB (Cloud Access Security Broker) acts as an enforcement point between users and cloud services. It can enforce MFA even for apps that don't natively support it (inline proxy mode), apply DLP policies to data uploaded to cloud apps, detect shadow IT, and enforce conditional access. Inline CASBs decrypt, inspect, and re-encrypt traffic to enforce policies.",
 we:"VPN encrypts tunnel traffic but doesn't enforce application-level policies like MFA or DLP. SIEM aggregates logs — it doesn't enforce policies. WAF protects web applications from attacks but doesn't manage cloud SaaS access policies.",
 refs:[{text:"CASB – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:65, domain:3,
 q:"An organisation's internal containers on the same Kubernetes node should not be able to communicate freely. Security policies are applied at the individual pod level — each pod only communicates with the specific pods it requires. Which concept does this implement?",
 opts:["Network segmentation — separating pods into different Kubernetes clusters","Microsegmentation — applying granular, identity-based access control policies at the individual workload (pod) level, not just at subnet boundaries","Air gapping — physically isolating containers from the network","VLAN separation — assigning different VLANs to different pod groups"],
 correct:[1],
 exp:"Microsegmentation applies access controls at the individual workload level — individual containers/pods in this case — rather than just at subnet or VLAN boundaries. Kubernetes Network Policies, service meshes (Istio, Cilium), or hypervisor-level firewalls implement microsegmentation. A compromised pod can only reach the specific pods it is permitted to access, limiting lateral movement.",
 we:"Traditional network segmentation creates perimeter zones — microsegmentation adds intra-zone controls. Air gapping physically disconnects systems. VLANs separate at Layer 2 — microsegmentation is software-defined and identity-aware, not VLAN-based.",
 refs:[{text:"Microsegmentation – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/zero-trust-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:66, domain:3,
 q:"A Type 1 hypervisor differs from a Type 2 hypervisor in what critical way?",
 opts:["Type 1 uses hardware-assisted virtualisation; Type 2 uses software emulation only","Type 1 runs directly on the physical hardware (bare-metal); Type 2 runs as an application on top of a host operating system","Type 1 supports only Windows VMs; Type 2 supports only Linux VMs","Type 1 is used only in cloud environments; Type 2 is used only on-premises"],
 correct:[1],
 exp:"Type 1 (bare-metal) hypervisors run directly on hardware with no host OS — examples include VMware ESXi, Microsoft Hyper-V, and Xen. They have better performance and a smaller attack surface. Type 2 (hosted) hypervisors run as applications on top of a host OS — examples include VMware Workstation, VirtualBox, and Parallels. The host OS adds attack surface and overhead but is more convenient for desktop use.",
 we:"Both Type 1 and 2 can use hardware-assisted virtualisation (VT-x/AMD-V). Both can run any OS in VMs. Both are used in cloud and on-premises. The key distinction is bare-metal vs hosted-on-OS.",
 refs:[{text:"Virtualisation – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/virtualisation-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:67, domain:3,
 q:"A cloud security architect recommends that all infrastructure deployments use version-controlled templates to define infrastructure state declaratively, enabling consistent, repeatable, and auditable provisioning. Which practice does this describe?",
 opts:["Configuration management — maintaining desired system state using tools like Puppet or Chef","Infrastructure as Code (IaC) — defining and provisioning infrastructure using machine-readable configuration files (Terraform, CloudFormation) stored in version control","Continuous integration — automatically building and testing code changes on every commit","Containerisation — packaging applications and their dependencies into portable container images"],
 correct:[1],
 exp:"Infrastructure as Code (IaC) treats infrastructure configuration as software — using tools like Terraform, AWS CloudFormation, Azure Bicep, or Ansible to define resources in version-controlled files. Benefits include consistency (no configuration drift), repeatability, auditability (change history in git), and security scanning of infrastructure templates for misconfigurations before deployment.",
 we:"Configuration management (Puppet, Chef) manages the state of existing systems — IaC provisions the infrastructure itself. CI/CD is a software delivery process. Containerisation packages applications. IaC specifically defines infrastructure (VMs, networks, storage) as code.",
 refs:[{text:"Infrastructure as Code – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/infrastructure-as-code-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:68, domain:3,
 q:"An organisation deploying WPA3 Enterprise for their corporate Wi-Fi wants to ensure users cannot decrypt other users' Wi-Fi sessions even if they know the network password. Which WPA3 feature provides this?",
 opts:["TKIP (Temporal Key Integrity Protocol) — dynamic per-session key rotation used in WPA","SAE (Simultaneous Authentication of Equals) — replaces PSK with a password-based key exchange providing forward secrecy per session","PMF (Protected Management Frames) — protects 802.11 management frames from spoofing and deauthentication attacks","802.1X — port-based network access control using EAP and RADIUS for user authentication"],
 correct:[1],
 exp:"WPA3's SAE (Simultaneous Authentication of Equals) — also known as Dragonfly — replaces the WPA2 PSK handshake with a protocol that provides forward secrecy. Each session derives a unique key, so capturing one session's traffic cannot be decrypted even with the passphrase, and past sessions remain protected even if the current key is compromised. SAE also resists offline dictionary attacks against captured handshakes.",
 we:"TKIP was WPA's improvement over WEP's WEP — it is deprecated. PMF protects management frames from deauthentication attacks but doesn't provide per-session key isolation. 802.1X provides authentication via RADIUS but doesn't provide the per-session forward secrecy that SAE does.",
 refs:[{text:"Wireless Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/wireless-security-sy0-701/"},{text:"Wi-Fi Alliance: WPA3 Security",url:"https://www.wi-fi.org/discover-wi-fi/security"}]},

{id:69, domain:3,
 q:"An organisation implements a security architecture where no user or device is trusted by default — even if they are on the corporate LAN. Every access request requires identity verification, device health assessment, and least-privilege authorisation before granting access to any resource. Which architecture is this?",
 opts:["Perimeter-based security — strong border controls protect trusted internal users","Defence in depth — multiple layered security controls provide overlapping protection","Zero trust architecture — eliminates implicit trust based on network location; every access request is verified regardless of origin","Hub-and-spoke network — all traffic flows through a central security inspection point"],
 correct:[2],
 exp:"Zero trust architecture (ZTA) operates on the principle of 'never trust, always verify.' Network location is irrelevant — being on the internal LAN grants no implicit trust. Every access request is evaluated based on identity (who), device health (what), and context (where, when, risk level) before granting minimum necessary access. NIST SP 800-207 defines the ZTA framework. It addresses the reality that perimeters are obsolete in cloud and remote work environments.",
 we:"Perimeter-based security trusts internal users once they're inside the network — the opposite of zero trust. Defence in depth uses multiple controls but may still grant implicit internal trust. Hub-and-spoke describes traffic flow topology, not a trust model.",
 refs:[{text:"Zero Trust – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/zero-trust-sy0-701/"},{text:"NIST SP 800-207: Zero Trust Architecture",url:"https://csrc.nist.gov/publications/detail/sp/800-207/final"}]},

{id:70, domain:3,
 q:"A company wants to consolidate SD-WAN, ZTNA, SWG, CASB, and FWaaS into a single cloud-delivered security platform that enforces policies close to users without backhauling traffic to a central data centre. Which architecture model describes this?",
 opts:["Traditional MPLS WAN with centralised on-premises NGFW","VPN concentrator with split-tunnelling at remote sites","SASE (Secure Access Service Edge) — converging network connectivity and security services into a unified, cloud-native, edge-delivered platform","SD-WAN with on-premises NGFW appliances at each branch"],
 correct:[2],
 exp:"SASE (Secure Access Service Edge) converges WAN networking (SD-WAN) with a full cloud-native security stack (ZTNA, SWG, CASB, FWaaS, DLP) delivered from globally distributed PoPs. Users and branch offices connect to the nearest PoP; security policies are enforced at the edge. This eliminates the latency of backhauling cloud-bound traffic through a central data centre and supports distributed workforces.",
 we:"Traditional MPLS with centralised NGFW is the architecture SASE replaces — backhauling is inefficient for cloud-first organisations. VPN concentrators provide connectivity but not an integrated cloud-native security stack. On-premises NGFWs at each branch = distributed appliances, not a converged cloud service.",
 refs:[{text:"SASE – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-access-service-edge-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:71, domain:3,
 q:"A security engineer implements the 3-2-1 backup rule to protect against ransomware. Which combination correctly represents this rule?",
 opts:["3 backups on the same system, 2 tested annually, 1 encrypted","3 copies of data, stored on 2 different media types, with 1 copy kept offsite or offline/air-gapped","3 daily backups, 2 weekly backups, 1 monthly backup","3 administrators with backup access, 2 required to restore, 1 offsite administrator"],
 correct:[1],
 exp:"The 3-2-1 rule: (3) three copies of data — original plus two backups; (2) stored on two different media types (disk + tape, disk + cloud); (1) one copy kept offsite or offline. The offline/immutable copy is critical for ransomware resilience — malware cannot encrypt a backup it cannot reach. Cloud object storage with immutability (object lock) serves as the offline copy for many organisations.",
 we:"All other options misrepresent the 3-2-1 rule. The numbers refer to copy count (3), media types (2), and offsite/offline copies (1) — not backup schedules, personnel requirements, or frequency.",
 refs:[{text:"Backup and Recovery – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/backup-and-recovery-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:72, domain:3,
 q:"Which protocol provides secure, encrypted file transfer using the SSH protocol as its transport, replacing legacy FTP for sensitive file transfers?",
 opts:["FTPS (FTP Secure) — FTP extended with TLS encryption","SFTP (SSH File Transfer Protocol) — a secure file transfer protocol that uses SSH as its transport layer","SCP (Secure Copy Protocol) — uses SSH for secure file copying between systems","HTTPS — HTTP encrypted with TLS, commonly used for file downloads from web servers"],
 correct:[1],
 exp:"SFTP (SSH File Transfer Protocol) is a completely separate protocol from FTP that uses SSH for all communications — encryption, authentication, and file operations. It operates on port 22 (same as SSH). Unlike FTPS (FTP with TLS), SFTP doesn't need separate data channels, making it firewall-friendly. SFTP supports resumable transfers and remote file management.",
 we:"FTPS wraps FTP in TLS — it is FTP-based and uses separate control (port 21) and data ports, making it harder to firewall. SCP is SSH-based but is a simpler protocol for file copying — it doesn't support the full file management operations SFTP provides. HTTPS is web-based file transfer. SFTP is the SSH-native secure file transfer protocol.",
 refs:[{text:"Secure Protocols – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-protocols-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:73, domain:3,
 q:"An organisation deploying IoT sensors that collect environmental data needs them to communicate securely. The sensors have minimal processing power. Which approach is MOST appropriate for securing their communications?",
 opts:["Deploy full TLS 1.3 with 4096-bit RSA certificates on each sensor","Use ECC-based TLS certificates with short key sizes and a lightweight TLS profile to minimise processing overhead","Connect sensors to an isolated VLAN and let all traffic traverse the network unencrypted","Require VPN connectivity from each sensor to the corporate gateway"],
 correct:[1],
 exp:"IoT devices have constrained resources — limited CPU, memory, and battery. ECC (Elliptic Curve Cryptography) provides equivalent security to RSA with much smaller key sizes and far less computational cost, making it ideal for IoT TLS. TLS 1.3 also reduces handshake round trips. Network isolation (VLAN) is also important but doesn't provide encryption. Resource-appropriate cryptography is a key IoT security design consideration.",
 we:"4096-bit RSA is computationally expensive — inappropriate for constrained IoT devices. Unencrypted traffic on an isolated VLAN provides no data confidentiality or integrity. VPN per sensor adds significant overhead and complexity — not suitable for large IoT deployments.",
 refs:[{text:"Embedded and IoT Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/embedded-systems-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:74, domain:3,
 q:"A company operates a public-facing web application and needs to protect it from DDoS attacks, SQL injection, and XSS while caching content globally. Which cloud security service provides all of these capabilities?",
 opts:["Cloud VPN — provides encrypted connectivity between users and cloud resources","Cloud-based WAF with CDN — combines DDoS mitigation, web application attack filtering, and global content delivery","Cloud IDS — monitors network traffic for attack signatures in cloud environments","Cloud SIEM — aggregates and correlates security events from cloud resources"],
 correct:[1],
 exp:"Cloud-based WAF/CDN services (Cloudflare, AWS CloudFront + WAF, Azure Front Door) combine: global content delivery (CDN) for performance and DDoS absorption; WAF rule sets for OWASP Top 10 filtering (SQL injection, XSS); and DDoS mitigation at the network and application layers. By distributing traffic across global PoPs, volumetric DDoS attacks are absorbed before reaching the origin.",
 we:"Cloud VPN provides connectivity — it doesn't filter application attacks or absorb DDoS. Cloud IDS detects threats but doesn't filter or block them. Cloud SIEM collects and correlates logs — it doesn't protect or cache web application content.",
 refs:[{text:"Cloud Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cloud-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:75, domain:3,
 q:"Network administrators manage switches, routers, and firewalls using a dedicated management network that is completely separated from the production data network. Why is this practice important?",
 opts:["It increases bandwidth for management traffic","Out-of-band management — separating management traffic from production traffic so a compromised production network cannot be used to attack or misconfigure network devices","It allows management traffic to bypass encryption requirements","It is required by all major compliance standards"],
 correct:[1],
 exp:"Out-of-band (OOB) management uses a separate, dedicated network for device management. If the production network is compromised, attackers cannot access network device management interfaces (SSH, HTTPS management GUI, SNMP) via the production network. It also allows management access even when the production network is down. Dedicated management VLANs or separate physical networks provide OOB management.",
 we:"Bandwidth is not the primary security concern. Management traffic should use encryption (SSH, HTTPS) regardless of channel. While separation is a best practice, it isn't universally mandated by every compliance standard. The security benefit is isolation of management traffic from potentially compromised production segments.",
 refs:[{text:"Network Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-devices-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:76, domain:3,
 q:"A security architect designs a system where defence does not rely on any single security control. Perimeter firewalls, network IDS, host-based firewalls, endpoint protection, and application-level controls all exist and overlap. If one layer fails, others remain. Which principle does this implement?",
 opts:["Zero trust — no implicit trust is granted regardless of network location","Least privilege — each component has only the minimum access it needs","Defence in depth — multiple overlapping security layers so no single point of failure exists in the security architecture","Security by obscurity — hiding security mechanisms from attackers"],
 correct:[2],
 exp:"Defence in depth (DiD) layers multiple security controls so that bypassing or failing one does not automatically result in a successful attack. Inspired by military defensive strategy, it assumes any single control can be defeated and adds redundant controls at each layer. The layers typically include: perimeter, network, host, application, and data.",
 we:"Zero trust is about eliminating implicit trust — it is often implemented with defence in depth but is a different principle. Least privilege limits permissions. Security by obscurity relies on secrets for security — it is not considered a valid standalone control. Defence in depth = layered, redundant controls.",
 refs:[{text:"Defence in Depth – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/defence-in-depth-sy0-701/"},{text:"NIST Glossary: Defence in Depth",url:"https://csrc.nist.gov/glossary/term/defense_in_depth"}]},

{id:77, domain:3,
 q:"An organisation's SCADA system controls industrial equipment. The security team wants to isolate it from the corporate IT network to prevent cyber attacks from propagating into operational technology. Which network architecture achieves this while still allowing necessary data transfers?",
 opts:["Connect SCADA directly to the internet so the vendor can provide remote support","Place SCADA on the same network as corporate IT but use host-based firewalls on each SCADA endpoint","Implement a DMZ between the corporate IT network and SCADA, with strict firewall rules and a data diode or historian server as the only data transfer mechanism","Encrypt all SCADA traffic using VPN and allow direct connectivity to the corporate network"],
 correct:[2],
 exp:"For OT/ICS (SCADA) security, a DMZ with strict firewall rules is used to separate industrial control systems from corporate IT. A historian server (SCADA data aggregator) in the DMZ collects operational data from SCADA and makes it available to corporate systems — without direct SCADA-to-IT connectivity. Data diodes (one-way security gateways) ensure data only flows in one direction, preventing any IT-to-SCADA attack path.",
 we:"Direct internet connectivity for SCADA is extremely dangerous — SCADA systems were not designed with internet security in mind and have many known vulnerabilities. Shared network with host-based firewalls provides inadequate isolation for critical OT systems. VPN encryption doesn't prevent lateral movement between networks if the networks are directly connected.",
 refs:[{text:"SCADA and ICS Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/embedded-systems-sy0-701/"},{text:"CISA: ICS Security",url:"https://www.cisa.gov/topics/industrial-control-systems"}]},

{id:78, domain:3,
 q:"A cloud architect ensures that the application is deployed in three separate availability zones within the same region. Each zone is an independent data centre with separate power, cooling, and networking. A failure of one zone does not affect the other two. Which resilience concept does this implement?",
 opts:["Data replication — copying data across multiple storage systems","Geographic redundancy — distributing systems across multiple geographic regions worldwide","Availability zone redundancy — distributing workloads across independent infrastructure within the same region to eliminate single data centre failure as a single point of failure","Backup and recovery — maintaining copies of data for restoration after a failure"],
 correct:[2],
 exp:"Cloud availability zones (AZs) are independent data centres within a single cloud region, each with separate power, cooling, networking, and physical security. Deploying across multiple AZs ensures a single facility failure (power outage, cooling failure, fire) doesn't bring down the application. This is a standard cloud resilience design pattern for high availability.",
 we:"Data replication copies data — AZ redundancy is broader, covering compute and networking too. Geographic redundancy distributes across multiple world regions (AWS regions, Azure regions) — more than AZs but at higher cost. Backup and recovery is reactive — AZ redundancy is proactive and continuous.",
 refs:[{text:"High Availability – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/high-availability-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 3.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:79, domain:4,
 q:"A security analyst discovers unusual login activity at 3 AM from a user account that normally only logs in during business hours from a specific city. The source IP is in another country. What should the analyst do FIRST?",
 opts:["Immediately reset the user's password and lock the account without investigation","Identify and analyse the activity to determine whether it represents a genuine threat before taking action","Notify law enforcement immediately","Reimage the user's workstation to remove any potential malware"],
 correct:[1],
 exp:"The first phase of incident response (NIST model) after detection is analysis/identification — gathering information to determine whether the event is a genuine incident. Premature action (resetting passwords, reimaging) can destroy forensic evidence, disrupt legitimate business activity (the user may be travelling), or alert an attacker. Analyse first: check other activity from that IP, review what was accessed, contact the user.",
 we:"Immediate account lockout without analysis could disrupt a legitimate travelling user and doesn't establish whether harm occurred. Law enforcement notification is reserved for confirmed serious incidents. Reimaging destroys forensic evidence before the incident is confirmed or investigated.",
 refs:[{text:"Incident Response – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"NIST SP 800-61: Computer Security Incident Handling",url:"https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"}]},

{id:80, domain:4,
 q:"A forensic investigator arrives at a running server suspected of compromise. What is the CORRECT order of actions to preserve evidence integrity?",
 opts:["Power off the server immediately, then image the hard drive","Image the hard drive first, then collect RAM","Capture volatile data (RAM, network connections, running processes) first, then image non-volatile storage","Run antivirus software to remove malware, then image the clean drive"],
 correct:[2],
 exp:"The order of volatility dictates collecting the most perishable evidence first: (1) CPU registers/cache → (2) RAM (running processes, network connections, encryption keys, malware in memory) → (3) network state → (4) running processes → (5) temp files/swap → (6) disk. Powering off immediately destroys all volatile evidence. RAM capture first is the critical step on a live system.",
 we:"Powering off destroys all volatile data — RAM, active network connections, and running process memory. Imaging the disk before RAM wastes the most valuable evidence on a live system. Running AV modifies the system, tainting evidence and potentially destroying artefacts.",
 refs:[{text:"Digital Forensics – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-forensics-sy0-701/"},{text:"NIST SP 800-86: Forensics Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-86/final"}]},

{id:81, domain:4,
 q:"A forensic investigator creates a bit-for-bit copy of a seized hard drive, then computes an MD5 and SHA-256 hash of both the original drive and the forensic image. These hashes are documented and verified before analysis. What is the purpose of this process?",
 opts:["To encrypt the forensic image to prevent unauthorised access","To verify that the forensic image is an exact, unmodified copy of the original evidence, supporting admissibility in legal proceedings","To compress the image to save storage space","To scan the image for malware before analysis"],
 correct:[1],
 exp:"Hashing a forensic image (and the original) verifies integrity — identical hashes prove the copy is bit-for-bit identical to the original. This is essential for legal admissibility: the defence cannot claim evidence was modified if the hash matches the original computed at seizure. Hash values are documented as part of chain of custody. Analysis is always conducted on the copy, not the original.",
 we:"Hashing provides integrity verification, not encryption — the image is not encrypted for confidentiality by hashing. Hashing doesn't compress data. AV scanning the image before analysis would modify it — defeating the integrity verification purpose.",
 refs:[{text:"Digital Forensics – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-forensics-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.8",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:82, domain:4,
 q:"A SOC team implements a system that collects logs from firewalls, web servers, Active Directory, and endpoint protection across the enterprise. It correlates events across sources, generates alerts, and provides dashboards for analyst investigation. What technology is this?",
 opts:["IDS/IPS — monitors network traffic for known attack signatures","DLP — prevents sensitive data from leaving the organisation","SIEM (Security Information and Event Management) — aggregates logs from multiple sources, correlates events, and provides centralised alerting and investigation capability","SOAR — automatically executes response playbooks when security events occur"],
 correct:[2],
 exp:"A SIEM collects and normalises log data from heterogeneous sources (firewalls, endpoints, servers, cloud), applies correlation rules to identify attack patterns that span multiple events or systems, generates prioritised alerts, and provides dashboards and search capability for analyst investigation. Examples: Splunk, Microsoft Sentinel, IBM QRadar, Elastic SIEM.",
 we:"IDS/IPS analyses network packets — it doesn't aggregate logs from endpoints and AD. DLP monitors data flows for sensitive data policy violations. SOAR automates response actions based on alerts — it typically consumes SIEM alerts to trigger playbooks. SIEM = collection, correlation, and alerting.",
 refs:[{text:"SIEM – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/siem-sy0-701/"},{text:"NIST Glossary: SIEM",url:"https://csrc.nist.gov/glossary/term/security_information_and_event_management"}]},

{id:83, domain:4,
 q:"A SOC receives a high volume of security alerts from multiple tools. The team wants to automate the initial triage — enriching alerts with threat intel, isolating infected endpoints, creating tickets, and notifying analysts — all within seconds of an alert triggering. Which technology enables this?",
 opts:["SIEM — provides dashboards for manual analyst review and investigation","SOAR (Security Orchestration, Automation and Response) — connects security tools via APIs and executes automated response playbooks","EDR — provides endpoint-level visibility and automated isolation of individual hosts","Threat intelligence platform — aggregates and manages threat intelligence feeds"],
 correct:[1],
 exp:"SOAR orchestrates security tools and automates multi-step response workflows (playbooks). When a SIEM alert fires, a SOAR playbook can: query threat intel feeds, check the endpoint's EDR status, isolate the host, create an ITSM ticket, and notify the analyst — all within seconds, without human intervention. This dramatically reduces mean time to respond (MTTR).",
 we:"SIEM generates alerts but requires human analysts to investigate and respond — it doesn't automate response actions natively. EDR can isolate an individual endpoint but doesn't orchestrate multi-tool workflows. A threat intel platform feeds data into SOAR playbooks but doesn't execute responses.",
 refs:[{text:"SOAR – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-loss-prevention-and-soar-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.7",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:84, domain:4,
 q:"An analyst notices a host making HTTPS connections to an external IP every 300 seconds, 24 hours a day, 7 days a week — even when the user is not at their computer. What is the MOST likely explanation?",
 opts:["A legitimate application is checking for software updates","The host has a network misconfiguration causing ARP broadcasts","The host is infected with malware and beaconing to a command-and-control (C2) server","A scheduled backup is running every 5 minutes"],
 correct:[2],
 exp:"Regular, timed outbound connections to an external IP — especially at uniform intervals and outside business hours — are a hallmark of C2 beaconing. Malware 'phones home' at regular intervals to receive commands, deliver stolen data, or maintain the C2 channel. The regularity (exactly 300 seconds) and around-the-clock nature distinguish it from legitimate scheduled tasks.",
 we:"Software update checks are typically infrequent and don't occur at precise 300-second intervals 24/7. ARP broadcasts are Layer 2 and don't create external HTTPS connections. Legitimate scheduled backups go to known internal or cloud storage addresses, not random external IPs.",
 refs:[{text:"Network Traffic Analysis – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-traffic-analysis-sy0-701/"},{text:"MITRE ATT&CK: C2 Beaconing",url:"https://attack.mitre.org/tactics/TA0011/"}]},

{id:85, domain:4,
 q:"A vulnerability scan of the production web server returns 147 findings. The security engineer needs to prioritise which vulnerabilities to fix first. Which combination of factors should guide prioritisation?",
 opts:["Fix all vulnerabilities alphabetically by CVE identifier","Fix vulnerabilities with the highest CVSS base score first, and deprioritise if the system has mitigating controls or is not internet-exposed","Fix the vulnerabilities that are easiest to remediate first to reduce count quickly","Fix all Critical findings immediately regardless of any other context"],
 correct:[1],
 exp:"Vulnerability prioritisation should consider: CVSS score (severity), whether the vulnerability is being actively exploited (CISA KEV), the exploitability of the specific environment (internet-exposed vs internal), the asset's criticality, and existing compensating controls. A CVSS 9.8 on an internal, air-gapped system may be lower priority than a CVSS 7.0 on an internet-facing, unpatched public system with no WAF.",
 we:"Alphabetical by CVE has no security relevance. Fixing easiest-first optimises for count reduction, not risk reduction. Fixing all Critical immediately regardless of context ignores that environmental factors significantly affect actual risk — a Critical flaw in a non-exploitable configuration may be lower priority than a High flaw being actively exploited in the wild.",
 refs:[{text:"Vulnerability Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-management-sy0-701/"},{text:"CISA: Known Exploited Vulnerabilities",url:"https://www.cisa.gov/known-exploited-vulnerabilities-catalog"}]},

{id:86, domain:4,
 q:"A penetration test is scoped to test the organisation's defences against an external attacker who has no prior knowledge of the internal network. The pen tester is given only the company's public IP range. Which test type is this?",
 opts:["White-box test — full knowledge of internal architecture, source code, and credentials","Gray-box test — partial knowledge such as employee credentials but no architectural documentation","Black-box test — no prior knowledge; tests from the perspective of an external attacker","Red team exercise — multi-phase adversarial simulation using threat intelligence"],
 correct:[2],
 exp:"A black-box penetration test simulates an external attacker with no internal knowledge — only publicly available information. The tester must conduct their own reconnaissance to discover the attack surface. This most accurately simulates a real external attacker but may miss internal vulnerabilities that would be found with white-box access. Only the public IP range is provided as a scoping boundary.",
 we:"White-box provides full internal documentation, network diagrams, and source code. Gray-box provides some internal information (employee credentials, partial network maps). Red team exercises are multi-phase adversarial simulations testing people, processes, and technology. Black-box = zero prior knowledge.",
 refs:[{text:"Penetration Testing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"},{text:"NIST SP 800-115: Testing Methodologies",url:"https://csrc.nist.gov/publications/detail/sp/800-115/final"}]},

{id:87, domain:4,
 q:"A security engineer is hardening a new Ubuntu server that will host a web application. Which action should be performed FIRST as a baseline hardening step?",
 opts:["Configure the web application firewall rules","Install and configure an intrusion detection system","Remove or disable unnecessary services, packages, and default accounts to reduce the attack surface","Apply full-disk encryption using LUKS"],
 correct:[2],
 exp:"The first step in server hardening is reducing the attack surface — removing or disabling all unnecessary services, packages, user accounts, and network ports. Every running service is a potential attack vector. Starting with a minimal install then adding only what's needed implements the principle of least functionality. Other controls (firewall, IDS, encryption) protect the surface that remains.",
 we:"WAF rules, IDS, and disk encryption are important subsequent hardening steps, but they all protect a surface. If that surface has unnecessary running services with known vulnerabilities, those controls may not protect against exploitation. Remove attack surface first, then add protective controls.",
 refs:[{text:"System Hardening – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/hardening-sy0-701/"},{text:"CIS Benchmarks",url:"https://www.cisecurity.org/cis-benchmarks/"}]},

{id:88, domain:4,
 q:"A company's security team uses an agent-based tool installed on all endpoints that continuously monitors process behaviour, file activity, and network connections. When a process starts making suspicious API calls associated with credential dumping, the tool automatically terminates the process and quarantines the endpoint. What technology is this?",
 opts:["Network IDS — monitors network traffic for known attack signatures","Antivirus software — scans files against a database of known malware signatures","EDR (Endpoint Detection and Response) — provides continuous behavioural monitoring of endpoints with automated detection and response capabilities","SOAR — orchestrates multi-tool response workflows triggered by SIEM alerts"],
 correct:[2],
 exp:"EDR (Endpoint Detection and Response) provides: continuous endpoint telemetry recording (process trees, file activity, registry changes, network connections); behavioural detection (anomalies, not just signatures); threat hunting across historical endpoint data; and automated response (process kill, host isolation). XDR extends this visibility to network and cloud layers. EDR sees what happens inside the endpoint — something network tools cannot do.",
 we:"Network IDS monitors network packets — it has no visibility into process activity inside an endpoint. Antivirus uses signature-based file scanning — it misses novel, fileless, or living-off-the-land attacks. SOAR orchestrates multi-tool workflows triggered by alerts — it doesn't provide the endpoint monitoring itself.",
 refs:[{text:"EDR and XDR – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/endpoint-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:89, domain:4,
 q:"A hospital's MDM policy requires that if a device has not checked in with the MDM server for 72 hours, all corporate data containers are automatically wiped from the device. What MDM capability is this?",
 opts:["Remote wipe — an administrator manually sends a wipe command to a device","Remote lock — the device screen is locked remotely requiring a PIN to unlock","Selective wipe / containerisation — only corporate-managed data and apps are removed while personal data is preserved","Geofencing — the device's location is used to enforce access policies"],
 correct:[2],
 exp:"Selective wipe (available in containerised MDM deployments) removes only the managed corporate data container while leaving personal data untouched. This is critical for BYOD environments where wiping personal data would be inappropriate. Containerisation separates corporate apps and data from personal apps — the corporate container is encrypted and can be selectively wiped without affecting the personal side.",
 we:"Remote wipe (full wipe) erases everything, returning the device to factory settings — too destructive for BYOD. Remote lock locks the screen — it doesn't remove data. Geofencing uses location to enforce policies but doesn't perform automatic data removal after a timeout.",
 refs:[{text:"Mobile Device Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/mobile-device-management-sy0-701/"},{text:"NIST SP 800-124: Mobile Device Security",url:"https://csrc.nist.gov/publications/detail/sp/800-124/rev-2/final"}]},

{id:90, domain:4,
 q:"During a security audit, a Windows Active Directory environment is found to have 47 service accounts with the same password set 8 years ago, never rotated. Several have Domain Admin privileges. What is the PRIMARY security risk?",
 opts:["Compliance violation — password policies require rotation every 90 days","Password reuse increases the risk of credential theft, and stale privileged credentials are a prime Kerberoasting and lateral movement target — one compromise could yield Domain Admin access","Domain performance degradation from aged credentials","The accounts will be automatically disabled after 90 days of no rotation"],
 correct:[1],
 exp:"Service accounts with old passwords, shared passwords, and excessive privileges are a critical AD security risk. Kerberoasting targets SPN-registered service accounts — their tickets are encrypted with their NTLM hash, which can be cracked offline. Domain Admin service accounts make this catastrophic. Group Managed Service Accounts (gMSA) automatically rotate passwords every 30 days and eliminate shared passwords.",
 we:"Compliance is a secondary concern compared to the actual security risk. Old passwords don't cause domain performance issues. Accounts with old passwords are NOT automatically disabled in Windows AD — they remain active indefinitely without manual action.",
 refs:[{text:"Identity and Access Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/identity-and-access-management-sy0-701/"},{text:"MITRE ATT&CK: Kerberoasting",url:"https://attack.mitre.org/techniques/T1558/003/"}]},

{id:91, domain:4,
 q:"A DLP system detects that an employee is attempting to email a file containing 500 credit card numbers to a personal Gmail account. The DLP system blocks the email and alerts the security team. Which DLP enforcement mode is operating?",
 opts:["DLP in monitoring mode — alerts are generated but no action is taken","DLP in blocking mode — content policy violations are blocked in real time and an alert is generated","DLP in quarantine mode — the email is held for manual review before delivery decision","DLP in discovery mode — the system scans data stores for policy violations without monitoring real-time transfers"],
 correct:[1],
 exp:"DLP in active blocking mode inspects content in real time (email, web uploads, removable media) and blocks transfers that violate policy — such as files containing credit card numbers (identified by regex patterns, OCR, or fingerprinting). An alert is generated for analyst review. This mode protects against both accidental and intentional data exfiltration.",
 we:"Monitoring mode generates alerts but doesn't block — the email would be delivered. Quarantine mode holds for review — it doesn't block immediately. Discovery mode scans data stores at rest (SharePoint, file servers) for sensitive data — it doesn't monitor real-time transfers.",
 refs:[{text:"Data Loss Prevention – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/data-loss-prevention-sy0-701/"},{text:"NIST Glossary: DLP",url:"https://csrc.nist.gov/glossary/term/data_loss_prevention"}]},

{id:92, domain:4,
 q:"A security team deploys a fake database server on their network that appears to contain valuable financial data. The server has no legitimate business use. Any connection to it triggers an immediate high-fidelity alert. What type of deception technology is this?",
 opts:["Honeytoken — a deceptive data artifact (fake file, fake credential) with no legitimate use","Honeynet — a network of decoy systems designed to attract and study attackers","Honeypot — a single decoy system designed to attract attackers and detect unauthorised access","Tarpit — a system that deliberately slows down automated scanners and worms"],
 correct:[2],
 exp:"A honeypot is a decoy system (server, service, VM) intentionally designed to appear valuable and lure attackers. Since no legitimate user has any reason to access it, any connection is definitionally suspicious — generating high-fidelity, low-false-positive alerts. Honeypots can also gather attacker TTPs and slow attackers down. A honeynet is a network of multiple honeypots.",
 we:"A honeytoken is a deceptive data artifact (file, credential, database record) — not a full server. A honeynet is a network of multiple honeypot systems. A tarpit slows automated scanning. This scenario describes a single fake server = honeypot.",
 refs:[{text:"Honeypots – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/honeypots-and-honeynets-sy0-701/"},{text:"NIST Glossary: Honeypot",url:"https://csrc.nist.gov/glossary/term/honeypot"}]},

{id:93, domain:4,
 q:"A company undergoes a Secure SDLC review. During the design phase, the team creates data flow diagrams and uses the STRIDE model to systematically identify potential threats to the application before any code is written. What activity is this?",
 opts:["Static application security testing (SAST) — automated scanning of source code for vulnerabilities","Dynamic application security testing (DAST) — testing the running application for vulnerabilities","Threat modelling — a structured process for identifying, classifying, and prioritising potential threats to a system during the design phase","Penetration testing — simulating attacks against the completed application"],
 correct:[2],
 exp:"Threat modelling is a proactive activity performed during the design phase to identify potential threats and security requirements before coding begins. STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, Elevation of Privilege) is a systematic threat classification framework. Finding design flaws before implementation is far cheaper than fixing them after deployment. Microsoft's threat modelling tool implements STRIDE.",
 we:"SAST scans source code after it's written — not during design. DAST tests a running application — must be built first. Penetration testing occurs after deployment. Threat modelling is the design-phase security activity.",
 refs:[{text:"Secure SDLC – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/secure-coding-techniques-sy0-701/"},{text:"OWASP: Threat Modelling",url:"https://owasp.org/www-community/Threat_Modeling"}]},

{id:94, domain:4,
 q:"An automated tool analyses the application's source code without executing it, checking for SQL injection patterns, hardcoded credentials, use of deprecated crypto functions, and other security antipatterns. What type of testing is this?",
 opts:["Dynamic application security testing (DAST) — testing the running application with crafted inputs","Fuzzing — sending random malformed inputs to find crashes","Static application security testing (SAST) — analysing source code or compiled binaries without execution to find security flaws","Interactive application security testing (IAST) — using instrumented agents inside the running application"],
 correct:[2],
 exp:"SAST (static analysis) analyses source code, bytecode, or binary without executing the application. It finds: injection flaws, hardcoded secrets, unsafe functions, missing input validation, and other code-level security issues. SAST is 'shift-left' — integrated into the IDE or CI/CD pipeline, it finds issues before the code is merged. Tools include Checkmarx, Semgrep, Bandit (Python), and SonarQube.",
 we:"DAST tests a running application with external inputs (like a web scanner). Fuzzing sends random/malformed inputs to find crashes. IAST instruments the running application from within. SAST = code analysis without execution.",
 refs:[{text:"Application Security Testing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:95, domain:4,
 q:"A network engineer needs to monitor all traffic passing through a core switch for security analysis. Instead of a software SPAN configuration, they insert a passive hardware device between network segments that copies traffic to a monitoring port without impacting the production network. What device is this?",
 opts:["SPAN port — a switch configuration that mirrors traffic to a monitoring port","Network TAP (Test Access Point) — a passive hardware device that copies all traffic flowing through a link to a monitoring port","Inline IPS — a device in the traffic path that can inspect and drop packets","Packet broker — aggregates traffic from multiple TAPs and delivers it to analysis tools"],
 correct:[1],
 exp:"A network TAP (Test Access Point) is a passive hardware device inserted inline between network devices. It splits the optical signal or copies electrical signals, providing a full-duplex copy of all traffic to the monitoring port without introducing latency, blocking traffic, or requiring switch configuration. TAPs are preferred over SPAN ports for forensics because SPAN ports can drop packets under high load and are subject to switch software bugs.",
 we:"SPAN port is a switch software configuration — not a physical hardware device. An inline IPS is in the traffic path and can drop packets — it introduces a point of failure. A packet broker is downstream of TAPs, aggregating and filtering traffic for analysis tools.",
 refs:[{text:"Network Monitoring – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-monitoring-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:96, domain:4,
 q:"A security team monitors their network and identifies a host making DNS queries for domains with seemingly random, high-entropy subdomains (e.g., a8f3bc2.malware.com, d91e7aa.malware.com) at regular intervals. What technique is the malware likely using?",
 opts:["DNS cache poisoning — the malware is corrupting the DNS resolver's cache","Domain fronting — the malware is hiding C2 traffic behind a CDN's domain","DNS tunnelling — encoding data or C2 commands within DNS queries/responses to bypass firewalls that only block TCP/UDP but allow DNS","BGP hijacking — rerouting DNS traffic through attacker-controlled routers"],
 correct:[2],
 exp:"DNS tunnelling encodes data within DNS query/response strings — since most firewalls allow DNS (UDP port 53) outbound, this is an effective covert channel for C2 communication and data exfiltration. High-entropy, randomly-generated subdomains queried frequently are a signature of DNS tunnelling. Detection uses DNS analytics (query frequency, entropy analysis, query length, non-existent domain responses). DNS filtering tools block known DNS tunnelling domains.",
 we:"DNS cache poisoning corrupts resolver caches to redirect lookups. Domain fronting uses CDN infrastructure to hide the real backend. BGP hijacking affects internet routing, not DNS query patterns. Random high-entropy subdomains = DNS tunnelling or DGA (Domain Generation Algorithm) C2.",
 refs:[{text:"DNS Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/dns-attacks-sy0-701/"},{text:"MITRE ATT&CK: DNS Tunnelling",url:"https://attack.mitre.org/techniques/T1071/004/"}]},

{id:97, domain:4,
 q:"A security team wants to proactively search for threats that may have evaded automated detection tools. Analysts develop hypotheses based on threat intelligence — e.g., 'nation-state group X uses PsExec for lateral movement' — and systematically search endpoint and network telemetry for evidence of this TTP. What activity is this?",
 opts:["Vulnerability scanning — automated scanning for unpatched software","Incident response — reacting to a confirmed security breach","Threat hunting — proactively searching for hidden threats using hypotheses, TTPs, and telemetry analysis","Penetration testing — simulating attacks to test detection and response capability"],
 correct:[2],
 exp:"Threat hunting is a proactive, human-led activity that assumes breaches may have already occurred but evaded automated detection. Hunters formulate hypotheses based on threat intelligence (specific threat actor TTPs from MITRE ATT&CK), then search endpoint telemetry (EDR), network flows, and SIEM data for evidence. Successful hunts create new detection rules to improve automated coverage.",
 we:"Vulnerability scanning is automated and finds software weaknesses — not active threats. Incident response is reactive — it starts after a threat is detected. Penetration testing simulates attacks from outside — threat hunting searches for existing hidden threats from within.",
 refs:[{text:"Threat Hunting – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-hunting-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:98, domain:4,
 q:"An organisation's IT team deploys patches to address critical vulnerabilities but must first test patches in a non-production environment, obtain change approval, and schedule a maintenance window. Which process governs this?",
 opts:["Vulnerability management — the process of identifying, scoring, and prioritising vulnerabilities","Patch management — the process of acquiring, testing, and deploying software updates, governed by change management controls","Configuration management — maintaining desired system state using automation tools","Incident response — reacting to security events including exploitation of unpatched systems"],
 correct:[1],
 exp:"Patch management covers the full lifecycle of software updates: acquiring patches from vendors, testing in non-production, documenting with the change management process (RFC, CAB approval, maintenance window, rollback plan), deploying, and verifying. Change management controls govern when and how patches are deployed to production to prevent unintended service disruptions.",
 we:"Vulnerability management identifies and prioritises vulnerabilities — patch management is the remediation action. Configuration management maintains desired system states but isn't specifically about deploying vendor patches. Incident response is reactive.",
 refs:[{text:"Patch Management – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/patch-management-sy0-701/"},{text:"NIST SP 800-40: Patch Management Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-40/rev-4/final"}]},

{id:99, domain:4,
 q:"A company runs container workloads in Kubernetes. The security team scans all Docker images in the CI/CD pipeline for known CVEs before they can be promoted to the production container registry. What security practice does this implement?",
 opts:["Runtime container security — monitoring running containers for suspicious process behaviour","Container image signing — using cryptographic signatures to verify image provenance","Container image scanning in the CI/CD pipeline — analysing image layers for known CVEs before deployment (shift-left security)","Namespace isolation — restricting container access to Kubernetes API resources"],
 correct:[2],
 exp:"Container image scanning checks a Docker image's layers against CVE databases (NVD, vendor advisories) before the image is deployed. Integrating scanning into CI/CD implements shift-left security — vulnerabilities are caught before they reach production. Tools include Trivy, Snyk Container, Clair, and AWS ECR image scanning. A blocking policy fails the pipeline if critical CVEs are found.",
 we:"Runtime security monitors running containers — it doesn't prevent vulnerable images from being deployed. Image signing verifies provenance (that the image hasn't been tampered with) but doesn't scan for CVEs. Namespace isolation restricts Kubernetes API access — it doesn't scan images for vulnerabilities.",
 refs:[{text:"Container Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/container-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 4.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:100, domain:4,
 q:"After a malware incident, the security team discovers that the malware installed a scheduled task to recreate itself if deleted. They remove the malware files but the scheduled task recreates the infection upon the next system reboot. What NIST incident response phase addresses this scheduled task?",
 opts:["Containment — isolating the system to prevent further spread","Identification — confirming that a security incident has occurred","Eradication — removing all malicious artefacts including malware, backdoors, and persistence mechanisms","Recovery — restoring the system to normal operational state"],
 correct:[2],
 exp:"Eradication removes all components of the attack from the environment: malware files, persistence mechanisms (scheduled tasks, registry run keys, startup services, cron jobs), backdoor accounts, and implanted tools. Missing any persistence mechanism results in re-infection, as demonstrated by the scheduled task recreating the malware. Thorough eradication requires identifying all persistence mechanisms before moving to recovery.",
 we:"Containment isolates the system to stop spread. Identification confirms an incident has occurred. Recovery restores normal operations after eradication is complete. Eradication = thorough removal of all attack artefacts.",
 refs:[{text:"Incident Response – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/incident-response-process-sy0-701/"},{text:"NIST SP 800-61: Eradication Phase",url:"https://csrc.nist.gov/publications/detail/sp/800-61/rev-2/final"}]},

{id:101, domain:4,
 q:"An organisation receives threat intelligence indicating a specific APT group is actively targeting their industry using spear-phishing with weaponised Excel macros and lateral movement via PsExec. The SOC uses this to update detection rules. Which standards pair enables structured sharing of this intelligence with partner organisations?",
 opts:["CVE and CVSS — vulnerability naming and scoring standards","Syslog and SNMP — log and network management protocols","STIX and TAXII — STIX structures the threat intelligence; TAXII is the transport protocol for sharing STIX content","OpenIOC and MISP — incident response tools with proprietary IoC formats"],
 correct:[2],
