<script>
// ─────────────────────────────────────────────
//  QUESTION BANK  –  CompTIA Security+ SY0-701
//  Domain 1: General Security Concepts (12%)
//  Domain 2: Threats, Vulnerabilities & Mitigations (22%)
//  Domain 3: Security Architecture (18%)
//  Domain 4: Security Operations (28%)
//  Domain 5: Security Program Management & Oversight (20%)
//  v2 — fully refreshed question pool
// ─────────────────────────────────────────────
const QUESTIONS = [
// ══════════════════════════════════════════
//  DOMAIN 1 — General Security Concepts
// ══════════════════════════════════════════
{id:1, domain:1,
 q:"A firewall blocks unauthorised inbound connections before they reach internal servers. Which security control category does a firewall BEST represent?",
 opts:["Administrative control — a policy or procedure enforced by management","Technical control — a hardware or software mechanism that enforces security automatically","Physical control — a tangible barrier that restricts physical access","Compensating control — an alternative when a primary control cannot be implemented"],
 correct:[1],
 exp:"Technical controls (also called logical controls) are hardware or software mechanisms that enforce security policy automatically without human intervention — firewalls, encryption, access control lists, and antivirus software are all examples. Administrative controls include policies and training. Physical controls include locks and guards.",
 we:"Administrative controls are policies, procedures, and training — they require human action. Physical controls restrict physical access (e.g., badge readers, mantraps). Compensating controls substitute for a primary control that cannot be met — a firewall is a primary control, not a compensating one.",
 refs:[{text:"Security Controls – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.1",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:2, domain:1,
 q:"After a data breach, a company cannot afford to implement the required encryption controls immediately. Instead, they increase manual access logging and review frequency until the encryption project is funded. What type of control is the increased logging?",
 opts:["Preventive control — it stops the breach from recurring","Compensating control — an alternative measure providing equivalent protection when the primary control cannot be met","Detective control — it identifies attacks in progress","Corrective control — it fixes damage caused by the breach"],
 correct:[1],
 exp:"A compensating control is an alternative security measure implemented when the preferred primary control is not feasible due to cost, technology, or operational constraints. It must provide equivalent risk reduction. PCI DSS and other frameworks formally recognise compensating controls with documentation requirements.",
 we:"A preventive control stops incidents — additional logging doesn't prevent a breach. A detective control finds attacks in progress — logging helps with detection, but in this context it's filling in for the absent encryption control. A corrective control restores systems after an incident.",
 refs:[{text:"Security Controls – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/security-controls-sy0-701/"},{text:"PCI DSS: Compensating Controls",url:"https://www.pcisecuritystandards.org/document_library/"}]},

{id:3, domain:1,
 q:"Which property of the CIA triad ensures that only authorised individuals can read sensitive data?",
 opts:["Availability — systems remain accessible to authorised users","Integrity — data has not been modified without authorisation","Confidentiality — data is accessible only to those with authorised access","Non-repudiation — senders cannot deny having sent a message"],
 correct:[2],
 exp:"Confidentiality protects data from unauthorised disclosure. Controls include encryption, access controls, and data classification. A breach of confidentiality occurs when an unauthorised party reads sensitive data — e.g., a data breach exposing customer records.",
 we:"Availability ensures systems are accessible when needed. Integrity ensures data accuracy and completeness. Non-repudiation is not part of the CIA triad — it is a separate property implemented via digital signatures.",
 refs:[{text:"CIA Triad – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/the-cia-triad-sy0-701/"},{text:"NIST Glossary: Confidentiality",url:"https://csrc.nist.gov/glossary/term/confidentiality"}]},

{id:4, domain:1,
 q:"A database administrator modifies financial records and then denies having done so. Which security property, if implemented, would prevent this denial?",
 opts:["Availability — ensuring systems are accessible at all times","Confidentiality — preventing unauthorised users from reading data","Integrity — ensuring data has not been altered","Non-repudiation — cryptographically binding actions to identities so they cannot be denied"],
 correct:[3],
 exp:"Non-repudiation provides proof that a specific party performed an action — implemented via digital signatures and audit logs with cryptographic integrity. Even if the DBA denies the action, digitally signed audit logs prove who made the change and when.",
 we:"Availability is about uptime, not accountability. Confidentiality prevents disclosure but doesn't prove who took an action. Integrity detects that data was changed but doesn't identify who changed it or prevent denial of doing so.",
 refs:[{text:"Cryptographic Concepts – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cryptography-concepts-sy0-701/"},{text:"NIST Glossary: Non-Repudiation",url:"https://csrc.nist.gov/glossary/term/non_repudiation"}]},

{id:5, domain:1,
 q:"Which encryption algorithm uses the SAME key for both encryption and decryption, making key distribution a security challenge?",
 opts:["RSA — uses mathematically linked public and private key pairs","ECC — uses elliptic curve mathematics for key pair generation","AES — uses the same key for encryption and decryption","Diffie-Hellman — establishes a shared secret over an untrusted channel"],
 correct:[2],
 exp:"AES (Advanced Encryption Standard) is a symmetric algorithm — the same key encrypts and decrypts. It is very fast and used for bulk data encryption. The challenge is securely distributing the shared key to all parties. Asymmetric algorithms (RSA, ECC) solve the key distribution problem by using public/private key pairs.",
 we:"RSA and ECC are asymmetric — they use different keys for encryption and decryption. Diffie-Hellman is a key exchange protocol, not an encryption algorithm per se. AES is the classic symmetric cipher used in TLS, disk encryption, and VPNs.",
 refs:[{text:"Symmetric Encryption – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/symmetric-encryption-sy0-701/"},{text:"NIST: AES Standard",url:"https://csrc.nist.gov/publications/detail/fips/197/final"}]},

{id:6, domain:1,
 q:"A security team needs to implement asymmetric encryption on IoT devices with very limited CPU and memory. Which algorithm provides equivalent security to RSA-2048 with significantly smaller key sizes?",
 opts:["3DES — Triple DES with three 56-bit keys applied sequentially","AES-128 — a symmetric cipher with a 128-bit key","ECC (Elliptic Curve Cryptography) — achieves equivalent security with much smaller key sizes","SHA-256 — a cryptographic hash function with a 256-bit output"],
 correct:[2],
 exp:"ECC (Elliptic Curve Cryptography) provides security equivalent to RSA with dramatically smaller key sizes — a 256-bit ECC key is roughly equivalent to a 3072-bit RSA key. This makes ECC ideal for resource-constrained environments like IoT, mobile devices, and smart cards where processing power and battery life are limited.",
 we:"3DES is symmetric and computationally expensive — three DES passes per block. AES-128 is symmetric; key size isn't the issue with asymmetric algorithms. SHA-256 is a hash function, not encryption. ECC is the asymmetric algorithm designed for constrained environments.",
 refs:[{text:"Asymmetric Encryption – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/asymmetric-encryption-sy0-701/"},{text:"NIST: Elliptic Curve Cryptography",url:"https://csrc.nist.gov/projects/elliptic-curve-cryptography"}]},

{id:7, domain:1,
 q:"An administrator checks a downloaded ISO file's SHA-256 hash against the value published on the vendor's website. The hashes match. What has been verified?",
 opts:["Confidentiality — the file was encrypted during download","Authentication — the vendor's identity has been confirmed","Integrity — the file has not been modified or corrupted since the hash was computed","Non-repudiation — the vendor cannot deny having published the file"],
 correct:[2],
 exp:"Comparing a cryptographic hash verifies integrity — confirming the file is bit-for-bit identical to the original. Any modification, even a single bit, produces a completely different hash. This detects both accidental corruption and deliberate tampering. Note: it does NOT verify the vendor's identity — an attacker could replace both the file and the hash on a compromised website.",
 we:"Confidentiality requires encryption — hashing doesn't encrypt anything. Authentication verifies identity — a hash doesn't prove who published the file. Non-repudiation requires digital signatures (asymmetric cryptography), not just hashing.",
 refs:[{text:"Hashing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/hashing-sy0-701/"},{text:"NIST: Hash Functions",url:"https://csrc.nist.gov/projects/hash-functions"}]},

{id:8, domain:1,
 q:"A web server's TLS certificate has been compromised. The CA needs to immediately invalidate the certificate before its expiry date. Which two mechanisms allow clients to check real-time certificate validity? (Choose TWO)",
 opts:["CRL (Certificate Revocation List) — a periodically published list of revoked certificate serial numbers","OCSP (Online Certificate Status Protocol) — a real-time query/response protocol for individual certificate status","CT (Certificate Transparency) — a public log of all issued certificates","HSTS (HTTP Strict Transport Security) — forces HTTPS connections for a domain"],
 correct:[0,1],
 exp:"CRL is a list published by the CA containing serial numbers of revoked certificates — clients download and cache it, so it may be slightly stale. OCSP provides real-time, per-certificate status checks by querying the CA's OCSP responder. Both are mechanisms for certificate revocation checking. OCSP Stapling improves performance by having the server obtain and cache the OCSP response.",
 we:"Certificate Transparency logs all certificate issuances for auditing — it does not provide revocation status. HSTS instructs browsers to always use HTTPS but has nothing to do with certificate revocation.",
 refs:[{text:"Certificate Revocation – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/public-key-infrastructure-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:9, domain:1,
 q:"A single TLS certificate needs to secure both 'www.example.com' and 'mail.example.com' without purchasing two separate certificates. Which certificate type supports multiple distinct hostnames in a single certificate?",
 opts:["Wildcard certificate — secures all subdomains at one level (*.example.com)","SAN (Subject Alternative Name) certificate — includes multiple explicit hostnames in one certificate","DV (Domain Validation) certificate — verifies domain control only","EV (Extended Validation) certificate — requires rigorous organisation identity verification"],
 correct:[1],
 exp:"A SAN certificate (also called a multi-domain or UCC certificate) includes a list of specific hostnames in the Subject Alternative Name field. It can secure completely different domains (example.com, example.net, mail.company.org) in one certificate. A wildcard covers all subdomains at one level (*.example.com) but cannot include a different root domain.",
 we:"A wildcard (*.example.com) covers all first-level subdomains but cannot cover different domains or the root domain itself without a SAN. DV and EV describe the validation level, not the domain coverage capability.",
 refs:[{text:"Digital Certificates – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/digital-certificates-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:10, domain:1,
 q:"Which authentication factor category does a fingerprint scanner represent?",
 opts:["Something you know — a memorised secret like a password or PIN","Something you have — a physical token or device in your possession","Something you are — a physical biometric characteristic unique to the individual","Somewhere you are — your geographic location or network context"],
 correct:[2],
 exp:"Biometric authentication (fingerprint, iris, face, voice, palm vein) falls under 'something you are' — physical or behavioural characteristics unique to the individual. These cannot be forgotten or easily shared, but biometric data, once compromised, cannot be changed like a password.",
 we:"Something you know = passwords, PINs, security questions. Something you have = smart cards, hardware tokens, mobile phones. Somewhere you are = geolocation, IP-based access. Fingerprint = biometric = something you are.",
 refs:[{text:"Multi-Factor Authentication – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/multifactor-authentication-sy0-701/"},{text:"NIST SP 800-63B: Authentication",url:"https://pages.nist.gov/800-63-3/sp800-63b.html"}]},

{id:11, domain:1,
 q:"A user can read their own files, change permissions on those files, and grant others access. The system owner determines access rights rather than the system enforcing labels. Which access control model is this?",
 opts:["MAC (Mandatory Access Control) — the OS enforces access based on sensitivity labels","RBAC (Role-Based Access Control) — permissions are assigned to organisational roles","DAC (Discretionary Access Control) — resource owners control access to their own objects","ABAC (Attribute-Based Access Control) — fine-grained policies use subject/object/environment attributes"],
 correct:[2],
 exp:"Discretionary Access Control (DAC) allows the owner of a resource to grant or restrict access to other users at their discretion. Standard Unix/Linux file permissions (owner/group/other with read/write/execute) are a classic DAC implementation. The risk is that owners may grant excessive permissions.",
 we:"MAC is enforced by the system using sensitivity labels — users cannot change permissions. RBAC assigns permissions to roles, not to individual resource owners. ABAC uses attribute-based policy evaluation independent of ownership.",
 refs:[{text:"Access Control Models – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/access-control-models-sy0-701/"},{text:"NIST Glossary: Discretionary Access Control",url:"https://csrc.nist.gov/glossary/term/discretionary_access_control"}]},

{id:12, domain:1,
 q:"A government system assigns users a 'Secret' clearance and data a 'Top Secret' classification. The system prevents a 'Secret' cleared user from reading 'Top Secret' data even if their manager approves it. Which access control model enforces this?",
 opts:["DAC — the manager's approval overrides the system","RBAC — the user's role determines what they can read","MAC — the system enforces access based on classification labels independent of user or manager preferences","ABAC — environmental attributes such as time of day determine access"],
 correct:[2],
 exp:"Mandatory Access Control (MAC) enforces access based on sensitivity labels (classification) and clearance levels. The system — not the user or manager — makes all access decisions. Even with managerial approval, a Secret-cleared user cannot read Top Secret data. MAC is used in government and military systems (SELinux implements a form of MAC).",
 we:"DAC allows owners/managers to grant access — MAC explicitly overrides this. RBAC uses organisational roles, not government classification labels. ABAC uses attribute-based rules — MAC is the specific model for classification label enforcement.",
 refs:[{text:"Access Control Models – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/access-control-models-sy0-701/"},{text:"NIST Glossary: Mandatory Access Control",url:"https://csrc.nist.gov/glossary/term/mandatory_access_control"}]},

{id:13, domain:1,
 q:"An enterprise SSO system authenticates a user once and issues tokens that allow access to multiple internal and cloud applications without re-entering credentials. Which protocol is specifically designed to add an identity layer on top of OAuth 2.0 for this purpose?",
 opts:["SAML 2.0 — XML-based federation standard for enterprise SSO","OpenID Connect (OIDC) — adds an ID token and identity layer on top of OAuth 2.0 for authentication","Kerberos — issues service tickets within Windows Active Directory domains","LDAP — a directory protocol for querying user account information"],
 correct:[1],
 exp:"OpenID Connect (OIDC) is an identity authentication layer built on OAuth 2.0. It adds an ID token (JWT) that contains user identity claims (name, email, subject ID) alongside the OAuth access token. OIDC is used by consumer identity providers (Google, Apple, Microsoft) for 'Sign in with...' flows and is increasingly common in enterprise SSO alongside SAML.",
 we:"SAML 2.0 uses XML assertions and is the traditional enterprise SSO standard — it is not built on OAuth 2.0. Kerberos operates within Windows domains using tickets, not tokens. LDAP is a directory access protocol, not an SSO/federation protocol.",
 refs:[{text:"Federation – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/federation-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:14, domain:1,
 q:"A stored password database is breached. Attackers find that all users with the same password have different hash values. Which password storage technique caused this?",
 opts:["Key stretching — running the password through hashing thousands of times","Encryption — the passwords were encrypted with AES-256 before storage","Salting — adding a unique random value to each password before hashing so identical passwords produce different hashes","Tokenisation — replacing passwords with random tokens"],
 correct:[2],
 exp:"A salt is a unique random value added to each password before hashing. Even if two users have identical passwords, their salts differ, so their stored hashes differ. This defeats precomputed rainbow table attacks. Salts are stored alongside the hash — they don't need to be secret, they just need to be unique per user.",
 we:"Key stretching (bcrypt, scrypt, PBKDF2) iterates hashing to slow cracking — it works well with salts but doesn't directly explain differing hashes for identical passwords. Encryption is reversible; passwords should be hashed, not encrypted. Tokenisation replaces sensitive values — not used for password storage.",
 refs:[{text:"Password Storage – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"OWASP: Password Storage Cheat Sheet",url:"https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"}]},

{id:15, domain:1,
 q:"A PKI administrator needs to delegate the task of verifying applicant identities before certificate issuance, without delegating the authority to sign certificates. Which PKI component handles identity verification separately from certificate signing?",
 opts:["Root CA — the top-level authority that signs intermediate CA certificates","Intermediate CA — a subordinate CA that signs end-entity certificates","RA (Registration Authority) — verifies the identity of certificate applicants and forwards approved requests to the CA","CRL — a list of revoked certificate serial numbers published by the CA"],
 correct:[2],
 exp:"A Registration Authority (RA) handles identity vetting — verifying that applicants are who they claim to be (checking documents, validating domain control, etc.) — and forwards approved certificate signing requests (CSRs) to the CA. The CA itself only handles cryptographic signing. Separating RA and CA functions distributes trust and operational responsibility.",
 we:"Root CA is the top-level trust anchor — it signs intermediate CA certificates. Intermediate CAs sign end-entity (leaf) certificates. CRL is a revocation mechanism, not an identity verification component.",
 refs:[{text:"PKI – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/public-key-infrastructure-sy0-701/"},{text:"NIST Glossary: Registration Authority",url:"https://csrc.nist.gov/glossary/term/registration_authority"}]},

{id:16, domain:1,
 q:"An organisation uses a dedicated, tamper-evident hardware device to generate and store the private keys for its root Certificate Authority. The private key never leaves the device in plaintext. Which device is being used?",
 opts:["TPM (Trusted Platform Module) — a chip embedded in a motherboard for device-specific key storage","HSM (Hardware Security Module) — a dedicated, tamper-resistant device for cryptographic key generation and storage","Smart card — a portable chip card storing a user's personal credentials","USB security key — a portable FIDO2 device for passwordless authentication"],
 correct:[1],
 exp:"An HSM (Hardware Security Module) is a dedicated, physically tamper-resistant appliance for generating, storing, and using cryptographic keys. Private keys for CAs and other high-value uses are generated and stored inside the HSM — they never exist in plaintext outside. HSMs are validated to FIPS 140-2/3 standards. Enterprise PKI, payment systems, and code signing use HSMs.",
 we:"TPM is a chip embedded in individual computers for device-specific functions like Secure Boot and disk encryption — it is not a standalone network-accessible appliance. Smart cards store user credentials. USB security keys are for end-user authentication (FIDO2), not CA key management.",
 refs:[{text:"Hardware Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/hardware-security-sy0-701/"},{text:"NIST Glossary: Hardware Security Module",url:"https://csrc.nist.gov/glossary/term/hardware_security_module"}]},

{id:17, domain:1,
 q:"A TLS 1.3 session uses ECDHE for key exchange. An attacker records the encrypted session today. Years later, the server's long-term certificate private key is stolen. The attacker cannot decrypt the recorded session. Which property explains this?",
 opts:["Key escrow — session keys were held by a trusted third party that has since deleted them","Certificate pinning — the client rejected any certificate changes","Perfect Forward Secrecy (PFS) — each session uses an ephemeral key pair that is discarded after the session, so past sessions cannot be decrypted even with the long-term key","Quantum-resistant encryption — post-quantum algorithms were used"],
 correct:[2],
 exp:"Perfect Forward Secrecy (PFS) ensures that the compromise of a long-term private key does not expose past session keys. In ECDHE and DHE cipher suites, a fresh ephemeral key pair is generated for each TLS session and discarded immediately after. The session key is never derived from the long-term private key. TLS 1.3 mandates PFS by requiring ECDHE or DHE key exchange.",
 we:"Key escrow stores copies of keys — PFS explicitly avoids this. Certificate pinning rejects unrecognised certificates but doesn't protect past sessions. Post-quantum encryption addresses quantum computing threats, not long-term key compromise.",
 refs:[{text:"Perfect Forward Secrecy – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/perfect-forward-secrecy-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:18, domain:1,
 q:"A developer obfuscates their mobile app's source code, renames variables to meaningless characters, and strips debugging symbols before release. What security goal does this PRIMARILY achieve?",
 opts:["Encryption — the app's data is protected from interception during transmission","Integrity — the app cannot be modified after obfuscation","Obfuscation — making the code difficult to reverse-engineer to slow analysis by attackers or competitors","Authentication — users are verified before the app executes"],
 correct:[2],
 exp:"Obfuscation makes source or compiled code difficult to understand through reverse engineering — renaming symbols, removing debug info, restructuring code flow. It does not prevent a determined attacker from eventually reversing the code, but it raises the cost and time required. It is commonly used to protect proprietary algorithms and slow analysis of mobile malware.",
 we:"Obfuscation doesn't encrypt data in transit — TLS does that. It doesn't guarantee integrity — code signing does that. It's not an authentication mechanism. Obfuscation specifically targets the readability of code against reverse engineering.",
 refs:[{text:"Cryptographic Concepts – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cryptography-concepts-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 1.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},


// ══════════════════════════════════════════
//  DOMAIN 2 — Threats, Vulnerabilities & Mitigations
// ══════════════════════════════════════════
{id:19, domain:2,
 q:"An attacker calls a target's bank, pretends to be a fraud investigator, and convinces the victim to read out their one-time passcode over the phone. What attack technique is this?",
 opts:["Smishing — fraudulent SMS messages tricking victims into revealing credentials","Vishing — voice-based social engineering using phone calls to manipulate victims","Spear phishing — highly targeted email containing personalised details","Pretexting — creating a fabricated identity to manipulate victims in person"],
 correct:[1],
 exp:"Vishing (voice phishing) uses telephone calls to manipulate victims into disclosing credentials, OTPs, or personal information. Attackers impersonate banks, tech support, or government agencies and use urgency and authority to bypass victim scepticism. It is highly effective against MFA — tricking users into reading OTP codes.",
 we:"Smishing uses SMS text messages. Spear phishing uses targeted email. Pretexting involves creating a false identity or scenario — vishing IS often combined with pretexting (the 'fraud investigator' story), but the delivery channel (voice call) makes this specifically vishing.",
 refs:[{text:"Social Engineering – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/social-engineering-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:20, domain:2,
 q:"Users at a company receive text messages appearing to come from IT support, claiming their VPN credentials have expired and providing a link to 'reset' them. Which attack type is this?",
 opts:["Vishing — the attacker called victims directly by phone","Smishing — SMS-based phishing that delivers malicious links or requests via text message","Spear phishing — highly targeted email using the victim's name and job title","Whaling — targeting C-suite executives via email"],
 correct:[1],
 exp:"Smishing (SMS phishing) delivers phishing attacks via text messages rather than email. Mobile users are often less cautious with SMS than email, and short URLs on mobile make it harder to inspect the destination. Attackers spoof sender IDs to appear as legitimate organisations.",
 we:"Vishing uses voice calls. Spear phishing uses targeted email (not SMS). Whaling targets senior executives via email. The SMS delivery channel is the defining characteristic of smishing.",
 refs:[{text:"Phishing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/phishing-sy0-701/"},{text:"CISA: Smishing Guidance",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/phishing"}]},

{id:21, domain:2,
 q:"An attacker follows an authorised employee through a badge-controlled door by walking closely behind them as the door closes. What physical attack technique is this?",
 opts:["Shoulder surfing — observing a target's screen or keyboard to capture credentials","Dumpster diving — retrieving discarded documents or storage media from rubbish bins","Tailgating (piggybacking) — an unauthorised person gaining physical access by following an authorised person through a secured entry","Baiting — leaving infected physical media in a location hoping someone plugs it in"],
 correct:[2],
 exp:"Tailgating (also called piggybacking) exploits social norms — people are reluctant to challenge others or let doors slam on them. Mitigations include security awareness training, mantraps/airlocks (two-door systems requiring separate badge reads), and turnstiles that allow only one person per scan.",
 we:"Shoulder surfing observes screens or keyboards to steal credentials. Dumpster diving searches discarded materials. Baiting uses physical media (USBs) or online lures. Tailgating is specifically the act of following someone through a physical access control.",
 refs:[{text:"Physical Security – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/physical-security-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:22, domain:2,
 q:"An employee seated at a café types their banking password while an attacker at the next table observes their keystrokes. What attack is this?",
 opts:["Tailgating — following someone through a secured physical entry","Shoulder surfing — visually obtaining sensitive information by observing a target's screen or input","Eavesdropping — intercepting network communications between two parties","Keylogging — using malware to record keystrokes on the target's device"],
 correct:[1],
 exp:"Shoulder surfing involves directly observing a target's screen, keyboard, or other input method to capture sensitive information such as passwords, PINs, or credit card numbers. It requires no technical skills — just proximity. Mitigations include privacy screens and awareness of surroundings.",
 we:"Tailgating is physical access through a secured door. Eavesdropping captures network traffic, not visual observation. Keylogging requires installed malware on the victim's device — not passive visual observation.",
 refs:[{text:"Social Engineering – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/social-engineering-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:23, domain:2,
 q:"A threat actor searches a company's recycling bins and finds printed customer account details, an old hard drive, and internal org charts. What attack technique is being used?",
 opts:["OSINT — gathering publicly available information about the target from online sources","Dumpster diving — recovering sensitive information or hardware from discarded materials","Baiting — placing infected media in areas where employees will find it","Physical reconnaissance — mapping the building layout for a planned intrusion"],
 correct:[1],
 exp:"Dumpster diving (also called trashing) retrieves sensitive information from discarded materials — printed documents, old hard drives, backup tapes, USB drives. Proper disposal using cross-cut shredders, degaussing, and certified media destruction prevents this. Many data breaches have started with information found in physical rubbish.",
 we:"OSINT uses publicly available digital sources (web, social media, WHOIS). Baiting places media intentionally for targets to find. Physical reconnaissance maps facilities but doesn't involve searching rubbish. Dumpster diving = searching disposed materials.",
 refs:[{text:"Social Engineering – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/social-engineering-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:24, domain:2,
 q:"Malware infects a system, replicates itself automatically across the network to other hosts without any user interaction, and does not require a host file to attach to. What malware category BEST describes this?",
 opts:["Virus — attaches to legitimate files and spreads when infected files are opened","Worm — self-replicating malware that spreads autonomously across networks without needing a host file","Trojan horse — disguises itself as legitimate software to gain execution","Ransomware — encrypts files and demands payment"],
 correct:[1],
 exp:"A worm is self-contained and self-replicating — it spreads across networks by exploiting vulnerabilities (WannaCry used EternalBlue/MS17-010) without requiring user interaction or a host file. Unlike viruses, worms don't attach to other programs. Their self-propagation makes them capable of massive, rapid spread.",
 we:"Viruses require a host file to attach to and user action to spread. Trojans masquerade as legitimate software and don't self-replicate. Ransomware is a payload type — the malware that spreads autonomously and then deploys ransomware is a worm.",
 refs:[{text:"Malware – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"CISA: Understanding Malware",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/malware"}]},

{id:25, domain:2,
 q:"Malware is installed on a computer that secretly records every keystroke — including passwords, credit card numbers, and messages — and sends them to an attacker. What type of malware is this?",
 opts:["Adware — displays unwanted advertisements and redirects web searches","Spyware / keylogger — covertly monitors user activity and captures keystrokes","Rootkit — modifies the OS to hide the malware's presence from security tools","Logic bomb — executes a malicious payload when a specific condition is met"],
 correct:[1],
 exp:"A keylogger is a type of spyware that records keystrokes. Spyware broadly refers to software that covertly monitors and reports user activity. Keyloggers are used to steal passwords, credit card numbers, and sensitive communications. They can be software-based (malware) or hardware-based (physical devices plugged between keyboard and computer).",
 we:"Adware generates revenue through advertising — it doesn't capture keystrokes. Rootkits hide malware but don't necessarily capture keystrokes themselves. Logic bombs trigger on a condition (date, event) and execute a payload — not covert credential theft.",
 refs:[{text:"Malware – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"CISA: Spyware and Keyloggers",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/malware"}]},

{id:26, domain:2,
 q:"A disgruntled employee inserts code into a payroll system that will delete all salary records if their employee ID is ever removed from the active employee database. What type of malware is this?",
 opts:["Ransomware — encrypts data and demands payment to restore access","Worm — self-replicates autonomously across the network","Logic bomb — dormant malicious code that triggers when a specific condition is met","Rootkit — modifies the OS to hide its presence from administrators"],
 correct:[2],
 exp:"A logic bomb is malicious code that lies dormant until a specific trigger condition is met — a date, a user action, or a system state. The classic insider threat example is an employee creating a logic bomb tied to their employment status. Logic bombs are particularly dangerous because they can persist undetected for extended periods.",
 we:"Ransomware encrypts data immediately on execution — it isn't dormant waiting for a condition. Worms self-replicate across networks. Rootkits hide themselves and other malware. Logic bomb = dormant code with a trigger.",
 refs:[{text:"Malware – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"MITRE ATT&CK: Event Triggered Execution",url:"https://attack.mitre.org/techniques/T1546/"}]},

{id:27, domain:2,
 q:"Security software on a compromised system cannot detect the installed malware because the malware has modified the OS kernel to intercept and filter security tool queries, hiding its files and processes. What type of malware achieves this?",
 opts:["Trojan horse — disguises itself as legitimate software but does not modify the OS","Adware — embeds itself in the browser to display advertisements","Rootkit — modifies the OS at a deep level to conceal the malware's presence from security tools","Ransomware — encrypts files to extort the victim"],
 correct:[2],
 exp:"A rootkit operates at the kernel level to intercept OS calls — hiding its files, processes, registry keys, and network connections from security tools and administrators. Kernel-mode rootkits are particularly difficult to detect because the very tools used to detect malware rely on the OS kernel which the rootkit controls. Detection often requires booting from external media.",
 we:"Trojans pretend to be legitimate software but don't modify the OS kernel. Adware inserts itself into browsers for advertising revenue. Ransomware destroys data availability — it doesn't hide itself at the kernel level (though some modern ransomware families include rootkit components).",
 refs:[{text:"Malware – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"NIST Glossary: Rootkit",url:"https://csrc.nist.gov/glossary/term/rootkit"}]},

{id:28, domain:2,
 q:"An attacker injects malicious SQL into a login form's username field: ' OR '1'='1. The application returns all user records without requiring a valid password. What vulnerability is being exploited?",
 opts:["Cross-site scripting (XSS) — injecting client-side scripts into web pages viewed by other users","SQL injection — inserting malicious SQL metacharacters into an input field that is incorporated unsanitised into a database query","Command injection — executing OS-level commands through an application input field","LDAP injection — manipulating directory service queries through unsanitised input"],
 correct:[1],
 exp:"SQL injection occurs when user input containing SQL metacharacters is incorporated directly into a database query without proper sanitisation or parameterisation. The input ' OR '1'='1 modifies the WHERE clause to always be true, returning all records. Prevention requires parameterised queries (prepared statements) and input validation.",
 we:"XSS injects JavaScript that executes in other users' browsers — it targets the client side. Command injection executes shell commands via OS-level calls. LDAP injection targets directory services. SQL injection specifically targets database query logic.",
 refs:[{text:"Injection Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/injection-attacks-sy0-701/"},{text:"OWASP: SQL Injection",url:"https://owasp.org/www-community/attacks/SQL_Injection"}]},

{id:29, domain:2,
 q:"A malicious link is embedded in a web page. When a logged-in banking user visits the page, their browser silently sends a money transfer request to the bank using the user's existing authenticated session cookie — without the user's knowledge. What attack is this?",
 opts:["Cross-site scripting (XSS) — injecting malicious scripts into the bank's web pages","Cross-Site Request Forgery (CSRF) — tricking an authenticated user's browser into making an unintended request to a trusted site using their existing session","Session hijacking — stealing the session cookie to impersonate the user","Clickjacking — overlaying a transparent frame over a legitimate button to trick the user into clicking it"],
 correct:[1],
 exp:"CSRF exploits the browser's automatic inclusion of cookies with same-site requests. The attacker's malicious page triggers a request to the bank, and the browser includes the victim's session cookie — the bank sees a legitimate authenticated request. CSRF tokens (unique, unpredictable per-session values validated server-side) are the primary defence.",
 we:"XSS injects scripts into the trusted site's own pages. Session hijacking steals the cookie and replays it from the attacker's browser — CSRF doesn't require the attacker to see the cookie. Clickjacking tricks the user into clicking something — CSRF happens automatically without any click.",
 refs:[{text:"OWASP: Cross-Site Request Forgery",url:"https://owasp.org/www-community/attacks/csrf"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:30, domain:2,
 q:"An attacker navigates to a web server URL using the path '/images/../../../etc/passwd'. The server returns the Linux password file. What vulnerability is this?",
 opts:["Command injection — the ../ sequences execute OS commands","SQL injection — the path traversal string manipulates a database query","Directory traversal (path traversal) — using ../ sequences to navigate outside the web root and access files the application should not serve","Buffer overflow — the long URL string overflows a memory buffer"],
 correct:[2],
 exp:"Directory traversal (path traversal) exploits insufficient validation of file paths. The ../ sequence moves up one directory level; chained sequences navigate outside the web root to access arbitrary files on the server's filesystem. Prevention requires canonicalising and validating file paths server-side and restricting file access to the web root via OS permissions and chroot jails.",
 we:"Command injection executes OS commands through shell calls — ../ sequences don't execute commands by themselves. SQL injection targets database queries. Buffer overflow writes beyond a buffer boundary. ../ path manipulation to escape the web root is directory traversal.",
 refs:[{text:"Application Vulnerabilities – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-vulnerabilities-sy0-701/"},{text:"OWASP: Path Traversal",url:"https://owasp.org/www-community/attacks/Path_Traversal"}]},

{id:31, domain:2,
 q:"An attacker exploits a race condition in a banking application: they simultaneously submit two withdrawal requests for $1,000 from an account containing $1,000. Both requests read the balance as $1,000, both approve the withdrawal, and $2,000 is removed. What vulnerability allowed this?",
 opts:["Integer overflow — arithmetic wrapping around its maximum value","Time-of-check to time-of-use (TOCTOU) / race condition — a gap between when a condition is checked and when it is used allows concurrent requests to bypass the check","SQL injection — malicious SQL modifies the balance","Buffer overflow — the withdrawal amount overflows into adjacent memory"],
 correct:[1],
 exp:"A race condition (specifically TOCTOU — Time of Check to Time of Use) occurs when two concurrent operations share a resource without proper synchronisation. Both transactions check the balance (check), find $1,000, then both proceed to withdraw (use) before either updates the balance. Proper mutex locks or database transactions with appropriate isolation levels prevent this.",
 we:"Integer overflow wraps numeric values at their maximum — this is a different arithmetic vulnerability. SQL injection manipulates query strings. Buffer overflow writes past allocated memory. TOCTOU/race condition is about concurrent access to shared state without locking.",
 refs:[{text:"Application Vulnerabilities – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-vulnerabilities-sy0-701/"},{text:"OWASP: Race Condition",url:"https://owasp.org/www-community/vulnerabilities/Race_Condition"}]},

{id:32, domain:2,
 q:"During a penetration test, the tester discovers that the target network's ARP cache has been poisoned — the gateway IP address maps to the tester's MAC address. All hosts on the segment are sending traffic through the tester's machine. What attack was conducted?",
 opts:["DNS poisoning — the DNS resolver cache maps the gateway hostname to the attacker's IP","ARP spoofing/poisoning — sending fake ARP replies to associate the attacker's MAC with a legitimate IP, enabling man-in-the-middle attacks on the local network","BGP hijacking — rerouting internet traffic through the attacker's autonomous system","VLAN hopping — crossing VLAN boundaries to access other network segments"],
 correct:[1],
 exp:"ARP (Address Resolution Protocol) has no authentication — any host can broadcast ARP replies associating any IP with any MAC address. ARP poisoning overwrites victims' ARP caches so traffic destined for the gateway flows to the attacker's machine instead, enabling man-in-the-middle interception. It's a Layer 2 attack limited to the local network segment. Dynamic ARP Inspection (DAI) on managed switches mitigates this.",
 we:"DNS poisoning corrupts DNS resolver caches to redirect domain name lookups. BGP hijacking redirects internet routing between autonomous systems. VLAN hopping attacks VLAN tagging to cross segment boundaries. ARP poisoning operates at Layer 2 on the local segment.",
 refs:[{text:"Network Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-attacks-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:33, domain:2,
 q:"An attacker intercepts a valid authentication token transmitted between a client and a server, saves it, and replays it later to gain unauthorised access — without needing the user's password. What attack is this?",
 opts:["Man-in-the-middle — actively intercepting and modifying live communications","Replay attack — capturing a valid credential or token and retransmitting it later to authenticate as the original user","Pass-the-hash — using a captured NTLM hash directly for NTLM authentication","Session hijacking — stealing an active session cookie to immediately hijack a live session"],
 correct:[1],
 exp:"A replay attack captures a legitimate authentication message (token, hash, or credential) and retransmits it later. The server, seeing a previously valid credential, grants access. Mitigations include timestamps, nonces (numbers used once), and session tokens that expire quickly. TLS and Kerberos both include replay protection mechanisms.",
 we:"MitM actively relays and possibly modifies live traffic. Pass-the-hash specifically uses NTLM hashes for Windows authentication. Session hijacking reuses a stolen cookie to take over an active session immediately — a replay attack may be used hours or days later.",
 refs:[{text:"Network Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/network-attacks-sy0-701/"},{text:"NIST Glossary: Replay Attack",url:"https://csrc.nist.gov/glossary/term/replay_attack"}]},

{id:34, domain:2,
 q:"A vulnerability scanner reports a CVSS 3.1 base score of 7.5 for a flaw in a publicly accessible web application. How should the security team PRIMARILY prioritise this finding?",
 opts:["Low — CVSS 7.5 indicates a minor issue requiring attention only during the next scheduled maintenance","High — CVSS 7.0–8.9 is classified as High severity, requiring prompt remediation, especially given internet exposure","Critical — all web application vulnerabilities are automatically Critical regardless of CVSS score","Medium — the score should be lowered because the system is behind a firewall"],
 correct:[1],
 exp:"CVSS 3.1 severity bands: 0.1–3.9 Low, 4.0–6.9 Medium, 7.0–8.9 High, 9.0–10.0 Critical. A 7.5 score is High. Internet-exposed applications increase effective risk beyond the base score — the CVSS Environmental Score adjusts for exposure. High findings on internet-facing systems should be remediated promptly, typically within 30 days per many security policies.",
 we:"7.5 is not Low (0-3.9) or Medium (4-6.9). It is High — not Critical (which starts at 9.0). Severity classifications come from CVSS scores, not system type alone. Firewalls may lower environmental score but don't change the base score classification.",
 refs:[{text:"Vulnerability Scanning – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-scanning-sy0-701/"},{text:"NIST NVD: CVSS Scores",url:"https://nvd.nist.gov/vuln-metrics/cvss"}]},

{id:35, domain:2,
 q:"An attacker targets an Active Directory environment and discovers service accounts with SPNs registered. They request Kerberos service tickets for these accounts using their domain user privileges, export the tickets from memory, and crack them offline using hashcat. What attack is this?",
 opts:["Pass-the-ticket — forwarding a valid Kerberos ticket to another host to impersonate the user","Kerberoasting — requesting service tickets encrypted with the service account's password hash and cracking them offline","DCSync — replicating Active Directory password hashes by abusing replication permissions","Golden Ticket — forging a Kerberos TGT using the KRBTGT account hash to impersonate any user"],
 correct:[1],
 exp:"Kerberoasting exploits the fact that any domain-authenticated user can request a TGS (service ticket) for any account with a Service Principal Name (SPN). The TGS is encrypted with the service account's NTLM hash. Attackers export these tickets (using Rubeus, Mimikatz) and crack them offline — no elevated privileges needed to request the tickets. Long, random service account passwords and Group Managed Service Accounts (gMSA) mitigate this.",
 we:"Pass-the-ticket forwards an existing ticket to another machine to authenticate — no cracking involved. DCSync abuses AD replication privileges to pull password hashes. Golden Ticket forges a TGT using the KRBTGT hash — requiring prior compromise of that hash. Kerberoasting targets service ticket encryption.",
 refs:[{text:"Kerberos Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"MITRE ATT&CK: Kerberoasting",url:"https://attack.mitre.org/techniques/T1558/003/"}]},

{id:36, domain:2,
 q:"An attacker sends one commonly used password ('Summer2024!') across thousands of user accounts in an organisation, staying below the account lockout threshold. What password attack technique is this?",
 opts:["Brute force attack — trying every possible character combination against a single account","Credential stuffing — testing username/password pairs leaked from a previous data breach","Dictionary attack — trying words from a wordlist against a single account","Password spraying — trying one or a few common passwords across many accounts to avoid lockouts"],
 correct:[3],
 exp:"Password spraying sends a small number of commonly used passwords across a large number of accounts. By staying below the lockout threshold per account, it avoids detection and lockout. It exploits the fact that in any large organisation, some users will have weak passwords. Mitigations include multi-factor authentication and anomaly-based detection of distributed login failures.",
 we:"Brute force exhausts all combinations against one account — triggers lockout quickly. Credential stuffing uses actual leaked username/password pairs. Dictionary attack tries many passwords against one account. Password spraying = few passwords × many accounts.",
 refs:[{text:"Password Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/password-attacks-sy0-701/"},{text:"MITRE ATT&CK: Password Spraying",url:"https://attack.mitre.org/techniques/T1110/003/"}]},

{id:37, domain:2,
 q:"A nation-state group compromises a widely-used IT management software vendor's build pipeline and inserts a backdoor into a legitimate software update signed with the vendor's valid code-signing certificate. 18,000 organisations install the update. What attack category is this?",
 opts:["Zero-day exploit — exploiting an unknown vulnerability in the IT management software","Watering hole attack — compromising a website the target organisations visit","Supply chain attack — compromising software or hardware during development or distribution to attack downstream customers","Insider threat — a malicious employee within the victim organisations"],
 correct:[2],
 exp:"A supply chain attack compromises the software or hardware supply chain rather than attacking target organisations directly. The SolarWinds SUNBURST attack (2020) is the seminal example — nation-state attackers (Cozy Bear/APT29) compromised the Orion build system and distributed a backdoored update to thousands of customers. Defences include code signing verification, software composition analysis, and vendor security assessments.",
 we:"Zero-day exploits an unknown vulnerability in the target software — the SolarWinds attack used a legitimate, signed update. Watering hole compromises websites the targets visit — this attack compromised the vendor's build process. Insider threat involves a malicious employee — supply chain attacks compromise external vendors.",
 refs:[{text:"Supply Chain Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/supply-chain-attacks-sy0-701/"},{text:"CISA: Software Supply Chain Security",url:"https://www.cisa.gov/topics/cyber-threats-and-advisories/advanced-persistent-threats/supply-chain-attacks"}]},

{id:38, domain:2,
 q:"A security researcher discovers a critical vulnerability in a popular VPN client that the vendor is completely unaware of. No patch exists. The researcher notifies the vendor under a 90-day disclosure deadline. What type of vulnerability is this?",
 opts:["Known vulnerability — the vulnerability has a CVE identifier and patch available","Legacy vulnerability — the vulnerable software is past end-of-life","Zero-day vulnerability — unknown to the vendor with no patch available","N-day vulnerability — a vulnerability with a known CVE where a patch exists but has not been applied"],
 correct:[2],
 exp:"A zero-day vulnerability is unknown to the software vendor — no patch exists, no CVE has been assigned, and no official mitigation is available. The term 'zero-day' refers to the vendor having zero days to respond before potential exploitation. Zero-days are highly valuable and are actively traded on dark markets. Coordinated disclosure (notifying vendor before public release) is the ethical approach.",
 we:"Known vulnerabilities have CVEs and available patches. Legacy vulnerabilities affect end-of-life software — they may or may not be zero-days. N-day vulnerabilities have patches available but unpatched systems remain vulnerable — different from zero-day where no patch exists at all.",
 refs:[{text:"Vulnerability Types – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-types-sy0-701/"},{text:"NIST NVD: Vulnerability Glossary",url:"https://nvd.nist.gov/"}]},

{id:39, domain:2,
 q:"An attacker compromises a legal news website visited by employees of a specific law firm they want to target. The website silently loads an exploit kit that infects visiting law firm employees with a RAT. What attack strategy is this?",
 opts:["Spear phishing — a targeted email attack against specific employees","Supply chain attack — compromising the target organisation's own software vendor","Watering hole attack — compromising a third-party site frequented by the intended targets","Evil twin attack — creating a rogue Wi-Fi access point near the law firm"],
 correct:[2],
 exp:"A watering hole attack compromises a website the target group regularly visits — just as a predator waits at a watering hole for prey. Rather than attacking the hardened target directly, the attacker compromises a trusted third-party site used by the targets. This is effective against organisations with strong perimeter defences but whose users visit external sites.",
 we:"Spear phishing sends targeted emails directly to victims. Supply chain attack compromises the target's own software vendor. Evil twin creates a rogue Wi-Fi AP. Watering hole = compromise the website the prey visits.",
 refs:[{text:"Watering Hole Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/watering-hole-attacks-sy0-701/"},{text:"MITRE ATT&CK: Drive-by Compromise",url:"https://attack.mitre.org/techniques/T1189/"}]},

{id:40, domain:2,
 q:"A threat analyst is profiling an attacker group that operates on behalf of a government, has a multi-year operational timeline, uses custom malware, and targets critical infrastructure. Which threat actor category BEST describes this group?",
 opts:["Script kiddie — uses pre-built tools without deep technical knowledge","Hacktivist — motivated by political or social causes, uses hacking as protest","Nation-state / Advanced Persistent Threat (APT) — well-resourced, government-sponsored group with strategic long-term objectives","Insider threat — a malicious employee or contractor with internal access"],
 correct:[2],
 exp:"Nation-state threat actors (APTs) are sophisticated, well-resourced groups operating under government direction with strategic geopolitical objectives. Characteristics: long-term persistence, custom tooling, highly targeted campaigns against critical infrastructure or government systems, and high operational security. Examples: APT29 (Cozy Bear – Russia), APT41 (China), Lazarus Group (North Korea).",
 we:"Script kiddies use existing tools without deep expertise — they lack the sophistication of APTs. Hacktivists are ideologically motivated (Anonymous) — not government-sponsored. Insider threats have internal access — APTs gain access externally and maintain persistent footholds.",
 refs:[{text:"Threat Actors – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-actors-sy0-701/"},{text:"MITRE ATT&CK: Groups",url:"https://attack.mitre.org/groups/"}]},

{id:41, domain:2,
 q:"An attacker sets up a Wi-Fi hotspot at an airport named 'Airport_Free_WiFi'. When travellers connect, the attacker can intercept their unencrypted traffic and perform man-in-the-middle attacks. What is this attack called?",
 opts:["Deauthentication attack — forcing clients off a legitimate AP using 802.11 management frames","Evil twin attack — creating a rogue access point with the same or convincing SSID to lure victims","Bluejacking — sending unsolicited messages to nearby Bluetooth devices","War driving — scanning for wireless networks from a moving vehicle"],
 correct:[1],
 exp:"An evil twin attack creates a rogue access point using an SSID designed to look legitimate (matching or similar to a real AP). Victims connect believing it's the real network, and the attacker intercepts all their traffic. Combined with a deauthentication attack to kick users off the real AP, it forces reconnection to the evil twin. VPNs and HTTPS mitigate the risk.",
 we:"Deauthentication attacks disconnect clients from legitimate APs — they may be used alongside evil twin to force reconnection, but are distinct. Bluejacking sends Bluetooth messages and doesn't capture Wi-Fi traffic. War driving scans for wireless networks — it doesn't impersonate them.",
 refs:[{text:"Wireless Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/wireless-attacks-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:42, domain:2,
 q:"An attacker sends a valid authentication request to a financial application and captures the encrypted token returned by the server. They then resend the same token from a different session 48 hours later and successfully authenticate. Which control would MOST directly prevent this?",
 opts:["Increasing password complexity requirements for user accounts","Implementing short token expiry times and server-side session invalidation after use","Adding rate limiting to the authentication endpoint","Requiring HTTPS for all connections to the application"],
 correct:[1],
 exp:"Short-lived tokens with server-side expiry and single-use validation prevent replay attacks. A token that expires in minutes or that is invalidated server-side immediately after use cannot be successfully replayed 48 hours later. JWTs should include expiry claims (exp) validated server-side. Nonces (one-time random values) in authentication protocols also prevent replay.",
 we:"Password complexity doesn't prevent token replay — the attacker doesn't need the password. Rate limiting slows brute force, not replay of a single valid token. HTTPS prevents interception but doesn't prevent replaying a token that was already captured — short token lifetime is the direct control.",
 refs:[{text:"Application Vulnerabilities – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/application-vulnerabilities-sy0-701/"},{text:"OWASP: Authentication Cheat Sheet",url:"https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html"}]},

{id:43, domain:2,
 q:"A web page contains an invisible iframe overlaid on a 'Play Video' button. When users click Play Video, they are actually clicking the 'Transfer Funds' button in the iframe beneath. What attack is this?",
 opts:["Cross-site request forgery (CSRF) — the victim's browser makes unintended requests to a trusted site","Clickjacking (UI redressing) — overlaying an invisible or transparent malicious frame over legitimate UI to trick users into clicking unintended elements","Stored XSS — malicious scripts embedded in the page's database execute when users visit","Open redirect — the page redirects users to a malicious site after clicking a link"],
 correct:[1],
 exp:"Clickjacking (UI redressing) uses transparent iframes or overlays to trick users into clicking elements they cannot see. The user thinks they're interacting with the visible page but their click is captured by the hidden element beneath. The X-Frame-Options HTTP header and Content-Security-Policy frame-ancestors directive prevent pages from being embedded in iframes.",
 we:"CSRF makes the browser automatically send requests — no click needed. Stored XSS injects JavaScript that executes for all visitors. Open redirect sends users to unintended URLs after a link click. Clickjacking specifically uses overlaid UI elements to hijack clicks.",
 refs:[{text:"OWASP: Clickjacking",url:"https://owasp.org/www-community/attacks/Clickjacking"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:44, domain:2,
 q:"A threat actor registers the domain 'paypa1.com' (replacing the letter 'l' with the digit '1') and builds a convincing PayPal login clone. Victims who mistype the URL or click a phishing link are redirected there. What technique is this?",
 opts:["DNS cache poisoning — corrupting a resolver's cache to redirect the legitimate paypal.com domain","Subdomain hijacking — taking over a dangling DNS record under the legitimate paypal.com domain","Typosquatting — registering a domain with a misspelling or visual lookalike to capture mistyped traffic or deceive phishing victims","Pharming — redirecting victims from a legitimate domain to a malicious server via hosts file or DNS manipulation"],
 correct:[2],
 exp:"Typosquatting (URL hijacking) registers domains that are visually similar to legitimate ones — using character substitution (l→1, o→0), transposition (payapl.com), addition (paypall.com), or different TLDs. Combined with phishing, it is extremely effective because victims checking the URL may not notice a single character difference.",
 we:"DNS cache poisoning redirects the real domain to a different IP — the real domain name is unchanged. Subdomain hijacking takes over a legitimate organisation's own subdomain. Pharming redirects the legitimate domain via hosts file or DNS manipulation — not a lookalike domain. Typosquatting = registering a lookalike domain.",
 refs:[{text:"Phishing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/phishing-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:45, domain:2,
 q:"An employee at a manufacturing company uses a personal cloud storage service to sync work files because the approved file-sharing solution is too slow. The IT department has no visibility into the data being stored externally. This situation BEST represents:",
 opts:["An insider threat — the employee is intentionally exfiltrating sensitive data to an external system","Shadow IT — the unauthorised use of technology outside IT's visibility and control, typically motivated by convenience rather than malicious intent","A supply chain attack — the cloud storage provider could compromise company data","Data leakage — classified data is being transmitted over unencrypted channels"],
 correct:[1],
 exp:"Shadow IT refers to hardware, software, SaaS applications, or cloud services used within an organisation without IT approval or management. Unlike insider threats, shadow IT is typically convenience-motivated, not malicious. However, it creates security risks: data stored outside monitored systems may violate compliance requirements, lack encryption, or enable data loss. CASBs (Cloud Access Security Brokers) help discover and control shadow IT.",
 we:"An insider threat implies deliberate intent to harm the organisation — shadow IT is convenience-driven. A supply chain attack requires the vendor to actively compromise the customer. Data leakage could result from shadow IT but is the consequence, not the behaviour itself.",
 refs:[{text:"Shadow IT – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/threat-intelligence-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.2",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:46, domain:2,
 q:"A penetration tester uses Nmap to identify open ports and service versions on target systems. Then uses Metasploit to exploit a vulnerable service and gain a shell. Which two phases of the penetration test do these activities represent?",
 opts:["Planning and reporting","Reconnaissance/scanning and exploitation","Exploitation and post-exploitation","Weaponisation and delivery"],
 correct:[1],
 exp:"Port scanning and service enumeration (Nmap) are part of the reconnaissance and scanning phase — discovering what attack surface exists. Exploiting a discovered vulnerability (Metasploit) is the exploitation phase. The pen test lifecycle: Planning → Reconnaissance → Scanning → Exploitation → Post-Exploitation → Reporting.",
 we:"Planning defines scope and rules of engagement. Reporting documents findings. Post-exploitation covers lateral movement and persistence after initial access. Weaponisation and delivery are Cyber Kill Chain phases, not standard pen test phases.",
 refs:[{text:"Penetration Testing – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/penetration-testing-sy0-701/"},{text:"NIST SP 800-115: Security Testing Guide",url:"https://csrc.nist.gov/publications/detail/sp/800-115/final"}]},

{id:47, domain:2,
 q:"An ICS (Industrial Control System) at a water treatment plant has a software vulnerability that allows remote code execution. The system vendor released a patch 6 months ago, but the plant has not applied it. Which vulnerability category BEST describes the unpatched ICS?",
 opts:["Zero-day — the vendor is unaware of the vulnerability","N-day / known vulnerability — a CVE exists and a patch is available but has not been applied","End-of-life vulnerability — the system is past vendor support","Embedded system vulnerability — the system uses proprietary firmware"],
 correct:[1],
 exp:"An N-day vulnerability (or 'known vulnerability') has a public CVE identifier and an available patch, but the affected system has not been patched. The 'N' represents the number of days since the vendor's patch was released. N-day vulnerabilities are the most common source of breaches — the challenge is patch deployment, not availability. CISA's Known Exploited Vulnerabilities (KEV) catalogue tracks N-day vulnerabilities being actively exploited.",
 we:"Zero-day means the vendor is unaware — a patch was released 6 months ago, so it is known. End-of-life means no more patches from the vendor. The vulnerability category is specifically about patch status, not the device type.",
 refs:[{text:"Vulnerability Types – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/vulnerability-types-sy0-701/"},{text:"CISA: Known Exploited Vulnerabilities",url:"https://www.cisa.gov/known-exploited-vulnerabilities-catalog"}]},

{id:48, domain:2,
 q:"After initial compromise, an attacker uses a stolen low-privilege account to enumerate network shares, find a misconfigured administrative share with weak credentials, and move to an internal server with access to the finance database. What technique describes this progression?",
 opts:["Privilege escalation — gaining higher permissions on the same compromised system","Lateral movement — using a compromised account to access other systems within the network to expand reach","Exfiltration — copying the finance data out of the network to attacker infrastructure","Persistence — maintaining long-term access to the compromised environment"],
 correct:[1],
 exp:"Lateral movement describes techniques used after initial compromise to progressively move through a network — pivoting from one compromised system to another to access additional resources, credentials, or sensitive data. Common techniques include PsExec, WMI execution, SMB shares, and pass-the-hash. MITRE ATT&CK catalogues lateral movement as Tactic TA0008.",
 we:"Privilege escalation gains higher permissions on the same system (e.g., local user → SYSTEM). Exfiltration copies data outside the network. Persistence maintains access through reboots. Lateral movement = using one compromised system to reach other systems.",
 refs:[{text:"MITRE ATT&CK: Lateral Movement",url:"https://attack.mitre.org/tactics/TA0008/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.4",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:49, domain:2,
 q:"An attacker sends a user an email with an attachment named 'Invoice_Q4.pdf.exe'. The file icon is set to a PDF icon. When the user double-clicks it thinking it is a PDF, malware executes. Which malware delivery technique exploits file extension hiding?",
 opts:["Macro malware — malicious code embedded in an Office document macro","Masquerading / double extension — disguising an executable as a harmless file type using a fake icon and file extension","Drive-by download — malware downloaded automatically when a malicious webpage is visited","Fileless malware — malware that executes entirely in memory without writing to disk"],
 correct:[1],
 exp:"Masquerading uses double extensions (file.pdf.exe) combined with Windows hiding known file extensions and a spoofed icon to trick users into believing an executable is a harmless file. Windows by default hides known extensions, so 'Invoice_Q4.pdf.exe' appears as 'Invoice_Q4.pdf'. Enabling file extension display in Windows Explorer and user awareness training mitigate this.",
 we:"Macro malware uses Office macro code embedded in .docx/.xlsm files — not a standalone executable. Drive-by downloads require visiting a malicious webpage. Fileless malware lives in memory without a file on disk — this attack does write an executable file.",
 refs:[{text:"Malware – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/malware-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.5",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:50, domain:2,
 q:"A cryptographic attack exploits the mathematical probability that in a hash function with an n-bit output, two different inputs will produce the same hash output after approximately 2^(n/2) hashing operations. Which attack does this describe?",
 opts:["Rainbow table attack — using precomputed hash-to-input lookup tables","Brute force attack — systematically trying all possible inputs","Birthday attack — exploiting the birthday problem probability to find hash collisions faster than brute force","Downgrade attack — forcing the use of a weaker cryptographic algorithm"],
 correct:[2],
 exp:"The birthday attack leverages the birthday paradox: in a group of 23 people, there's a 50% chance two share a birthday. Similarly, with a hash function producing n-bit outputs, collisions can be found with high probability after ~2^(n/2) operations — much less than the full 2^n space. This is why MD5 (128-bit) and SHA-1 (160-bit) are deprecated — their collision resistance is inadequate. SHA-256 and SHA-3 resist birthday attacks practically.",
 we:"Rainbow tables precompute hash-to-input mappings — they find preimages (input for a given hash), not collisions. Brute force requires 2^n operations for collision — birthday attack needs only 2^(n/2). Downgrade attacks weaken protocol negotiation.",
 refs:[{text:"Cryptographic Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cryptographic-attacks-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},

{id:51, domain:2,
 q:"A security researcher discovers that a TLS connection can be forced to negotiate SSL 3.0 by sending a specific error during handshake. SSL 3.0 uses an older padding scheme that allows the attacker to decrypt traffic. Which type of attack does this describe?",
 opts:["Replay attack — retransmitting a captured valid message","Birthday attack — exploiting hash collision probability","Downgrade attack — forcing the use of a weaker, vulnerable cryptographic protocol version","On-path (MitM) attack — intercepting all traffic between client and server"],
 correct:[2],
 exp:"A downgrade attack (exemplified by POODLE against SSL 3.0 and FREAK/DROWN) manipulates the protocol negotiation handshake to force the use of an older, weaker version. SSL 3.0, RC4, export-grade cipher suites, and weak Diffie-Hellman parameters are common downgrade targets. Mitigations include disabling legacy protocol versions (SSL 2/3, TLS 1.0/1.1) and using TLS_FALLBACK_SCSV.",
 we:"Replay attacks retransmit captured messages. Birthday attacks target hash collision probability. On-path/MitM attacks position the attacker between client and server — a downgrade attack may use MitM positioning but is specifically about forcing a weaker protocol version.",
 refs:[{text:"Cryptographic Attacks – Professor Messer SY0-701",url:"https://www.professormesser.com/security-plus/sy0-701/sy0-701-video/cryptographic-attacks-sy0-701/"},{text:"CompTIA Security+ SY0-701 Objectives – Domain 2.3",url:"https://www.comptia.org/training/resources/exam-objectives"}]},
