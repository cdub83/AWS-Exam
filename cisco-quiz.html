{id:51, cert:3, q:"A company wants to protect the integrity of transmitted data to prevent unauthorized modification. Which security property addresses this requirement?",
 opts:["Confidentiality","Integrity","Availability","Non-repudiation"],
 correct:[1],
 exp:"Integrity ensures data has not been modified in transit or storage. Mechanisms include cryptographic hashes (SHA-256), digital signatures, and HMAC. If an attacker modifies a packet, the hash or signature will fail verification.",
 we:"Confidentiality prevents unauthorized disclosure (encryption). Availability ensures authorized access (redundancy, anti-DDoS). Non-repudiation proves a message originated from a specific sender and cannot be denied."},

{id:52, cert:3, q:"Which cryptographic algorithm is symmetric and commonly used for bulk data encryption in VPNs?",
 opts:["RSA","AES","SHA-256","ECDSA"],
 correct:[1],
 exp:"AES (Advanced Encryption Standard) is a symmetric cipher — the same key encrypts and decrypts data. It is extremely fast in hardware and is the standard for bulk encryption in IPsec VPNs, SSL/TLS, and disk encryption. Key sizes: 128, 192, or 256 bits.",
 we:"RSA is asymmetric — used for key exchange and digital signatures, not bulk encryption. SHA-256 is a hash function, not an encryption algorithm. ECDSA is an asymmetric signature algorithm."},

{id:53, cert:3, q:"A phishing email targets a specific VP of Finance with personalized details about their recent business travel. What type of attack is this?",
 opts:["Phishing","Spear Phishing","Whaling","Vishing"],
 correct:[1],
 exp:"Spear Phishing is a targeted phishing attack against a specific individual or organization, using personalized information to increase credibility. Whaling specifically targets high-profile executives (C-suite). Vishing uses voice calls. Generic phishing targets many recipients with the same message.",
 we:"Generic phishing sends mass emails without personalization. Whaling targets executives specifically (the VP of Finance could qualify, but 'personalized details about travel' more precisely describes spear phishing). Vishing uses telephone calls, not email."},

{id:54, cert:3, q:"What is the ASA security level for the 'outside' interface by default?",
 opts:["100","50","10","0"],
 correct:[3],
 exp:"Cisco ASA security levels: Outside = 0 (least trusted), Inside = 100 (most trusted). DMZ interfaces are typically assigned values between 1–99. Traffic flows freely from higher to lower security levels. Traffic from lower to higher security levels requires explicit ACL permit.",
 we:"100 is the inside interface security level. 50 is a typical DMZ value. 10 would be a low-trust DMZ or second outside — not the default for a standard outside interface."},

{id:55, cert:3, q:"What is the key architectural difference between Cisco ASA and Cisco Firepower Threat Defense (FTD)?",
 opts:["ASA uses stateful inspection; FTD is stateless for higher performance","FTD combines ASA firewall functionality with Firepower IPS/NGFW in a single software image","ASA supports more VPN protocols than FTD","FTD is for cloud-only deployments; ASA is for on-premises"],
 correct:[1],
 exp:"FTD is a unified software combining ASA's stateful firewall engine with Firepower's NGIPS, application visibility/control (AVC), URL filtering, and malware protection (AMP). It runs on ASA hardware, Firepower appliances, and ISA series. Managed by FMC (multi-device) or FDM (single-device on-box).",
 we:"Both ASA and FTD use stateful inspection. FTD supports the same VPN protocols as ASA (AnyConnect, site-to-site IPsec). FTD runs on physical and virtual hardware, not just cloud."},

{id:56, cert:3, q:"What is the fundamental difference between IDS and IPS in terms of traffic handling?",
 opts:["IDS uses signatures; IPS uses behavioral analysis","IDS is deployed inline and can block traffic; IPS is passive and only alerts","IDS is passive (out-of-band copy of traffic, alerts only); IPS is inline and can actively block malicious traffic","IPS requires a dedicated appliance; IDS can run as software only"],
 correct:[2],
 exp:"IDS (Intrusion Detection System) receives a copy of traffic (span/tap) — it cannot block traffic, only generate alerts. IPS (Intrusion Prevention System) sits inline in the traffic path and can drop malicious packets before they reach the destination. IPS introduces latency; IDS does not affect traffic.",
 we:"Both IDS and IPS can use signatures and/or behavioral analysis. IPS is inline (not IDS). Both can run as software or hardware appliances."},

{id:57, cert:3, q:"Cisco AnyConnect VPN uses DTLS for active tunnel transport. What is the advantage of DTLS over TLS for VPN tunnels?",
 opts:["DTLS provides stronger encryption than TLS","DTLS uses UDP, reducing TCP head-of-line blocking and improving performance for real-time traffic like voice and video","DTLS supports more authentication methods than TLS","DTLS is faster because it skips encryption overhead"],
 correct:[1],
 exp:"DTLS (Datagram TLS) uses UDP instead of TCP. TCP-over-TCP (as in TLS VPN tunnels) causes head-of-line blocking — a lost packet stalls the entire stream. DTLS over UDP avoids this, dramatically improving performance for latency-sensitive traffic (voice, video) through the VPN tunnel. AnyConnect uses DTLS by default when available, falling back to TLS.",
 we:"DTLS and TLS provide comparable encryption strength. DTLS doesn't add authentication methods. DTLS still performs full TLS encryption — the improvement is transport layer efficiency, not skipping encryption."},

{id:58, cert:3, q:"In the cloud shared responsibility model, which responsibility is ALWAYS owned by the customer regardless of the service model (IaaS/PaaS/SaaS)?",
 opts:["Operating system patching","Physical data center security","Customer data and identity/access management","Hypervisor maintenance"],
 correct:[2],
 exp:"Customer data and identity/access management (IAM) are ALWAYS the customer's responsibility across all cloud service models (IaaS, PaaS, SaaS). The cloud provider is responsible for physical security and hypervisor maintenance. OS patching responsibility shifts from customer (IaaS) to provider (SaaS).",
 we:"OS patching is customer responsibility in IaaS but provider responsibility in SaaS/PaaS. Physical security is always the provider's responsibility. Hypervisor maintenance is always the provider's responsibility."},

{id:59, cert:3, q:"Cisco Umbrella blocks threats at which layer, and what is its primary mechanism?",
 opts:["Layer 7 HTTP inspection — inspects all web content after TCP connection","Layer 3 IP blocking — maintains blacklists of malicious IP addresses","DNS layer — blocks resolution of malicious domains before TCP connections are established","Layer 4 TCP blocking — terminates suspicious connections by TCP RST"],
 correct:[2],
 exp:"Cisco Umbrella is a cloud-based DNS security service. It intercepts DNS queries and blocks resolution for malicious, phishing, or policy-violating domains BEFORE any TCP connection is established. Because the threat is stopped at DNS, no malware download can begin. It also provides a Secure Web Gateway for deeper inspection.",
 we:"Umbrella's primary mechanism is DNS-layer blocking — the connection never starts. It does not primarily work via HTTP content inspection, IP blacklists alone, or TCP reset injection."},

{id:60, cert:3, q:"Which email authentication mechanism allows a domain owner to specify which mail servers are authorized to send email on behalf of the domain?",
 opts:["DKIM","DMARC","SPF","S/MIME"],
 correct:[2],
 exp:"SPF (Sender Policy Framework) is a DNS TXT record listing authorized mail servers (by IP or hostname) for a domain. Receiving mail servers check the SPF record to verify the sending server is authorized. DKIM adds a cryptographic signature. DMARC defines policy for SPF/DKIM failures.",
 we:"DKIM (DomainKeys Identified Mail) adds a cryptographic signature to emails — it doesn't specify authorized servers. DMARC uses SPF and DKIM to define handling policy (quarantine/reject). S/MIME encrypts email content — not an anti-spoofing mechanism."},

{id:61, cert:3, q:"What does Cisco AMP (Secure Endpoint) 'retrospective detection' provide?",
 opts:["It quarantines files before they are opened based on predicted behavior","When a file previously judged clean is later identified as malicious, AMP alerts and provides trajectory data for all endpoints that saw it","It blocks all unknown files from executing until a verdict is obtained","It scans email attachments before delivery to the endpoint"],
 correct:[1],
 exp:"AMP continuously tracks file activity even after initial verdicts. If threat intelligence is updated to classify a previously 'clean' file as malicious (e.g., a zero-day is identified after deployment), AMP retroactively alerts on all endpoints that executed or downloaded that file and provides device trajectory data for forensics.",
 we:"Behavioral pre-execution quarantine is a separate sandbox feature. Blocking all unknown files is an optional 'prevalence' policy, not retrospective detection. Email scanning is done by ESA (Email Security Appliance), not endpoint AMP."},

{id:62, cert:3, q:"An 802.1X deployment uses EAP-TLS for authentication. What does EAP-TLS require that makes it the most secure EAP method?",
 opts:["A username and password with RADIUS server lookup","Digital certificates on BOTH the client (supplicant) and the authentication server — mutual certificate authentication","A one-time password token with RADIUS","Only the server certificate — client uses a password"],
 correct:[1],
 exp:"EAP-TLS requires both the server (RADIUS/ISE) AND the client (supplicant/endpoint) to present valid X.509 digital certificates. This provides mutual authentication — the client verifies the server is legitimate and the server verifies the client is a trusted device. It is the most secure EAP method but requires a PKI to issue client certs.",
 we:"Username/password is used by PEAP and EAP-MSCHAPv2 — not EAP-TLS. One-time tokens are used by EAP-OTP. Server-only certificate is PEAP — the client authenticates with a password under the TLS tunnel."},

{id:63, cert:3, q:"Which Cisco technology assigns a Security Group Tag (SGT) to a user or device at authentication and uses it for policy enforcement regardless of IP address?",
 opts:["802.1X with dACL","Cisco ISE with TrustSec","Cisco Umbrella with roaming clients","MACsec with MKA"],
 correct:[1],
 exp:"Cisco TrustSec uses Cisco ISE to assign SGTs (16-bit tags) to users/devices upon authentication. SGTs are propagated inline or via SXP protocol across the network. Policy enforcement (SGACL) at egress devices uses SGTs instead of IP addresses, providing identity-based segmentation that survives IP changes.",
 we:"802.1X with dACL assigns IP-based ACLs per session — not SGT-based. Umbrella provides DNS/web security, not network segmentation tags. MACsec provides Layer 2 encryption using MKA, not identity-based policy tags."},

{id:64, cert:3, q:"MACsec (IEEE 802.1AE) operates at which OSI layer and what does it protect?",
 opts:["Layer 3 — encrypts IP packets between routers","Layer 2 — encrypts all Ethernet frames between directly connected devices on each hop","Layer 4 — encrypts TCP sessions end-to-end","Layer 7 — encrypts application data in transit"],
 correct:[1],
 exp:"MACsec is a hop-by-hop Layer 2 encryption standard (IEEE 802.1AE). It encrypts all Ethernet frames between two directly connected devices (switch-to-switch or switch-to-endpoint). Each link is encrypted independently. MKA (MACsec Key Agreement) negotiates keys. It provides confidentiality, integrity, and replay protection at L2.",
 we:"IPsec operates at Layer 3. TLS/SSL operates at Layer 4-7. Application encryption is Layer 7. MACsec is specifically Layer 2 and hop-by-hop — each link is a separate encryption domain."},

{id:65, cert:3, q:"A Cisco ISE deployment performs posture assessment. An endpoint fails because its antivirus is out of date. What typically happens to this endpoint?",
 opts:["The endpoint is immediately blocked with no network access","The endpoint is placed in a remediation VLAN or receives a restricted dACL with limited access until remediation","The endpoint receives full access — posture checks are advisory only","The endpoint is quarantined permanently until manually released by an administrator"],
 correct:[1],
 exp:"ISE posture assessment places non-compliant endpoints in a remediation state — typically a VLAN with access only to patching servers, AV updates, etc. Once the endpoint remediates (updates AV), ISE re-assesses and grants appropriate access. This enforces compliance without permanently blocking devices.",
 we:"Immediate full block would impact productivity — remediation VLAN allows self-service fix. Posture checks are enforced, not advisory. Permanent quarantine requires manual intervention — automated remediation workflow is the standard ISE approach."},

{id:66, cert:3, q:"Which attack technique is DMARC (Domain-based Message Authentication, Reporting & Conformance) specifically designed to combat?",
 opts:["Email header injection and XSS in email clients","Domain spoofing in the 'From' header of emails — making phishing emails appear to come from legitimate domains","Malware delivery via email attachments","Man-in-the-middle interception of SMTP traffic"],
 correct:[1],
 exp:"DMARC builds on SPF and DKIM to specify a domain's policy for emails that fail authentication checks. It tells receiving servers to quarantine or reject emails that spoof the domain in the visible 'From' header. It also provides reporting to domain owners about abuse attempts.",
 we:"Email header injection and XSS are web/application security issues, not DMARC's scope. Malware in attachments is detected by AV/sandboxing (ESA/AMP). SMTP encryption is handled by STARTTLS/TLS — not DMARC."},

{id:67, cert:3, q:"A Cisco WSA (Web Security Appliance) is deployed in 'transparent' mode. How does client traffic reach the WSA?",
 opts:["Clients are manually configured with the WSA IP address as a proxy","Traffic is redirected to the WSA via WCCP or policy-based routing — clients are unaware of the proxy","Clients use PAC (Proxy Auto-Config) files to discover and use the WSA","The WSA intercepts traffic using ARP spoofing at Layer 2"],
 correct:[1],
 exp:"In transparent mode, client traffic is redirected to the WSA without any client configuration using WCCP (Web Cache Communication Protocol) or PBR (policy-based routing) on a router/switch. Clients believe they are communicating directly with web servers. This enables proxy inspection without browser/OS configuration on every endpoint.",
 we:"Manual proxy configuration is 'explicit' (not transparent) mode. PAC files are also an explicit proxy mechanism. ARP spoofing is a malicious technique — not a WSA deployment method."},

{id:68, cert:3, q:"A company needs to detect and block command-and-control (C2) traffic to known malicious domains at the network DNS layer for all corporate devices. Which Cisco solution provides this?",
 opts:["Cisco Firepower IPS with Snort DNS rules","Cisco Umbrella with DNS-layer security","Cisco ESA with URL filtering","Cisco ISE with TrustSec SGT policies"],
 correct:[1],
 exp:"Cisco Umbrella intercepts all DNS queries and blocks resolution for known malicious domains (C2 servers, malware distribution, phishing) using continuously updated threat intelligence. The roaming client ensures protection extends to devices off the corporate network. DNS-layer blocking prevents the connection before it starts.",
 we:"Firepower IPS can detect C2 at the network layer but requires the connection to be established. ESA filters email URLs, not network DNS queries. ISE/TrustSec handles network access control, not DNS-layer threat filtering."},

{id:69, cert:3, q:"Which attack exploits improperly sanitized SQL queries in web application input fields to gain unauthorized access to backend databases?",
 opts:["Cross-Site Scripting (XSS)","SQL Injection","Buffer Overflow","CSRF (Cross-Site Request Forgery)"],
 correct:[1],
 exp:"SQL Injection inserts malicious SQL code into input fields (login forms, search boxes) that are passed directly to the database. If not sanitized, the database executes the injected SQL, potentially exposing all data, allowing authentication bypass, or enabling data deletion. Parameterized queries and input validation are the defenses.",
 we:"XSS injects scripts into web pages viewed by other users. Buffer overflow overwrites memory boundaries to execute arbitrary code. CSRF tricks authenticated users into making unintended requests."},

{id:70, cert:3, q:"What is the CVSS v3 score range that indicates a CRITICAL severity vulnerability?",
 opts:["7.0 – 8.9","8.0 – 9.9","9.0 – 10.0","6.0 – 7.9"],
 correct:[2],
 exp:"CVSS (Common Vulnerability Scoring System) v3 severity ranges: None=0.0, Low=0.1-3.9, Medium=4.0-6.9, High=7.0-8.9, Critical=9.0-10.0. Critical vulnerabilities typically involve remote code execution without authentication, worm-like propagation, or complete system compromise.",
 we:"7.0-8.9 is High severity. 8.0-9.9 crosses into Critical at 9.0. 6.0-7.9 spans Medium and High."},

{id:71, cert:3, q:"An engineer configures Cisco ISE to return a downloadable ACL (dACL) after 802.1X authentication. What is the purpose of a dACL?",
 opts:["To encrypt traffic between the switch and ISE during authentication","To assign a VLAN to the authenticated port","To dynamically apply a per-user ACL on the switch port without pre-configuring it on every switch","To enable MAB (MAC Authentication Bypass) as a fallback method"],
 correct:[2],
 exp:"A downloadable ACL (dACL) is defined in ISE and pushed to the authenticating switch (via RADIUS ACCEPT) after successful 802.1X authentication. The switch applies it on the access port for that specific session. This allows granular per-user traffic policies without pre-configuring hundreds of ACLs on every switch.",
 we:"Traffic encryption is handled by MACsec/TLS. VLAN assignment is a different RADIUS attribute (Tunnel-Private-Group-ID). dACL is a dynamic per-user ACL, not a fallback method — MAB is configured separately as a fallback on the switch."},

{id:72, cert:3, q:"What is the security advantage of deploying Cisco Firepower in 'inline' mode vs 'passive' mode?",
 opts:["Inline mode provides full packet inspection; passive mode only inspects headers","Inline mode can actively drop malicious traffic in real-time; passive mode generates alerts only","Inline mode has lower latency than passive mode","Passive mode provides better performance for encrypted traffic inspection"],
 correct:[1],
 exp:"In inline mode, Firepower sits directly in the traffic path and can drop packets matching IPS signatures in real time before they reach the destination. In passive (tap/SPAN) mode, Firepower receives a copy of traffic — it can only generate alerts and cannot block. Inline provides active prevention; passive provides detection only.",
 we:"Both modes inspect full packets. Passive mode cannot drop traffic — not block. Inline mode adds latency (due to processing delay); passive mode has no impact on traffic latency. Both modes can inspect encrypted traffic with SSL decryption configured."},

{id:73, cert:3, q:"Which protocol does Cisco ISE use to communicate with network access devices (switches, WLCs) for AAA?",
 opts:["TACACS+ only","RADIUS only","Both RADIUS and TACACS+, but RADIUS is standard for 802.1X NAC","LDAP"],
 correct:[2],
 exp:"Cisco ISE supports both RADIUS and TACACS+. RADIUS is the standard protocol for network access control (802.1X, MAB, VPN) — it uses UDP and combines authentication + authorization. TACACS+ is used for device administration (CLI access control, command authorization). ISE can serve both roles.",
 we:"ISE supports both protocols. RADIUS is the standard for 802.1X/NAC. LDAP is used by ISE as an identity source (LDAP directory lookup) but is not used to communicate with network devices for AAA."},

{id:74, cert:3, q:"A CVSS score of 9.8 is assigned to a vulnerability with the following: network-adjacent attack vector, no authentication required, high confidentiality/integrity/availability impact. A patch is not yet available. Which mitigation is MOST appropriate for immediate risk reduction?",
 opts:["Accept the risk — wait for the vendor patch","Deploy a WAF rule to block the vulnerability's attack pattern","Segment the affected systems with firewall rules or ACLs to limit network-adjacent access","Enable verbose logging on affected systems"],
 correct:[2],
 exp:"For a critical vulnerability with no available patch, the immediate mitigation is to reduce the attack surface. Since the attack vector is network-adjacent, adding network segmentation (firewall rules, ACLs, VLAN isolation) limits which systems can reach the vulnerable service. This is a classic 'compensating control' when a patch isn't available.",
 we:"Accepting a 9.8 CVSS risk without mitigation is not acceptable security practice. WAF rules are effective for web application vulnerabilities but may not cover all attack surfaces for a general network vulnerability. Logging alone is detective — it does not prevent exploitation."},

{id:75, cert:3, q:"In a Cisco ISE 802.1X deployment, what is MAB (MAC Authentication Bypass) used for?",
 opts:["To provide a secondary authentication factor after 802.1X succeeds","To authenticate devices that do not support 802.1X supplicant software (printers, cameras, IoT devices)","To bypass ISE authentication for trusted corporate assets","To allow guest users to authenticate with a web portal instead of certificates"],
 correct:[1],
 exp:"MAB allows devices without an 802.1X supplicant (IP phones, printers, cameras, IoT sensors) to authenticate using their MAC address. The switch sends the MAC address as the username/password to ISE via RADIUS. ISE looks up the MAC in its endpoint database and grants appropriate access. MAB is less secure than 802.1X (MAC addresses can be spoofed).",
 we:"MAB is a fallback when 802.1X fails or times out — not a second factor. MAB is for non-supplicant devices, not a bypass for trusted assets (those would use EAP-TLS). Guest web portal authentication is CWA (Central Web Authentication), not MAB."}

]; // end QUESTIONS

// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const CERT_NAMES = {
  1: "CCNA 200-301",
  2: "ENARSI 300-410",
  3: "SCOR 350-701"
};
const CERT_CLASS  = { 1:"c1", 2:"c2", 3:"c3" };
const CERT_COLORS = { 1:"#3b82f6", 2:"#22c55e", 3:"#ef4444" };
const PASS_SCORE  = 82;  // ~825/1000 Cisco passing score
const EXAM_MINS   = 90;
const EXAM_Q      = 55;  // draw randomly per attempt

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let state = {
  screen: "start",
  mode: "timed",
  certFilter: "all",
  questions: [],
  current: 0,
  answers: {},
  submitted: {},
  startTime: null,
  remaining: EXAM_MINS * 60,
  timerID: null,
  reviewIdx: null
};

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fmtTime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
}

function calcScore() {
  const byCert = { 1:{t:0,c:0}, 2:{t:0,c:0}, 3:{t:0,c:0} };
  let total = 0, correct = 0;
  state.questions.forEach((q, i) => {
    total++;
    byCert[q.cert].t++;
    const ans = state.answers[i] || new Set();
    const cs  = new Set(q.correct);
    const ok  = ans.size === cs.size && [...ans].every(v => cs.has(v));
    if (ok) { correct++; byCert[q.cert].c++; }
  });
  return { total, correct, byCert };
}

// ─────────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────────
function startTimer() {
  if (state.mode !== "timed") return;
  clearInterval(state.timerID);
  state.timerID = setInterval(() => {
    state.remaining--;
    updateTimerDisplay();
    if (state.remaining <= 0) { clearInterval(state.timerID); endExam(); }
  }, 1000);
}
function updateTimerDisplay() {
  const el = document.getElementById("timer");
  if (!el) return;
  el.textContent = fmtTime(state.remaining);
  el.className = "";
  if (state.remaining <= 300) el.classList.add("danger");
  else if (state.remaining <= 600) el.classList.add("warning");
}
function stopTimer() { clearInterval(state.timerID); }

// ─────────────────────────────────────────────
//  ACTIONS
// ─────────────────────────────────────────────
function startExam(mode) {
  const pool = state.certFilter === "all"
    ? [...QUESTIONS]
    : QUESTIONS.filter(q => q.cert === state.certFilter);
  state.mode       = mode;
  state.screen     = "exam";
  state.current    = 0;
  state.answers    = {};
  state.submitted  = {};
  state.questions  = shuffle(pool).slice(0, Math.min(EXAM_Q, pool.length));
  state.startTime  = Date.now();
  state.remaining  = EXAM_MINS * 60;
  render();
  if (mode === "timed") startTimer();
}

function selectOption(qIdx, optIdx) {
  if (state.submitted[qIdx]) return;
  const q = state.questions[qIdx];
  const ans = state.answers[qIdx] = state.answers[qIdx] || new Set();
  if (q.multi) { if (ans.has(optIdx)) ans.delete(optIdx); else ans.add(optIdx); }
  else { ans.clear(); ans.add(optIdx); }
  renderQuestion();
}

function submitAnswer() {
  const i = state.current;
  if (state.submitted[i] || !state.answers[i] || state.answers[i].size === 0) return;
  state.submitted[i] = true;
  renderQuestion();
}

function navigate(dir) {
  state.current = Math.max(0, Math.min(state.questions.length - 1, state.current + dir));
  renderQuestion();
  window.scrollTo(0, 0);
}

function endExam() { stopTimer(); state.screen = "results"; render(); }
function showReview() { state.screen = "review"; state.reviewIdx = null; render(); }
function showReviewQuestion(i) { state.reviewIdx = i; state.screen = "reviewq"; render(); }

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if      (state.screen === "start")   app.innerHTML = renderStart();
  else if (state.screen === "exam")    app.innerHTML = renderExamShell();
  else if (state.screen === "results") app.innerHTML = renderResults();
  else if (state.screen === "review")  app.innerHTML = renderReviewList();
  else if (state.screen === "reviewq") app.innerHTML = renderReviewQuestion();
  attachListeners();
}

function renderStart() {
  const certCounts = { all: QUESTIONS.length };
  [1,2,3].forEach(c => certCounts[c] = QUESTIONS.filter(q => q.cert === c).length);
  const certLabels = { all:"All Exams", 1:"CCNA 200-301", 2:"ENARSI 300-410", 3:"SCOR 350-701" };
  const certBtns = ["all",1,2,3].map(c => {
    const cls = state.certFilter == c ? "active" : "";
    const clsName = c === "all" ? "all" : ["","ccna","enarsi","scor"][c];
    return `<button class="cert-btn ${clsName} ${cls}" onclick="setCertFilter('${c}')">${certLabels[c]} (${certCounts[c]})</button>`;
  }).join("");

  return `
<div class="screen">
  <div class="cisco-logo">🔵</div>
  <h1>Cisco Practice Exam</h1>
  <p>CCNA 200-301 &nbsp;·&nbsp; CCNP ENARSI 300-410 &nbsp;·&nbsp; CCNP SCOR 350-701</p>

  <div class="info-grid">
    <div class="info-box"><div class="val">${Math.min(EXAM_Q, QUESTIONS.filter(q => state.certFilter === "all" || q.cert == state.certFilter).length)}</div><div class="lbl">Per Attempt</div></div>
    <div class="info-box"><div class="val">${QUESTIONS.filter(q => state.certFilter === "all" || q.cert == state.certFilter).length}</div><div class="lbl">Pool Size</div></div>
    <div class="info-box"><div class="val">${EXAM_MINS}m</div><div class="lbl">Time Limit</div></div>
    <div class="info-box"><div class="val">${PASS_SCORE}%</div><div class="lbl">Pass Score</div></div>
  </div>

  <p style="font-weight:600;margin-bottom:8px;">Filter by certification:</p>
  <div class="cert-filter">${certBtns}</div>

  <p style="font-weight:600;margin:16px 0 8px;">Select a mode:</p>
  <div class="mode-grid">
    <div class="mode-card ${selectedMode==='timed'?'active':''}" id="mode-timed" onclick="setMode('timed')">
      <h3>⏱ Timed Exam</h3>
      <p>Simulates the real exam with a ${EXAM_MINS}-minute countdown. Explanations revealed after submission or exam end.</p>
    </div>
    <div class="mode-card ${selectedMode==='practice'?'active':''}" id="mode-practice" onclick="setMode('practice')">
      <h3>📚 Practice Mode</h3>
      <p>No time limit. Explanations shown immediately after each answer.</p>
    </div>
  </div>

  <button class="btn btn-primary" style="margin-top:8px;" onclick="startExam(selectedMode)">Start Exam</button>
  <p style="margin-top:20px;font-size:13px;opacity:0.7;"><a href="cisco-study.html" style="color:var(--accent);text-decoration:none;font-weight:600;">← Back to Cisco Study Guide</a> &nbsp;·&nbsp; <a href="index.html" style="color:var(--muted);text-decoration:none;">AWS Practice Exam →</a></p>
</div>`;
}

let selectedMode = "timed";
function setMode(m) {
  selectedMode = m;
  document.querySelectorAll(".mode-card").forEach(c => c.classList.remove("active"));
  document.getElementById("mode-" + m).classList.add("active");
}

function setCertFilter(v) {
  state.certFilter = v == "all" ? "all" : parseInt(v);
  render();
}

function renderExamShell() {
  const pct = ((state.current + 1) / state.questions.length * 100).toFixed(1);
  const answered = Object.keys(state.submitted).length;
  return `
<div class="exam-header">
  <span class="exam-title">Cisco Practice Exam</span>
  <div class="exam-meta">
    <div class="stat"><div class="stat-val">${state.current+1}/${state.questions.length}</div><div class="stat-lbl">Question</div></div>
    <div class="stat"><div class="stat-val">${answered}</div><div class="stat-lbl">Answered</div></div>
    ${state.mode === "timed" ? `<div class="stat"><div id="timer" class="stat-val">${fmtTime(state.remaining)}</div><div class="stat-lbl">Remaining</div></div>` : ""}
    <button class="btn btn-danger" onclick="if(confirm('End exam and see results?')) endExam()">End Exam</button>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div id="question-area">${renderQuestionHTML(state.current)}</div>`;
}

function renderQuestion() {
  const el = document.getElementById("question-area");
  if (el) el.innerHTML = renderQuestionHTML(state.current);
  if (state.mode === "timed") updateTimerDisplay();
  attachListeners();
}

function buildExplanationBlock(q, ans) {
  const cs = new Set(q.correct);
  const ok = ans.size === cs.size && [...ans].every(v => cs.has(v));
  const isPractice = state.mode === "practice";
  const correctLetters = q.correct.map(oi => String.fromCharCode(65+oi)).join(", ");
  const wrongChosen = [...ans].filter(oi => !cs.has(oi));

  let html = `<div class="exp-block">`;

  if (isPractice && !ok && ans.size > 0) {
    if (wrongChosen.length) {
      html += `<div class="exp-section exp-wrong"><div class="exp-header">✗ Your incorrect selection${wrongChosen.length>1?"s":""}</div><div class="exp-wrong-opts">`;
      wrongChosen.forEach(oi => { html += `<div class="exp-wrong-opt"><span class="exp-wrong-letter">${String.fromCharCode(65+oi)}.</span><span>${q.opts[oi]}</span></div>`; });
      html += `</div></div>`;
    }
    if (q.we) html += `<div class="exp-section exp-wrong"><div class="exp-header">Why these are wrong</div>${q.we}</div>`;
    html += `<div class="exp-section exp-correct"><div class="exp-header">✓ Correct answer${q.correct.length>1?"s":""}: ${correctLetters}</div>${q.exp}</div>`;
  } else if (isPractice && ok) {
    html += `<div class="exp-section exp-correct"><div class="exp-header">✓ Correct!</div>${q.exp}</div>`;
  } else {
    html += `<div class="exp-section exp-neutral"><div class="exp-header">Explanation &nbsp;·&nbsp; Correct: ${correctLetters}</div>${q.exp}</div>`;
    if (q.we && ans.size > 0 && !ok) html += `<div class="exp-section exp-wrong"><div class="exp-header">Why the distractors fail</div>${q.we}</div>`;
  }
  html += `</div>`;
  return html;
}

function renderQuestionHTML(i) {
  const q   = state.questions[i];
  const ans = state.answers[i] || new Set();
  const sub = state.submitted[i];
  const cs  = new Set(q.correct);

  const opts = q.opts.map((opt, oi) => {
    let cls = "option";
    if (sub) { cls += " disabled"; if (cs.has(oi)) cls += " correct"; else if (ans.has(oi)) cls += " incorrect"; }
    else if (ans.has(oi)) cls += " selected";
    return `<div class="${cls}" data-qi="${i}" data-oi="${oi}"><div class="option-letter">${String.fromCharCode(65+oi)}</div><div class="option-text">${opt}</div></div>`;
  }).join("");

  const multiHint = q.multi ? `<div class="multi-hint">★ Select ${q.correct.length} answers</div>` : "";
  const expBlock  = sub ? buildExplanationBlock(q, ans) : "";
  const canSubmit = ans.size > 0 && !sub;
  const isLast    = i === state.questions.length - 1;

  return `
<div class="question-card">
  <div class="question-num">Question ${i+1} of ${state.questions.length}</div>
  <span class="cert-badge ${CERT_CLASS[q.cert]}">${CERT_NAMES[q.cert]}</span>
  <div class="question-text">${q.q}</div>
  ${multiHint}
  <div class="options">${opts}</div>
  ${expBlock}
</div>
<div class="nav-row">
  <button class="btn btn-secondary" onclick="navigate(-1)" ${i===0?"disabled":""}>← Previous</button>
  <div style="display:flex;gap:10px;">
    ${!sub ? `<button class="btn btn-primary" onclick="submitAnswer()" ${!canSubmit?"disabled":""}>Check Answer</button>` : ""}
    ${sub && isLast ? `<button class="btn btn-primary" onclick="endExam()">View Results</button>` : ""}
    ${i < state.questions.length-1 ? `<button class="btn btn-secondary" onclick="navigate(1)">Next →</button>` : ""}
  </div>
</div>`;
}

function renderResults() {
  const { total, correct, byCert } = calcScore();
  const pct  = Math.round(correct / total * 100);
  const pass = pct >= PASS_SCORE;
  const circ = 2 * Math.PI * 60;
  const dash = circ * (1 - pct / 100);
  const color = pass ? "#2ecc71" : "#e74c3c";

  const certBars = [1,2,3].map(c => {
    const {t, cv: cvv} = { t: byCert[c].t, cv: byCert[c].c };
    const ct = byCert[c].t;
    if (ct === 0) return "";
    const cc = byCert[c].c;
    const dp = Math.round(cc/ct*100);
    const dc = dp >= PASS_SCORE ? "#2ecc71" : "#e74c3c";
    return `<div class="domain-row">
      <div class="domain-label"><span>${CERT_NAMES[c]}</span><span>${cc}/${ct} (${dp}%)</span></div>
      <div class="domain-bar"><div class="domain-fill" style="width:${dp}%;background:${dc}"></div></div>
    </div>`;
  }).join("");

  return `
<div class="screen">
  <h1>Exam Complete</h1>
  <p>${pass ? "Congratulations! You passed." : "Keep practicing — you'll get there."}</p>
  <div class="score-ring">
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle class="ring-bg" cx="80" cy="80" r="60"/>
      <circle class="ring-val" cx="80" cy="80" r="60" stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${dash}"/>
    </svg>
    <div class="ring-center">
      <div class="ring-pct" style="color:${color}">${pct}%</div>
      <div class="ring-pass" style="color:${color}">${pass?"PASS":"FAIL"}</div>
    </div>
  </div>
  <div class="info-grid">
    <div class="info-box"><div class="val" style="color:var(--green)">${correct}</div><div class="lbl">Correct</div></div>
    <div class="info-box"><div class="val" style="color:var(--red)">${total-correct}</div><div class="lbl">Incorrect</div></div>
    <div class="info-box"><div class="val">${total}</div><div class="lbl">Total</div></div>
    <div class="info-box"><div class="val" style="color:${color}">${pct}%</div><div class="lbl">Score</div></div>
  </div>
  <div class="domain-scores">${certBars}</div>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
    <button class="btn btn-secondary" onclick="showReview()">Review Answers</button>
    <button class="btn btn-primary" onclick="state.screen='start';render()">New Exam</button>
  </div>
</div>`;
}

function renderReviewList() {
  const { byCert } = calcScore();
  const items = state.questions.map((q, i) => {
    const ans = state.answers[i] || new Set();
    const sub = state.submitted[i];
    const cs  = new Set(q.correct);
    const ok  = sub && ans.size === cs.size && [...ans].every(v => cs.has(v));
    const cls = !sub ? "r-skipped" : ok ? "r-correct" : "r-incorrect";
    const mark = !sub ? "—" : ok ? "✓" : "✗";
    return `<div class="review-item"><div class="review-q" onclick="showReviewQuestion(${i})">
      <div class="review-icon ${cls}">${mark}</div>
      <div><span style="color:var(--muted);font-size:11px;">${CERT_NAMES[q.cert]}</span><br>${q.q}</div>
    </div></div>`;
  }).join("");

  return `
<div class="screen" style="text-align:left;max-height:none;">
  <h1 style="text-align:center;margin-bottom:8px;">Answer Review</h1>
  <p style="text-align:center;">Click a question to see the explanation.</p>
  <div style="margin-top:16px;">${items}</div>
  <div style="text-align:center;margin-top:20px;">
    <button class="btn btn-primary" onclick="state.screen='results';render()">← Back to Results</button>
  </div>
</div>`;
}

function renderReviewQuestion() {
  const i   = state.reviewIdx;
  const q   = state.questions[i];
  const ans = state.answers[i] || new Set();
  const cs  = new Set(q.correct);

  const opts = q.opts.map((opt, oi) => {
    let cls = "option disabled";
    if (cs.has(oi)) cls += " correct";
    else if (ans.has(oi)) cls += " incorrect";
    return `<div class="${cls}"><div class="option-letter">${String.fromCharCode(65+oi)}</div><div class="option-text">${opt}</div></div>`;
  }).join("");

  const sub = state.submitted[i] !== undefined;

  return `
<div class="question-card">
  <div class="question-num">Review: Question ${i+1} of ${state.questions.length}</div>
  <span class="cert-badge ${CERT_CLASS[q.cert]}">${CERT_NAMES[q.cert]}</span>
  <div class="question-text">${q.q}</div>
  <div class="options">${opts}</div>
  ${buildExplanationBlock(q, ans)}
</div>
<div class="nav-row">
  <button class="btn btn-secondary" onclick="${i > 0 ? `showReviewQuestion(${i-1})` : "showReview()"}">← Prev</button>
  <button class="btn btn-secondary" onclick="showReview()">List</button>
  <button class="btn btn-secondary" onclick="${i < state.questions.length-1 ? `showReviewQuestion(${i+1})` : "showReview()"}">Next →</button>
</div>`;
}

function attachListeners() {
  document.querySelectorAll(".option[data-qi]").forEach(el => {
    el.addEventListener("click", () => {
      selectOption(parseInt(el.dataset.qi), parseInt(el.dataset.oi));
    });
  });
}

document.addEventListener("DOMContentLoaded", render);
</script>
</body>
</html>
